# Configuración para tests de integración (Testcontainers)
# Credenciales dummy — @ServiceConnection sobreescribe estas con las de Testcontainers
DB_URL=jdbc:postgresql://localhost:5432/test
DB_USERNAME=test
DB_PASSWORD=test

spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
logging.level.com.alera=WARN
logging.level.org.springframework=WARN
logging.level.org.flywaydb=INFO

# Deshabilitar DevTools en tests
spring.devtools.restart.enabled=false
