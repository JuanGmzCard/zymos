spring.application.name=zymos

# ── Base de datos ─────────────────────────────────────────────────
# Usar variables de entorno en producción:
#   DB_URL, DB_USERNAME, DB_PASSWORD
# Si no están definidas, se usan los valores por defecto (solo desarrollo)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trazabilidad_cervezas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP ──────────────────────────────────────────────────────
spring.datasource.hikari.pool-name=ZymosPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ── Thymeleaf ─────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Servidor ──────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Encoding ──────────────────────────────────────────────────────
spring.mandatory-file-encoding=UTF-8

# ── Manejo de errores ─────────────────────────────────────────────
# Deshabilitar la página de error por defecto de Whitelabel
server.error.whitelabel.enabled=false

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.alera=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{20}] %msg%n

# ── Sesión ────────────────────────────────────────────────────────
# Cierra la sesión tras 30 minutos de inactividad
server.servlet.session.timeout=30m

# ── Actuator ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,flyway,loggers,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized
management.info.env.enabled=true
info.app.name=Zymos
info.app.description=Sistema de Trazabilidad Cervecera
info.app.version=1.0.0

# ── Protección contra fuerza bruta ───────────────────────────────
# Bloquea la IP temporalmente tras N intentos fallidos de login consecutivos
app.login.max-intentos=${LOGIN_MAX_INTENTOS:5}
app.login.bloqueo-minutos=${LOGIN_BLOQUEO_MINUTOS:15}

# ── Rate limiting API ─────────────────────────────────────────────
# Máximo de peticiones a /api/** por IP en una ventana de 1 minuto
app.api.rate-limit=100

# ── Multi-tenant ──────────────────────────────────────────────────
# Subdomain que se usa en desarrollo local (localhost) y como tenant inicial
app.default-subdomain=${DEFAULT_SUBDOMAIN:default}

# ── Paginación ────────────────────────────────────────────────────
app.page-size=15
app.log-page-size=25

# ── Branding ───────────────────────────────────────────────────────
# Configurable por cliente via variables de entorno o .env
# Env vars equivalentes: APP_BRAND_NAME, APP_BRAND_TAGLINE, APP_BRAND_LOGO_URL,
#   APP_BRAND_COLOR_NAVBAR, APP_BRAND_COLOR_PRIMARY, APP_BRAND_COLOR_ACCENT,
#   APP_BRAND_COLOR_ACCENT_HOVER, APP_BRAND_COLOR_CREAM, APP_BRAND_COLOR_BODY_BG
app.brand.name=${APP_BRAND_NAME:Zymos}
app.brand.tagline=${APP_BRAND_TAGLINE:Sistema de Gestion y Trazabilidad Integral}
app.brand.logo-url=${APP_BRAND_LOGO_URL:}
app.brand.color-navbar=${APP_BRAND_COLOR_NAVBAR:#1e293b}
app.brand.color-primary=${APP_BRAND_COLOR_PRIMARY:#2563eb}
app.brand.color-accent=${APP_BRAND_COLOR_ACCENT:#0ea5e9}
app.brand.color-accent-hover=${APP_BRAND_COLOR_ACCENT_HOVER:#38bdf8}
app.brand.color-cream=${APP_BRAND_COLOR_CREAM:#f8fafc}
app.brand.color-body-bg=${APP_BRAND_COLOR_BODY_BG:#f1f5f9}
app.brand.font-headings=${APP_BRAND_FONT_HEADINGS:Inter}
app.brand.font-body=${APP_BRAND_FONT_BODY:Roboto}

# ── Email (SMTP) ──────────────────────────────────────────────────
# Si SMTP_HOST no está definido, Spring no crea JavaMailSender y los emails se omiten silenciosamente.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.default-encoding=UTF-8

# ── Alertas programadas ────────────────────────────────────────────
# Cron: lunes a viernes a las 8 AM. Cambiar con ALERT_CRON env var.
app.alert.cron=${ALERT_CRON:0 0 8 * * MON-FRI}
app.alert.from=${SMTP_FROM:noreply@zymos.app}
app.alert.base-url=${APP_BASE_URL:http://localhost:8080}
app.alert.vencimiento-dias=${ALERT_VENCIMIENTO_DIAS:30}

# ── JWT ───────────────────────────────────────────────────────────
# Clave secreta de firma HS256 — mínimo 32 caracteres. Cambiar en producción.
app.jwt.secret=${JWT_SECRET:zymos-dev-secret-key-change-in-production-2024}
# Tiempo de vida del token en horas (default 24)
app.jwt.ttl-hours=${JWT_TTL_HOURS:24}

# ── Swagger / OpenAPI ─────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packages-to-scan=com.alera.controller
