<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Historial de Movimientos'">Alera - Historial de Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-clock-history me-2"></i>Movimientos de Stock</h1>
            <p th:text="${insumo.nombre} + ' — ' + ${insumo.cantidad.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">Insumo</p>
        </div>
        <a th:href="@{/inventario}" class="btn btn-zymos-outline">
            <i class="bi bi-arrow-left me-1"></i>Volver al Inventario
        </a>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- Info del insumo -->
    <div class="card-zymos mb-4">
        <div class="card-body d-flex flex-wrap gap-4">
            <div>
                <div class="detail-label">Tipo</div>
                <span class="badge" th:classappend="'bg-' + ${insumo.colorTipo}"
                      th:text="${insumo.tipo}">—</span>
            </div>
            <div>
                <div class="detail-label">Stock actual</div>
                <div class="detail-value fw-semibold"
                     th:text="${insumo.cantidad.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">—</div>
            </div>
            <div>
                <div class="detail-label">Stock mínimo</div>
                <div class="detail-value" th:text="${insumo.stockMinimo.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">—</div>
            </div>
            <div th:if="${insumo.bajoStock}" class="align-self-center">
                <span class="badge bg-danger"><i class="bi bi-exclamation-triangle me-1"></i>Bajo stock</span>
            </div>
        </div>
    </div>

    <!-- Tabla de movimientos -->
    <div class="card-zymos">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Historial de Movimientos</h5>
            <span class="badge" style="background:var(--verde-alera);" th:text="${movimientos.size()} + ' registros'">0</span>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(movimientos)}" class="empty-state py-4">
                <i class="bi bi-clock-history"></i>
                <p>Sin movimientos registrados</p>
            </div>
            <div th:unless="${#lists.isEmpty(movimientos)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th style="background:var(--verde-alera);color:var(--crema);padding:.75rem 1rem;">Fecha</th>
                        <th style="background:var(--verde-alera);color:var(--crema);">Tipo</th>
                        <th style="background:var(--verde-alera);color:var(--crema);">Cantidad</th>
                        <th style="background:var(--verde-alera);color:var(--crema);">Antes</th>
                        <th style="background:var(--verde-alera);color:var(--crema);">Después</th>
                        <th style="background:var(--verde-alera);color:var(--crema);">Motivo / Referencia</th>
                        <th style="background:var(--verde-alera);color:var(--crema);">Usuario</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="mov : ${movimientos}">
                        <td class="ps-3 text-nowrap"
                            th:text="${#temporals.format(mov.fecha, 'dd/MM/yyyy HH:mm')}">—</td>
                        <td>
                            <span class="badge" th:classappend="'bg-' + ${mov.tipo.badgeClass}"
                                  th:text="${mov.tipo.displayName}">—</span>
                        </td>
                        <td class="fw-semibold"
                            th:text="${mov.cantidad.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">—</td>
                        <td class="text-muted small"
                            th:text="${mov.cantidadAnterior != null ? mov.cantidadAnterior.stripTrailingZeros().toPlainString() : '—'}">—</td>
                        <td class="text-muted small"
                            th:text="${mov.cantidadPosterior != null ? mov.cantidadPosterior.stripTrailingZeros().toPlainString() : '—'}">—</td>
                        <td>
                            <span th:if="${mov.referencia != null}"
                                  class="badge badge-neutral me-1" th:text="${mov.referencia}">—</span>
                            <span th:if="${mov.motivo != null}" class="text-muted small" th:text="${mov.motivo}">—</span>
                            <span th:if="${mov.referencia == null and mov.motivo == null}" class="text-muted">—</span>
                        </td>
                        <td class="text-muted small" th:text="${mov.usuario != null ? mov.usuario : '—'}">—</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Paginación -->
    <div class="mt-3" th:if="${totalPaginas > 1}">
        <div th:replace="~{fragments/paginacion :: paginacion(baseUrl=${baseUrl}, extraParams=${extraParams}, paginaActual=${paginaActual}, totalPaginas=${totalPaginas})}"></div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
