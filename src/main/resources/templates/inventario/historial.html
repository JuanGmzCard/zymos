<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Historial de Movimientos'">Alera - Historial de Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-clock-history me-2"></i>Movimientos de Stock</h1>
            <p class="subtitle mb-0"
               th:text="${insumo.nombre} + ' — ' + ${insumo.cantidad.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">Insumo</p>
        </div>
        <div class="pt-1">
            <a th:href="@{/inventario}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Volver al Inventario
            </a>
        </div>
    </div>

    <!-- Info del insumo -->
    <div class="content-card mb-4">
        <div class="d-flex flex-wrap gap-4 align-items-center">
            <div>
                <div class="content-card-title pb-0 mb-1">Tipo</div>
                <span class="badge" th:classappend="'bg-' + ${insumo.colorTipo}"
                      th:text="${insumo.tipo}">—</span>
            </div>
            <div>
                <div class="content-card-title pb-0 mb-1">Stock actual</div>
                <span class="fw-semibold"
                      th:text="${insumo.cantidad.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">—</span>
            </div>
            <div>
                <div class="content-card-title pb-0 mb-1">Stock mínimo</div>
                <span th:text="${insumo.stockMinimo.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">—</span>
            </div>
            <div th:if="${insumo.bajoStock}">
                <span class="badge bg-danger"><i class="bi bi-exclamation-triangle me-1"></i>Bajo stock</span>
            </div>
        </div>
    </div>

    <!-- Tabla de movimientos -->
    <div class="table-card mb-4">

        <div class="table-count d-flex justify-content-between align-items-center">
            <span><i class="bi bi-list-ul me-2"></i>Historial de Movimientos</span>
            <span class="badge bg-secondary" th:text="${movimientos.size()} + ' registros'">0</span>
        </div>

        <div th:if="${#lists.isEmpty(movimientos)}" class="text-center text-muted py-5">
            <i class="bi bi-clock-history" style="font-size:2rem;opacity:.4;"></i>
            <p class="mt-2 mb-0">Sin movimientos registrados</p>
        </div>

        <div th:unless="${#lists.isEmpty(movimientos)}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Cantidad</th>
                    <th>Antes</th>
                    <th>Después</th>
                    <th>Motivo / Referencia</th>
                    <th>Usuario</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="mov : ${movimientos}">
                    <td class="text-nowrap"
                        th:text="${#temporals.format(mov.fecha, 'dd/MM/yyyy HH:mm')}">—</td>
                    <td>
                        <span class="badge" th:classappend="'bg-' + ${mov.tipo.badgeClass}"
                              th:text="${mov.tipo.displayName}">—</span>
                    </td>
                    <td class="fw-semibold"
                        th:text="${mov.cantidad.stripTrailingZeros().toPlainString()} + ' ' + (${insumo.unidad} != null ? ${insumo.unidad} : '')">—</td>
                    <td class="text-muted small"
                        th:text="${mov.cantidadAnterior != null ? mov.cantidadAnterior.stripTrailingZeros().toPlainString() : '—'}">—</td>
                    <td class="text-muted small"
                        th:text="${mov.cantidadPosterior != null ? mov.cantidadPosterior.stripTrailingZeros().toPlainString() : '—'}">—</td>
                    <td>
                        <span th:if="${mov.referencia != null}"
                              class="badge bg-secondary me-1" th:text="${mov.referencia}">—</span>
                        <span th:if="${mov.motivo != null}" class="text-muted small" th:text="${mov.motivo}">—</span>
                        <span th:if="${mov.referencia == null and mov.motivo == null}" class="text-muted">—</span>
                    </td>
                    <td class="text-muted small" th:text="${mov.usuario != null ? mov.usuario : '—'}">—</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Paginación -->
    <div class="mt-3" th:if="${totalPaginas > 1}">
        <div th:replace="~{fragments/paginacion :: paginacion(baseUrl=${baseUrl}, extraParams=${extraParams}, paginaActual=${paginaActual}, totalPaginas=${totalPaginas})}"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
