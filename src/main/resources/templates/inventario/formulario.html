<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alera - Insumo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4">
        <h1 th:text="${insumo.id != null} ? 'Editar Insumo' : 'Nuevo Insumo'">Insumo</h1>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <form th:action="${insumo.id != null} ? @{/inventario/actualizar/{id}(id=${insumo.id})} : @{/inventario/guardar}"
          th:object="${insumo}" method="post">

        <div class="form-section">
            <div class="form-section-title"><i class="bi bi-box-seam me-2"></i>Datos del Insumo</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tipo *</label>
                    <select th:field="*{tipo}" class="form-select" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="t : ${tiposInsumo}" th:value="${t}" th:text="${t.displayName}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Unidad</label>
                    <select th:field="*{unidad}" class="form-select">
                        <option value="">-- Seleccionar --</option>
                        <option value="gr">gr — gramos</option>
                        <option value="kg">kg — kilogramos</option>
                        <option value="mL">mL — mililitros</option>
                        <option value="L">L — litros</option>
                        <option value="gal">gal — galones</option>
                        <option value="und">und — unidades</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.001" th:field="*{cantidad}" class="form-control" placeholder="0.000">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Stock Mínimo</label>
                    <input type="number" step="0.001" th:field="*{stockMinimo}" class="form-control" placeholder="0.000">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Proveedor</label>
                    <input type="text" th:field="*{proveedor}" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Fecha Vencimiento</label>
                    <input type="date" th:field="*{fechaVencimiento}" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Observaciones</label>
                    <textarea th:field="*{observaciones}" class="form-control" rows="2"></textarea>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button type="submit" class="btn btn-alera px-4"><i class="bi bi-save me-2"></i>Guardar</button>
            <a th:href="@{/inventario}" class="btn btn-alera-outline px-4">Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
