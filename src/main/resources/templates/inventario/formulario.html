<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + (${insumo.id != null} ? #{inv.form.title.editar} : #{inv.form.title.nuevo})">Alera - Insumo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-box-seam me-2"></i><span th:text="${insumo.id != null} ? #{inv.form.title.editar} : #{inv.form.title.nuevo}">Insumo</span></h1>
            <p class="subtitle mb-0" th:text="#{inv.form.subtitle}">Registra o actualiza los datos del insumo de inventario</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/inventario}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i><span th:text="#{action.cancel}">Cancelar</span>
            </a>
        </div>
    </div>

    <form th:action="${insumo.id != null} ? @{/inventario/actualizar/{id}(id=${insumo.id})} : @{/inventario/guardar}"
          th:object="${insumo}" method="post">

        <div class="content-card mb-4">

            <div class="content-card-title pb-2 mb-3">
                <i class="bi bi-info-circle me-2"></i><span th:text="#{inv.form.seccion.datos}">DATOS DEL INSUMO</span>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label" for="nombre" th:text="#{inv.form.label.nombre}">Nombre *</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required
                           th:placeholder="#{inv.form.ph.nombre}" placeholder="Ej: Malta Pale Ale, Lúpulo Cascade…">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="tipo" th:text="#{inv.form.label.tipo}">Tipo *</label>
                    <input type="text" id="tipo" th:field="*{tipo}" class="form-control" list="listaTiposInsumo"
                           th:placeholder="#{inv.form.ph.tipo}" placeholder="Ej: Malta, Lúpulo, Levadura…" required autocomplete="off">
                    <datalist id="listaTiposInsumo">
                        <option th:each="t : ${tiposInsumo}" th:value="${t}"></option>
                    </datalist>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="unidad" th:text="#{inv.form.label.unidad}">Unidad</label>
                    <select id="unidad" th:field="*{unidad}" class="form-select">
                        <option value="">-- Seleccionar --</option>
                        <option value="gr">gr — gramos</option>
                        <option value="kg">kg — kilogramos</option>
                        <option value="mL">mL — mililitros</option>
                        <option value="L">L — litros</option>
                        <option value="gal">gal — galones</option>
                        <option value="und">und — unidades</option>
                    </select>
                </div>
            </div>

            <div class="content-card-title pb-2 mb-3">
                <i class="bi bi-graph-up me-2"></i><span th:text="#{inv.form.seccion.stock}">STOCK Y VENCIMIENTO</span>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label class="form-label" for="cantidad" th:text="#{inv.form.label.cantidad}">Cantidad actual</label>
                    <input type="number" id="cantidad" step="0.001" th:field="*{cantidad}" class="form-control" placeholder="0.000">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="stockMinimo" th:text="#{inv.form.label.stock.min}">Stock mínimo</label>
                    <input type="number" id="stockMinimo" step="0.001" th:field="*{stockMinimo}" class="form-control" placeholder="0.000">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="proveedor" th:text="#{inv.form.label.proveedor}">Proveedor</label>
                    <select id="proveedor" th:field="*{proveedor}" class="form-select">
                        <option value="" th:text="#{inv.form.sel.proveedor}">— Sin proveedor —</option>
                        <option th:each="prov : ${proveedores}"
                                th:value="${prov.nombre}"
                                th:text="${prov.nombre}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="fechaVencimiento" th:text="#{inv.form.label.vencimiento}">Fecha de vencimiento</label>
                    <input type="date" id="fechaVencimiento" th:field="*{fechaVencimiento}" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label" for="observaciones" th:text="#{inv.form.label.obs}">Observaciones</label>
                    <textarea id="observaciones" th:field="*{observaciones}" class="form-control" rows="2"
                              th:placeholder="#{inv.form.ph.obs}" placeholder="Notas adicionales sobre este insumo…"></textarea>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-2"></i><span th:text="#{action.save}">Guardar</span>
                </button>
                <a th:href="@{/inventario}" class="btn btn-outline-secondary" th:text="#{action.cancel}">Cancelar</a>
            </div>

        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
