<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${branding.name} + ' - Órdenes de Compra'">Zymos - Órdenes de Compra</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container-fluid py-4 px-4">

    <!-- Flash -->
    <div th:if="${mensaje}" th:classappend="'alert alert-' + ${tipoMensaje} + ' alert-dismissible fade show'" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Stat-cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Total OC</div>
                <div class="stat-value" th:text="${statsTotal}">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Borrador</div>
                <div class="stat-value" th:text="${statsBorrador}">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Enviadas</div>
                <div class="stat-value" th:text="${statsEnviadas}">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Recibidas</div>
                <div class="stat-value" th:text="${statsRecibidas}">0</div>
            </div>
        </div>
    </div>

    <!-- Card principal -->
    <div class="card card-zymos">
        <div class="card-header d-flex flex-wrap align-items-center gap-2">
            <span class="fw-bold me-auto">
                <i class="bi bi-cart-check me-1"></i>Órdenes de Compra
            </span>

            <!-- Filtro estado -->
            <form method="get" th:action="@{/ordenes-compra}" class="d-flex align-items-center gap-2 me-2">
                <select name="estado" class="form-select form-select-sm" style="width:auto"
                        onchange="this.form.submit()">
                    <option value="" th:selected="${estadoFiltro == null}">Todos los estados</option>
                    <option th:each="e : ${estados}" th:value="${e.name()}"
                            th:text="${e.displayName}"
                            th:selected="${estadoFiltro != null and estadoFiltro == e}"></option>
                </select>
            </form>

            <a th:href="@{/ordenes-compra/nueva}" class="btn btn-outline-crema btn-sm" sec:authorize="hasAnyRole('ADMIN','FACTURACION','SUPERADMIN')">
                <i class="bi bi-plus-lg me-1"></i>Nueva OC
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${ordenes.isEmpty()}" class="text-center py-5 text-muted">
                <i class="bi bi-cart-x fs-1 d-block mb-2"></i>
                No hay órdenes de compra
                <th:block th:if="${estadoFiltro != null}"> con estado "<span th:text="${estadoFiltro.displayName}"></span>"</th:block>.
            </div>
            <div th:unless="${ordenes.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead style="background:var(--verde-alera); color:var(--crema);">
                        <tr>
                            <th>N° OC</th>
                            <th>Proveedor</th>
                            <th>F. Emisión</th>
                            <th>F. Requerida</th>
                            <th class="text-center">Estado</th>
                            <th class="text-center d-none d-md-table-cell">Ítems</th>
                            <th class="text-end d-none d-lg-table-cell">Total Est.</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="oc : ${ordenes.content}">
                            <td>
                                <a th:href="@{/ordenes-compra/ver/{id}(id=${oc.id})}"
                                   class="fw-bold text-decoration-none"
                                   style="color:var(--verde-alera)"
                                   th:text="${oc.numeroOc != null ? oc.numeroOc : 'Sin número'}">OC-001</a>
                            </td>
                            <td th:text="${oc.proveedor != null ? oc.proveedor : '—'}">Proveedor</td>
                            <td th:text="${oc.fechaEmision != null ? #temporals.format(oc.fechaEmision,'dd/MM/yyyy') : '—'}"></td>
                            <td th:text="${oc.fechaRequerida != null ? #temporals.format(oc.fechaRequerida,'dd/MM/yyyy') : '—'}"></td>
                            <td class="text-center">
                                <span class="badge" th:classappend="${oc.estado.badgeClass}" th:text="${oc.estado.displayName}"></span>
                            </td>
                            <td class="text-center d-none d-md-table-cell" th:text="${oc.items.size()}">0</td>
                            <td class="text-end d-none d-lg-table-cell">
                                <span th:text="${'$' + #numbers.formatDecimal(oc.totalEstimado, 1, 'COMMA', 0, 'POINT')}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/ordenes-compra/ver/{id}(id=${oc.id})}"
                                       class="btn btn-outline-secondary" title="Ver detalle">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:if="${oc.editable}"
                                       th:href="@{/ordenes-compra/editar/{id}(id=${oc.id})}"
                                       class="btn btn-outline-secondary" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/ordenes-compra/{id}/pdf(id=${oc.id})}"
                                       class="btn btn-outline-secondary" title="PDF">
                                        <i class="bi bi-file-pdf"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:if="${totalPaginas > 1}" class="card-footer bg-transparent">
            <div th:replace="~{fragments/paginacion :: paginacion(baseUrl=${baseUrl}, extraParams=${estadoFiltro != null ? 'estado=' + estadoFiltro.name() : ''}, paginaActual=${paginaActual}, totalPaginas=${ordenes.totalPages})}"></div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
