<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${branding.name} + ' - Órdenes de Compra'">Zymos - Órdenes de Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .stat-card-simple {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            min-width: 130px;
        }
        .stat-card-simple .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }
        .stat-card-simple .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1;
            color: #1e293b;
        }
        .stat-card-simple .stat-value.warning { color: #f97316; }
        .stat-card-simple .stat-value.success { color: #16a34a; }

        .page-header {
            padding: 1.75rem 0 1rem;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.2rem;
            font-family: var(--font-body), sans-serif;
        }
        .page-header .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .filter-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .filter-tab {
            display: inline-block;
            padding: 0.3rem 0.85rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all .15s;
        }
        .filter-tab.active   { background: var(--verde-zymos, #2563eb); color: #fff; }
        .filter-tab.inactive { background: transparent; color: #475569; }
        .filter-tab.inactive:hover { background: #f1f5f9; }

        .table-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        .table-card .table-count {
            padding: 0.875rem 1.25rem;
            font-size: 0.875rem;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-card table thead th {
            background: #f8fafc !important;
            color: #64748b !important;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-card table tbody td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        .table-card table tbody tr:last-child td { border-bottom: none; }
        .table-card table tbody tr:hover { background: #f8fafc; }

        .action-link {
            font-size: 0.8rem;
            text-decoration: none;
            padding: 0 0.25rem;
        }
        .action-link.view { color: var(--verde-zymos, #2563eb); }
        .action-link.edit { color: #475569; }
        .action-link.del  { color: #ef4444; }
        .action-link:hover.view { color: var(--dorado, #1d4ed8); text-decoration: underline; }
        .action-link:hover.edit { color: #1e293b; text-decoration: underline; }
        .action-link:hover.del  { color: #b91c1c; text-decoration: underline; }
        .action-sep { color: #cbd5e1; font-size: 0.75rem; margin: 0 0.1rem; }

        .pagination-simple {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            font-size: 0.875rem;
            color: #475569;
            border-top: 1px solid #e2e8f0;
        }
        .pagination-simple a {
            color: var(--verde-zymos, #2563eb);
            text-decoration: none;
            font-weight: 500;
        }
        .pagination-simple a.disabled {
            color: #cbd5e1;
            pointer-events: none;
        }

        html.dark-mode .stat-card-simple { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .stat-card-simple .stat-value { color: var(--dm-text); }
        html.dark-mode .filter-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card table thead th { background: var(--dm-input) !important; color: var(--dm-text-muted) !important; border-color: var(--dm-border-light); }
        html.dark-mode .table-card table tbody td { color: var(--dm-text); border-color: var(--dm-border-faint); }
        html.dark-mode .table-card table tbody tr:hover { background: var(--dm-hover); }
        html.dark-mode .table-card .table-count { color: var(--dm-text-muted); border-color: var(--dm-border-light); }
        html.dark-mode .pagination-simple { border-color: var(--dm-border-light); color: var(--dm-text-muted); }
        html.dark-mode .page-header h1 { color: var(--dm-text); }
        html.dark-mode .page-header .subtitle { color: var(--dm-text-muted); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-cart-check me-2"></i>Órdenes de Compra</h1>
            <p class="subtitle mb-0">Gestión de órdenes a proveedores</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/ordenes-compra/nueva}" class="btn btn-primary btn-sm"
               sec:authorize="hasAnyRole('ADMIN','FACTURACION','SUPERADMIN')">
                <i class="bi bi-plus-lg me-1"></i>Nueva OC
            </a>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}"
         class="alert alert-dismissible fade show mb-3"
         th:classappend="'alert-' + ${tipoMensaje}" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Stat-cards -->
    <div class="d-flex flex-wrap gap-3 mb-4">
        <div class="stat-card-simple">
            <div class="stat-label">Total OC</div>
            <div class="stat-value" th:text="${statsTotal}">0</div>
        </div>
        <div class="stat-card-simple">
            <div class="stat-label">Borrador</div>
            <div class="stat-value warning" th:text="${statsBorrador}">0</div>
        </div>
        <div class="stat-card-simple">
            <div class="stat-label">Enviadas</div>
            <div class="stat-value" th:text="${statsEnviadas}">0</div>
        </div>
        <div class="stat-card-simple">
            <div class="stat-label">Recibidas</div>
            <div class="stat-value success" th:text="${statsRecibidas}">0</div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="filter-card mb-3">
        <form method="get" th:action="@{/ordenes-compra}" class="row g-2 align-items-end mb-3">
            <div class="col-auto">
                <select name="estado" class="form-select form-select-sm" style="width:auto"
                        onchange="this.form.submit()">
                    <option value="" th:selected="${estadoFiltro == null}">Todos los estados</option>
                    <option th:each="e : ${estados}" th:value="${e.name()}"
                            th:text="${e.displayName}"
                            th:selected="${estadoFiltro != null and estadoFiltro == e}"></option>
                </select>
            </div>
            <div class="col-auto">
                <a th:if="${estadoFiltro != null}"
                   th:href="@{/ordenes-compra}"
                   class="btn btn-outline-secondary btn-sm">Limpiar</a>
            </div>
        </form>
        <div class="d-flex gap-2 flex-wrap align-items-center">
            <a th:href="@{/ordenes-compra}"
               th:classappend="${estadoFiltro == null} ? 'filter-tab active' : 'filter-tab inactive'">
                Todos
            </a>
            <a th:each="e : ${estados}"
               th:href="@{/ordenes-compra(estado=${e.name()})}"
               th:classappend="${estadoFiltro == e} ? 'filter-tab active' : 'filter-tab inactive'"
               th:text="${e.displayName}">Estado</a>
        </div>
    </div>

    <!-- Tabla -->
    <div class="table-card mb-4">
        <div class="table-count">
            <span th:text="${ordenes.totalElements}">0</span> órdenes de compra
        </div>

        <div th:if="${ordenes.isEmpty()}" class="text-center py-5 text-muted">
            <i class="bi bi-cart-x fs-1 d-block mb-2"></i>
            <p>No hay órdenes de compra
                <th:block th:if="${estadoFiltro != null}"> con estado "<span th:text="${estadoFiltro.displayName}"></span>"</th:block>.
            </p>
        </div>

        <div th:unless="${ordenes.isEmpty()}" class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="padding-left:1.25rem;">N° OC</th>
                    <th>Proveedor</th>
                    <th>F. Emisión</th>
                    <th>F. Requerida</th>
                    <th class="text-center">Estado</th>
                    <th class="text-center d-none d-md-table-cell">Ítems</th>
                    <th class="text-end d-none d-lg-table-cell">Total Est.</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="oc : ${ordenes.content}">
                    <td style="padding-left:1.25rem;" class="fw-semibold">
                        <a th:href="@{/ordenes-compra/ver/{id}(id=${oc.id})}"
                           class="text-decoration-none"
                           style="color:var(--verde-zymos, #2563eb);"
                           th:text="${oc.numeroOc != null ? oc.numeroOc : 'Sin número'}">OC-001</a>
                    </td>
                    <td th:text="${oc.proveedor != null ? oc.proveedor : '—'}">Proveedor</td>
                    <td th:text="${oc.fechaEmision != null ? #temporals.format(oc.fechaEmision,'dd/MM/yyyy') : '—'}"></td>
                    <td th:text="${oc.fechaRequerida != null ? #temporals.format(oc.fechaRequerida,'dd/MM/yyyy') : '—'}"></td>
                    <td class="text-center">
                        <span class="badge" th:classappend="${oc.estado.badgeClass}" th:text="${oc.estado.displayName}"></span>
                    </td>
                    <td class="text-center d-none d-md-table-cell" th:text="${oc.items.size()}">0</td>
                    <td class="text-end d-none d-lg-table-cell">
                        <span th:text="${'$' + #numbers.formatDecimal(oc.totalEstimado, 1, 'COMMA', 0, 'POINT')}"></span>
                    </td>
                    <td class="text-end pe-3">
                        <a th:href="@{/ordenes-compra/ver/{id}(id=${oc.id})}"
                           class="action-link view" title="Ver detalle">Ver</a>
                        <span class="action-sep" th:if="${oc.editable}">·</span>
                        <a th:if="${oc.editable}"
                           th:href="@{/ordenes-compra/editar/{id}(id=${oc.id})}"
                           class="action-link edit" title="Editar">Editar</a>
                        <span class="action-sep">·</span>
                        <a th:href="@{/ordenes-compra/{id}/pdf(id=${oc.id})}"
                           class="action-link edit" title="Descargar PDF">
                            <i class="bi bi-file-pdf"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Paginación -->
        <div class="pagination-simple" th:if="${totalPaginas > 1}">
            <div th:replace="~{fragments/paginacion :: paginacion(baseUrl=${baseUrl}, extraParams=${estadoFiltro != null ? 'estado=' + estadoFiltro.name() : ''}, paginaActual=${paginaActual}, totalPaginas=${ordenes.totalPages})}"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
