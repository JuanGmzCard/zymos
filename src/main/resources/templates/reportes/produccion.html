<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Reporte de Producción'">Alera - Reporte de Producción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-bar-chart-line me-2"></i>Reporte de Producción</h1>
            <p>Análisis de lotes elaborados por período</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/reportes/produccion/excel(desde=${#temporals.format(desde,'yyyy-MM-dd')},hasta=${#temporals.format(hasta,'yyyy-MM-dd')})}"
               class="btn btn-outline-crema">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
            </a>
            <button onclick="window.print()" class="btn btn-outline-crema">
                <i class="bi bi-printer me-1"></i>Imprimir
            </button>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- Selector de período -->
    <div class="card-zymos mb-4">
        <div class="card-body">
            <form th:action="@{/reportes/produccion}" method="get" class="d-flex gap-3 align-items-end flex-wrap">
                <div>
                    <label class="form-label">Desde</label>
                    <input type="date" name="desde" class="form-control"
                           th:value="${#temporals.format(desde,'yyyy-MM-dd')}">
                </div>
                <div>
                    <label class="form-label">Hasta</label>
                    <input type="date" name="hasta" class="form-control"
                           th:value="${#temporals.format(hasta,'yyyy-MM-dd')}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-zymos">
                        <i class="bi bi-search me-1"></i>Aplicar
                    </button>
                    <a th:href="@{/reportes/produccion}" class="btn btn-zymos-outline">Últimos 3 meses</a>
                </div>
                <div class="ms-auto text-muted small align-self-center">
                    <span th:text="${#temporals.format(desde,'dd/MM/yyyy')} + ' — ' + ${#temporals.format(hasta,'dd/MM/yyyy')}"></span>
                </div>
            </form>
        </div>
    </div>

    <!-- Stat cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalLotes}">0</div>
                <div class="stat-label">Lotes Elaborados</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card success">
                <div class="stat-number" th:text="${#numbers.formatDecimal(totalLitros,1,1)} + ' L'">0</div>
                <div class="stat-label">Litros Producidos</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card info">
                <div class="stat-number" th:text="${estilosUnicos}">0</div>
                <div class="stat-label">Estilos Distintos</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card warning">
                <div class="stat-number" th:text="${completados}">0</div>
                <div class="stat-label">Completados</div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <!-- Gráfica litros por estilo -->
        <div class="col-md-5" th:if="${!chartEstilosLitros.isEmpty()}">
            <div class="card-zymos h-100">
                <div class="card-header"><h5><i class="bi bi-bar-chart me-2"></i>Litros por Estilo</h5></div>
                <div class="card-body d-flex align-items-center justify-content-center" style="min-height:220px;">
                    <canvas id="chartPeriodo" style="max-height:200px;"></canvas>
                </div>
            </div>
        </div>

        <!-- Tabla de lotes -->
        <div th:classappend="${!chartEstilosLitros.isEmpty()} ? 'col-md-7' : 'col-12'">
            <div class="card-zymos h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5><i class="bi bi-list-ul me-2"></i>Lotes en el Período</h5>
                    <span class="text-muted small" th:text="${totalLotes} + ' lotes'"></span>
                </div>
                <div th:if="${#lists.isEmpty(lotes)}" class="empty-state py-4">
                    <i class="bi bi-droplet"></i>
                    <p>Sin lotes en este período</p>
                </div>
                <div th:unless="${#lists.isEmpty(lotes)}" class="table-responsive">
                    <table class="table table-zymos mb-0" style="font-size:0.8rem;">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Estilo</th>
                                <th>Fecha</th>
                                <th>Litros</th>
                                <th>OG</th>
                                <th>ABV</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="lote : ${lotes}">
                                <td>
                                    <a th:href="@{/ver/{id}(id=${lote.id})}"
                                       style="font-family:'Cinzel',serif;font-weight:700;color:var(--verde-zymos);font-size:0.8rem;"
                                       th:text="${lote.codigoLote}">-</a>
                                </td>
                                <td th:text="${lote.estilo}">-</td>
                                <td class="text-muted"
                                    th:text="${lote.fechaElaboracion != null} ? ${#temporals.format(lote.fechaElaboracion,'dd/MM/yy')} : '—'">-</td>
                                <td th:text="${lote.litrosFinales != null} ? ${lote.litrosFinales} + ' L' : '—'">-</td>
                                <td th:text="${lote.densidadInicial != null} ? ${lote.densidadInicial} : '—'">-</td>
                                <td>
                                    <span th:if="${lote.abv != null}"
                                          style="font-weight:700;color:var(--verde-zymos);"
                                          th:text="${#numbers.formatDecimal(lote.abv,1,2)} + '%'">-</span>
                                    <span th:unless="${lote.abv != null}" class="text-muted">—</span>
                                </td>
                                <td>
                                    <span class="phase-badge"
                                          th:classappend="${lote.completado} ? 'completado' : 'fermentacion'"
                                          th:text="${lote.completado} ? 'Completado' : ${lote.faseActual}">-</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
/*<![CDATA[*/
const chartData = /*[[${chartEstilosLitros}]]*/ {};
if (Object.keys(chartData).length > 0) {
    new Chart(document.getElementById('chartPeriodo'), {
        type: 'bar',
        data: {
            labels: Object.keys(chartData),
            datasets: [{
                label: 'Litros',
                data: Object.values(chartData),
                backgroundColor: '#C9A028',
                borderColor: '#364318',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true },
                x: { ticks: { font: { family: 'Raleway', size: 11 } } }
            }
        }
    });
}
/*]]>*/
</script>
</body>
</html>
