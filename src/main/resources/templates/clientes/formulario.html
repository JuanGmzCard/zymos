<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + (${cliente.id != null} ? ' - Editar Cliente' : ' - Nuevo Cliente')">Alera - Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1>
                <i class="bi bi-person-vcard me-2"></i>
                <span th:text="${cliente.id != null} ? 'Editar Cliente' : 'Nuevo Cliente'">Nuevo Cliente</span>
            </h1>
            <p class="subtitle mb-0">Registra los datos fiscales y de contacto del cliente</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/clientes}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Cancelar
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8">

            <form th:action="${cliente.id != null} ? @{/clientes/actualizar/{id}(id=${cliente.id})} : @{/clientes/guardar}"
                  th:object="${cliente}" method="post" novalidate>

                <!-- ─── Identificación ─────────────────────── -->
                <div class="content-card mb-4">
                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-building me-2"></i>IDENTIFICACIÓN
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nombre" class="form-label">Nombre comercial <span class="text-danger">*</span></label>
                            <input type="text" id="nombre" th:field="*{nombre}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                                   placeholder="Nombre del negocio o persona">
                            <div class="invalid-feedback" th:errors="*{nombre}">—</div>
                        </div>
                        <div class="col-md-6">
                            <label for="razonSocial" class="form-label">Razón social</label>
                            <input type="text" id="razonSocial" th:field="*{razonSocial}"
                                   class="form-control"
                                   placeholder="Razón social (si aplica)">
                        </div>
                        <div class="col-md-4">
                            <label for="nit" class="form-label">NIT / Cédula</label>
                            <input type="text" id="nit" th:field="*{nit}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('nit')} ? 'is-invalid' : ''"
                                   placeholder="900123456-1">
                            <div class="invalid-feedback" th:errors="*{nit}">—</div>
                        </div>
                        <div class="col-md-4">
                            <label for="regimenTributario" class="form-label">Régimen tributario</label>
                            <select id="regimenTributario" th:field="*{regimenTributario}" class="form-select">
                                <option value="">— Sin especificar —</option>
                                <option th:each="r : ${regimenes}"
                                        th:value="${r.name()}"
                                        th:text="${r.displayName}">—</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="listaPrecio" class="form-label">Lista de precio</label>
                            <select id="listaPrecio" th:field="*{listaPrecio}" class="form-select">
                                <option value="">— Sin especificar —</option>
                                <option th:each="lp : ${listasPrecio}"
                                        th:value="${lp.name()}"
                                        th:text="${lp.displayName}">—</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- ─── Contacto ───────────────────────────── -->
                <div class="content-card mb-4">
                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-envelope me-2"></i>CONTACTO
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" th:field="*{email}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                   placeholder="contacto@empresa.com">
                            <div class="invalid-feedback" th:errors="*{email}">—</div>
                        </div>
                        <div class="col-md-6">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="text" id="telefono" th:field="*{telefono}"
                                   class="form-control" placeholder="+57 300 000 0000">
                        </div>
                    </div>
                </div>

                <!-- ─── Dirección de despacho ──────────────── -->
                <div class="content-card mb-4">
                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-geo-alt me-2"></i>DIRECCIÓN DE DESPACHO
                    </div>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label for="direccionDespacho" class="form-label">Dirección</label>
                            <input type="text" id="direccionDespacho" th:field="*{direccionDespacho}"
                                   class="form-control" placeholder="Calle, carrera, avenida…">
                        </div>
                        <div class="col-md-4">
                            <label for="ciudad" class="form-label">Ciudad</label>
                            <input type="text" id="ciudad" th:field="*{ciudad}"
                                   class="form-control" placeholder="Ciudad">
                        </div>
                        <div class="col-md-4">
                            <label for="departamento" class="form-label">Departamento</label>
                            <input type="text" id="departamento" th:field="*{departamento}"
                                   class="form-control" placeholder="Departamento">
                        </div>
                    </div>
                </div>

                <!-- ─── Notas ──────────────────────────────── -->
                <div class="content-card mb-4">
                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-sticky me-2"></i>NOTAS INTERNAS
                    </div>
                    <div>
                        <label for="notas" class="form-label">Notas</label>
                        <textarea id="notas" th:field="*{notas}"
                                  class="form-control" rows="2"
                                  placeholder="Condiciones de pago, notas de crédito, observaciones…"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 justify-content-end mb-4">
                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${cliente.id != null} ? 'Actualizar' : 'Crear Cliente'">Guardar</span>
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
