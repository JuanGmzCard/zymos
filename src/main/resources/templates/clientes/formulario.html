<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + (${cliente.id != null} ? ' - Editar Cliente' : ' - Nuevo Cliente')">Alera - Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 th:text="${cliente.id != null} ? 'Editar Cliente' : 'Nuevo Cliente'">Nuevo Cliente</h1>
                <p class="mb-0">Registra los datos fiscales y de contacto del cliente</p>
            </div>
            <a th:href="@{/clientes}" class="btn btn-outline-crema">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="card-zymos">
                <div class="card-header">
                    <h5><i class="bi bi-person-vcard me-2"></i>Datos del Cliente</h5>
                </div>
                <div class="card-body">
                    <form th:action="${cliente.id != null} ? @{/clientes/actualizar/{id}(id=${cliente.id})} : @{/clientes/guardar}"
                          th:object="${cliente}" method="post" novalidate>

                        <!-- ─── Identificación ─────────────────────── -->
                        <h6 class="text-muted mb-3" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:.06em;">
                            <i class="bi bi-building me-1"></i>Identificación
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label detail-label">Nombre comercial *</label>
                                <input type="text" id="nombre" th:field="*{nombre}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                                       placeholder="Nombre del negocio o persona">
                                <div class="invalid-feedback" th:errors="*{nombre}">—</div>
                            </div>
                            <div class="col-md-6">
                                <label for="razonSocial" class="form-label detail-label">Razón social</label>
                                <input type="text" id="razonSocial" th:field="*{razonSocial}"
                                       class="form-control"
                                       placeholder="Razón social (si aplica)">
                            </div>
                            <div class="col-md-4">
                                <label for="nit" class="form-label detail-label">NIT / Cédula</label>
                                <input type="text" id="nit" th:field="*{nit}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('nit')} ? 'is-invalid' : ''"
                                       placeholder="900123456-1">
                                <div class="invalid-feedback" th:errors="*{nit}">—</div>
                            </div>
                            <div class="col-md-4">
                                <label for="regimenTributario" class="form-label detail-label">Régimen tributario</label>
                                <select id="regimenTributario" th:field="*{regimenTributario}" class="form-select">
                                    <option value="">— Sin especificar —</option>
                                    <option th:each="r : ${regimenes}"
                                            th:value="${r.name()}"
                                            th:text="${r.displayName}">—</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="listaPrecio" class="form-label detail-label">Lista de precio</label>
                                <select id="listaPrecio" th:field="*{listaPrecio}" class="form-select">
                                    <option value="">— Sin especificar —</option>
                                    <option th:each="lp : ${listasPrecio}"
                                            th:value="${lp.name()}"
                                            th:text="${lp.displayName}">—</option>
                                </select>
                            </div>
                        </div>

                        <!-- ─── Contacto ───────────────────────────── -->
                        <h6 class="text-muted mb-3" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:.06em;">
                            <i class="bi bi-envelope me-1"></i>Contacto
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="email" class="form-label detail-label">Email</label>
                                <input type="email" id="email" th:field="*{email}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       placeholder="contacto@empresa.com">
                                <div class="invalid-feedback" th:errors="*{email}">—</div>
                            </div>
                            <div class="col-md-6">
                                <label for="telefono" class="form-label detail-label">Teléfono</label>
                                <input type="text" id="telefono" th:field="*{telefono}"
                                       class="form-control" placeholder="+57 300 000 0000">
                            </div>
                        </div>

                        <!-- ─── Dirección de despacho ──────────────── -->
                        <h6 class="text-muted mb-3" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:.06em;">
                            <i class="bi bi-geo-alt me-1"></i>Dirección de Despacho
                        </h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label for="direccionDespacho" class="form-label detail-label">Dirección</label>
                                <input type="text" id="direccionDespacho" th:field="*{direccionDespacho}"
                                       class="form-control" placeholder="Calle, carrera, avenida…">
                            </div>
                            <div class="col-md-4">
                                <label for="ciudad" class="form-label detail-label">Ciudad</label>
                                <input type="text" id="ciudad" th:field="*{ciudad}"
                                       class="form-control" placeholder="Ciudad">
                            </div>
                            <div class="col-md-4">
                                <label for="departamento" class="form-label detail-label">Departamento</label>
                                <input type="text" id="departamento" th:field="*{departamento}"
                                       class="form-control" placeholder="Departamento">
                            </div>
                        </div>

                        <!-- ─── Notas ──────────────────────────────── -->
                        <div class="mb-4">
                            <label for="notas" class="form-label detail-label">Notas internas</label>
                            <textarea id="notas" th:field="*{notas}"
                                      class="form-control" rows="2"
                                      placeholder="Condiciones de pago, notas de crédito, observaciones…"></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/clientes}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-zymos">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${cliente.id != null} ? 'Actualizar' : 'Crear Cliente'">Guardar</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
