<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Clientes'">Alera - Clientes</title>
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Hero -->
<div class="hero-section">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h1><i class="bi bi-people me-2"></i>Clientes</h1>
                <p class="mb-0">Directorio de clientes registrados</p>
            </div>
            <div sec:authorize="hasAnyRole('ADMIN','FACTURACION','SUPERADMIN')">
                <a th:href="@{/clientes/nuevo}" class="btn btn-zymos">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo Cliente
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert"
         th:classappend="'alert-' + ${tipoMensaje}" role="alert" th:text="${mensaje}"></div>

    <!-- Stat-card total -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-people"></i></div>
                <div class="stat-card-value" th:text="${totalClientes}">0</div>
                <div class="stat-card-label">Total Clientes</div>
            </div>
        </div>
    </div>

    <!-- Filtros + tabla -->
    <div class="card-zymos">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>Directorio</h5>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <!-- Typeahead -->
                <div class="position-relative">
                    <input type="search" id="clienteSearch" class="form-control form-control-sm"
                           placeholder="Buscar por nombre o NIT…" autocomplete="off"
                           style="min-width:220px;" th:value="${nombre}">
                    <div id="clienteSuggestHeader" class="search-suggest" style="display:none;"></div>
                </div>
                <!-- Tabs activo/inactivo -->
                <a th:href="@{/clientes(nombre=${nombre},activo=true)}"
                   class="btn btn-sm"
                   th:classappend="${activo != null and activo} ? 'btn-zymos' : 'btn-outline-secondary'">Activos</a>
                <a th:href="@{/clientes(nombre=${nombre},activo=false)}"
                   class="btn btn-sm"
                   th:classappend="${activo != null and !activo} ? 'btn-zymos' : 'btn-outline-secondary'">Inactivos</a>
                <a th:if="${nombre != null or activo != null}"
                   th:href="@{/clientes}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-x"></i>
                </a>
            </div>
        </div>

        <!-- Filtro nombre -->
        <div class="card-body border-bottom py-2">
            <form th:action="@{/clientes}" method="get" class="row g-2 align-items-end">
                <input type="hidden" name="activo" th:if="${activo != null}" th:value="${activo}">
                <div class="col-auto">
                    <label class="form-label form-label-sm mb-0">Nombre o NIT</label>
                    <input type="text" name="nombre" class="form-control form-control-sm"
                           th:value="${nombre}" placeholder="Filtrar…">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-zymos">
                        <i class="bi bi-search me-1"></i>Buscar
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabla -->
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-zymos table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-3">Nombre / Razón Social</th>
                            <th>NIT</th>
                            <th>Ciudad</th>
                            <th>Lista de Precio</th>
                            <th class="text-center">Estado</th>
                            <th style="width:130px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(clientes)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-people fs-4 d-block mb-2"></i>
                                No hay clientes registrados
                            </td>
                        </tr>
                        <tr th:each="c : ${clientes}">
                            <td class="ps-3">
                                <div class="fw-semibold" th:text="${c.nombre}">—</div>
                                <div th:if="${c.razonSocial != null and !c.razonSocial.isBlank()}"
                                     class="text-muted small" th:text="${c.razonSocial}"></div>
                            </td>
                            <td class="text-muted" th:text="${c.nit ?: '—'}">—</td>
                            <td class="text-muted small">
                                <span th:if="${c.ciudad != null}" th:text="${c.ciudad}">—</span>
                                <span th:if="${c.departamento != null and c.ciudad != null}">, </span>
                                <span th:if="${c.departamento != null}" th:text="${c.departamento}"></span>
                                <span th:if="${c.ciudad == null and c.departamento == null}">—</span>
                            </td>
                            <td>
                                <span th:if="${c.listaPrecio != null}"
                                      class="badge bg-light text-dark border"
                                      style="font-size:0.72rem;"
                                      th:text="${c.listaPrecio.displayName}">—</span>
                                <span th:if="${c.listaPrecio == null}" class="text-muted">—</span>
                            </td>
                            <td class="text-center">
                                <span th:if="${c.activo}" class="badge bg-success">Activo</span>
                                <span th:if="${!c.activo}" class="badge bg-secondary">Inactivo</span>
                            </td>
                            <td class="text-nowrap">
                                <a th:href="@{/clientes/ver/{id}(id=${c.id})}"
                                   class="btn btn-sm btn-outline-secondary py-0 px-2"
                                   title="Ver ficha">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a sec:authorize="hasAnyRole('ADMIN','FACTURACION','SUPERADMIN')"
                                   th:href="@{/clientes/editar/{id}(id=${c.id})}"
                                   class="btn btn-sm btn-outline-primary py-0 px-2 ms-1"
                                   title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form sec:authorize="hasAnyRole('ADMIN','FACTURACION','SUPERADMIN')"
                                      th:action="@{/clientes/{id}/toggle(id=${c.id})}" method="post"
                                      class="d-inline">
                                    <button type="submit"
                                            class="btn btn-sm py-0 px-2 ms-1"
                                            th:classappend="${c.activo} ? 'btn-outline-warning' : 'btn-outline-success'"
                                            th:title="${c.activo} ? 'Desactivar' : 'Activar'">
                                        <i class="bi" th:classappend="${c.activo} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Paginación -->
        <div th:if="${totalPaginas > 1}" class="card-footer">
            <div th:replace="~{fragments/paginacion :: paginacion(
                baseUrl='/clientes',
                extraParams=${(nombre != null ? '&nombre=' + nombre : '') + (activo != null ? '&activo=' + activo : '')},
                paginaActual=${paginaActual},
                totalPaginas=${totalPaginas})}"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const input = document.getElementById('clienteSearch');
    const box   = document.getElementById('clienteSuggestHeader');
    if (!input) return;
    let timer;
    input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 1) { box.style.display = 'none'; return; }
        timer = setTimeout(() => {
            fetch('/clientes/suggest?q=' + encodeURIComponent(q))
                .then(r => r.json()).then(items => {
                    if (!items.length) { box.style.display = 'none'; return; }
                    box.innerHTML = items.map(i => {
                        const sub = [i.nit ? 'NIT: ' + i.nit : '', i.ciudad || ''].filter(Boolean).join(' · ');
                        return `<a href="/clientes/ver/${i.id}" class="ss-item">
                            <i class="bi bi-person ss-icon"></i>
                            <span class="ss-title">${i.nombre}</span>
                            ${sub ? '<span class="ss-sub">' + sub + '</span>' : ''}
                         </a>`;
                    }).join('');
                    box.style.display = 'block';
                });
        }, 260);
    });
    document.addEventListener('click', e => {
        if (!input.contains(e.target)) box.style.display = 'none';
    });
})();
</script>
</body>
</html>
