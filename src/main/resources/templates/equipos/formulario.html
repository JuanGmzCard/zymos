<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Equipo'">Alera - Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1>
                <i class="bi bi-tools me-2"></i>
                <span th:text="${equipo.id != null} ? 'Editar Equipo' : 'Nuevo Equipo'">Equipo</span>
            </h1>
            <p class="subtitle mb-0">Datos del equipo de producción</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/equipos}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Cancelar
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8">

            <form th:action="${equipo.id != null} ? @{/equipos/actualizar/{id}(id=${equipo.id})} : @{/equipos/guardar}"
                  th:object="${equipo}" method="post">

                <div class="content-card mb-4">
                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-info-circle me-2"></i>DATOS DEL EQUIPO
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="nombre">Nombre <span class="text-danger">*</span></label>
                            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required
                                   placeholder="Nombre del equipo">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="tipo">Tipo <span class="text-danger">*</span></label>
                            <input type="text" id="tipo" th:field="*{tipo}" class="form-control" list="listaTiposEquipo"
                                   placeholder="Ej: Fermentador, Bomba…" required autocomplete="off">
                            <datalist id="listaTiposEquipo">
                                <option th:each="t : ${tiposEquipo}" th:value="${t}"></option>
                            </datalist>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="estado">Estado <span class="text-danger">*</span></label>
                            <select id="estado" th:field="*{estado}" class="form-select">
                                <option th:each="s : ${estadosEquipo}" th:value="${s}" th:text="${s.displayName}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-rulers me-2"></i>CAPACIDAD Y FECHAS
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label" for="capacidad">Capacidad</label>
                            <input type="number" id="capacidad" step="0.01" th:field="*{capacidad}" class="form-control" placeholder="0.00">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="unidadCapacidad">Unidad capacidad</label>
                            <select id="unidadCapacidad" th:field="*{unidadCapacidad}" class="form-select">
                                <option value="">-- Seleccionar --</option>
                                <option value="L">L — Litros</option>
                                <option value="mL">mL — Mililitros</option>
                                <option value="kg">kg — Kilogramos</option>
                                <option value="gr">gr — Gramos</option>
                                <option value="gal">gal — Galones</option>
                                <option value="unidades">Unidades</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="fechaAdquisicion">Fecha adquisición</label>
                            <input type="date" id="fechaAdquisicion" th:field="*{fechaAdquisicion}" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="proximoMantenimiento">Próx. mantenimiento</label>
                            <input type="date" id="proximoMantenimiento" th:field="*{proximoMantenimiento}" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="observaciones">Observaciones</label>
                            <textarea id="observaciones" th:field="*{observaciones}" class="form-control" rows="2"
                                      placeholder="Notas sobre el estado o uso del equipo…"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-save me-2"></i>Guardar
                        </button>
                        <a th:href="@{/equipos}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>

                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
