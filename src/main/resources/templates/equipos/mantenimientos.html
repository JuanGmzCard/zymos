<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Mantenimientos'">Alera - Mantenimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-wrench me-2"></i><span th:text="'Mantenimientos — ' + ${equipo.nombre}">Mantenimientos</span></h1>
            <p class="subtitle mb-0">
                <span th:text="${equipo.tipo}" class="me-2">Tipo</span>
                <span class="text-muted">·</span>
                <span class="ms-2" th:text="${equipo.estado.displayName}">Estado</span>
            </p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/equipos/ver/{id}(id=${equipo.id})}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-eye me-1"></i>Ver equipo
            </a>
            <a th:href="@{/equipos}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert mb-4"
         th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
        <span th:text="${mensaje}"></span>
    </div>

    <div class="row g-4">

        <!-- Formulario de registro -->
        <div class="col-md-4">
            <div class="content-card mb-3">
                <div class="content-card-title pb-2 mb-3">
                    <i class="bi bi-plus-circle me-2"></i>REGISTRAR MANTENIMIENTO
                </div>
                <form th:action="@{/equipos/{id}/mantenimientos/registrar(id=${equipo.id})}"
                      th:object="${mantenimientoForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Fecha <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{fecha}" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Tipo <span class="text-danger">*</span></label>
                        <select th:field="*{tipo}" class="form-select form-select-sm" required>
                            <option value="">-- Seleccionar --</option>
                            <option th:each="t : ${tiposMantenimiento}" th:value="${t}" th:text="${t.displayName}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Descripción</label>
                        <textarea th:field="*{descripcion}" class="form-control form-control-sm" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Técnico</label>
                        <input type="text" th:field="*{tecnico}" class="form-control form-control-sm"
                               placeholder="Nombre técnico">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Costo</label>
                        <input type="number" step="0.01" th:field="*{costo}" class="form-control form-control-sm"
                               placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Próximo Mantenimiento</label>
                        <input type="date" th:field="*{proximoMantenimiento}" class="form-control form-control-sm">
                    </div>
                    <button type="submit" class="btn btn-sm btn-primary w-100">
                        <i class="bi bi-save me-1"></i>Registrar
                    </button>
                </form>
            </div>
        </div>

        <!-- Historial -->
        <div class="col-md-8">
            <div class="content-card mb-3">
                <div class="content-card-title pb-2 mb-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-clock-history me-2"></i>HISTORIAL</span>
                    <div class="d-flex gap-3 small text-muted">
                        <span><strong th:text="${totalMantenimientos}">0</strong> registros</span>
                        <span>Total: <strong th:text="'$' + ${#numbers.formatDecimal(costoTotal,1,'COMMA',0,'POINT')}">$0</strong></span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(mantenimientos)}" class="text-center py-4 text-muted">
                    <i class="bi bi-wrench fs-2 d-block mb-2"></i>
                    <p>Sin mantenimientos registrados</p>
                </div>
                <div th:unless="${#lists.isEmpty(mantenimientos)}" class="table-responsive">
                    <table class="table table-sm mb-0">
                        <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Técnico</th>
                            <th>Costo</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="mant : ${mantenimientos}">
                            <td class="text-nowrap" th:text="${#temporals.format(mant.fecha,'dd/MM/yyyy')}">—</td>
                            <td><span class="badge bg-secondary bg-opacity-10 text-secondary" th:text="${mant.tipo.displayName}">—</span></td>
                            <td th:text="${mant.tecnico != null} ? ${mant.tecnico} : '—'">—</td>
                            <td th:text="${mant.costo != null} ? '$' + ${#numbers.formatDecimal(mant.costo,1,'COMMA',2,'POINT')} : '—'">—</td>
                            <td>
                                <form th:action="@{/equipos/{eid}/mantenimientos/eliminar/{mid}(eid=${equipo.id},mid=${mant.id})}"
                                      method="post" onsubmit="return confirm('¿Eliminar?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
