<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Mantenimientos'">Alera - Mantenimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 th:text="'Mantenimientos - ' + ${equipo.nombre}">Mantenimientos</h1>
            <p th:text="${equipo.tipo.displayName} + ' | ' + ${equipo.estado.displayName}">-</p>
        </div>
        <a th:href="@{/equipos}" class="btn btn-zymos-outline"><i class="bi bi-arrow-left me-1"></i>Volver</a>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div th:if="${mensaje}" class="alert" th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
        <span th:text="${mensaje}"></span>
    </div>

    <div class="row g-4">
        <!-- Formulario registro -->
        <div class="col-md-4">
            <div class="card-zymos">
                <div class="card-header"><h5><i class="bi bi-plus-circle me-2"></i>Registrar Mantenimiento</h5></div>
                <div class="card-body">
                    <form th:action="@{/equipos/{id}/mantenimientos/registrar(id=${equipo.id})}"
                          th:object="${mantenimientoForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Fecha *</label>
                            <input type="date" th:field="*{fecha}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo *</label>
                            <select th:field="*{tipo}" class="form-select" required>
                                <option value="">-- Seleccionar --</option>
                                <option th:each="t : ${tiposMantenimiento}" th:value="${t}" th:text="${t.displayName}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Técnico</label>
                            <input type="text" th:field="*{tecnico}" class="form-control" placeholder="Nombre técnico">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Costo</label>
                            <input type="number" step="0.01" th:field="*{costo}" class="form-control" placeholder="0.00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Próximo Mantenimiento</label>
                            <input type="date" th:field="*{proximoMantenimiento}" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-zymos w-100">
                            <i class="bi bi-save me-1"></i>Registrar
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Historial -->
        <div class="col-md-8">
            <div class="card-zymos">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Historial</h5>
                    <div class="d-flex gap-3 small text-muted">
                        <span><strong th:text="${totalMantenimientos}">0</strong> registros</span>
                        <span>Total: <strong th:text="'$' + ${#numbers.formatDecimal(costoTotal,1,'COMMA',0,'POINT')}">$0</strong></span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(mantenimientos)}" class="empty-state py-4">
                        <i class="bi bi-wrench"></i>
                        <p>Sin mantenimientos registrados</p>
                    </div>
                    <table th:unless="${#lists.isEmpty(mantenimientos)}" class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th style="background:var(--verde-alera);color:var(--crema);padding:0.7rem 1rem;">Fecha</th>
                            <th style="background:var(--verde-alera);color:var(--crema);">Tipo</th>
                            <th style="background:var(--verde-alera);color:var(--crema);">Técnico</th>
                            <th style="background:var(--verde-alera);color:var(--crema);">Costo</th>
                            <th style="background:var(--verde-alera);color:var(--crema);"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="mant : ${mantenimientos}">
                            <td class="ps-3" th:text="${#temporals.format(mant.fecha,'dd/MM/yyyy')}">-</td>
                            <td><span class="badge badge-neutral" th:text="${mant.tipo.displayName}">-</span></td>
                            <td th:text="${mant.tecnico != null} ? ${mant.tecnico} : '-'">-</td>
                            <td th:text="${mant.costo != null} ? '$' + ${#numbers.formatDecimal(mant.costo,1,'COMMA',2,'POINT')} : '-'">-</td>
                            <td>
                                <form th:action="@{/equipos/{eid}/mantenimientos/eliminar/{mid}(eid=${equipo.id},mid=${mant.id})}"
                                      method="post" onsubmit="return confirm('¿Eliminar?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
