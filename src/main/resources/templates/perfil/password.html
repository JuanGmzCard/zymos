<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${branding != null ? branding.name : 'Alera'} + ' - Cambiar Contraseña'">Cambiar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header">
        <h1><i class="bi bi-key me-2"></i>Cambiar Contraseña</h1>
        <p class="subtitle mb-0">Actualiza tu contraseña de acceso</p>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert mb-3"
         th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
        <span th:text="${mensaje}"></span>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="content-card">
                <div class="content-card-title">
                    <i class="bi bi-shield-lock me-2"></i>Nueva contraseña
                </div>
                <div class="p-4">
                    <form th:action="@{/perfil/password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="nuevaPassword" class="form-label">Nueva contraseña *</label>
                            <div class="input-group">
                                <input type="password" id="nuevaPassword" name="nuevaPassword"
                                       class="form-control"
                                       minlength="8" required
                                       placeholder="Mínimo 8 caracteres, una letra y un número"
                                       autofocus>
                                <button type="button" class="btn btn-outline-secondary btn-toggle-pwd"
                                        tabindex="-1" title="Mostrar/ocultar">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="confirmarPassword" class="form-label">Confirmar contraseña *</label>
                            <div class="input-group">
                                <input type="password" id="confirmarPassword" name="confirmarPassword"
                                       class="form-control"
                                       minlength="8" required
                                       placeholder="Repite la contraseña">
                                <button type="button" class="btn btn-outline-secondary btn-toggle-pwd"
                                        tabindex="-1" title="Mostrar/ocultar">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-sm px-3">
                                <i class="bi bi-check-lg me-1"></i>Guardar
                            </button>
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm px-3">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
function togglePwd(btn) {
    var input = btn.closest('.input-group').querySelector('input');
    if (input.type === 'password') {
        input.type = 'text';
        btn.querySelector('i').className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        btn.querySelector('i').className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
