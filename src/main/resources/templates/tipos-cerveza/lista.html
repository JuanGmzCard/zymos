<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Tipos de Cerveza'">Alera - Tipos de Cerveza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-tags me-2"></i>Tipos de Cerveza</h1>
            <p>Catálogo de estilos cerveceros</p>
        </div>
        <button class="btn btn-alera" data-bs-toggle="modal" data-bs-target="#modalNuevo">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Tipo
        </button>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div th:if="${mensaje}" class="alert" th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
        <span th:text="${mensaje}"></span>
    </div>

    <div class="card-alera">
        <div class="card-header"><h5><i class="bi bi-list-ul me-2"></i>Catálogo</h5></div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th style="background:#364318;color:#F5EDD0;padding:0.75rem 1rem;">Nombre</th>
                    <th style="background:#364318;color:#F5EDD0;">Descripción</th>
                    <th style="background:#364318;color:#F5EDD0;">Estado</th>
                    <th style="background:#364318;color:#F5EDD0;">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tipo : ${tipos}">
                    <td class="ps-3 fw-semibold" th:text="${tipo.nombre}">-</td>
                    <td class="text-muted small" th:text="${tipo.descripcion != null} ? ${tipo.descripcion} : '-'">-</td>
                    <td>
                        <span th:if="${tipo.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${tipo.activo}" class="badge bg-secondary">Inactivo</span>
                    </td>
                    <td>
                        <form th:action="@{/tipos-cerveza/{id}/toggle(id=${tipo.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-secondary" th:title="${tipo.activo} ? 'Desactivar' : 'Activar'">
                                <i class="bi" th:classappend="${tipo.activo} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                            </button>
                        </form>
                        <form th:action="@{/tipos-cerveza/{id}/eliminar(id=${tipo.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('¿Eliminar este tipo?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger ms-1">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Nuevo -->
<div class="modal fade" id="modalNuevo" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:#364318;">
                <h5 class="modal-title" style="color:#C9A028;font-family:'Cinzel',serif;">Nuevo Tipo de Cerveza</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/tipos-cerveza/guardar}" th:object="${tipoCerveza}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-alera">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
