<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Tipos de Cerveza'">Alera - Tipos de Cerveza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-tags me-2"></i>Tipos de Cerveza</h1>
            <p class="subtitle mb-0">Catálogo de estilos cerveceros</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                <i class="bi bi-plus-lg me-1"></i>Nuevo Tipo
            </button>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert mb-3"
         th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- Tabla -->
    <div class="table-card mb-4">
        <div class="table-count">
            <span th:text="${#lists.size(tipos)}">0</span> tipos registrados
        </div>
        <div th:if="${#lists.isEmpty(tipos)}" class="empty-state py-5">
            <i class="bi bi-tags fs-1 text-muted d-block mb-2"></i>
            <p class="text-muted">No hay tipos de cerveza registrados</p>
        </div>
        <div th:unless="${#lists.isEmpty(tipos)}" class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="padding-left:1.25rem;">Nombre</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tipo : ${tipos}">
                    <td style="padding-left:1.25rem;" class="fw-semibold" th:text="${tipo.nombre}">-</td>
                    <td class="text-muted small" th:text="${tipo.descripcion != null} ? ${tipo.descripcion} : '—'">-</td>
                    <td>
                        <span th:if="${tipo.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${tipo.activo}" class="badge bg-secondary">Inactivo</span>
                    </td>
                    <td class="text-end pe-3">
                        <form th:action="@{/tipos-cerveza/{id}/toggle(id=${tipo.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="action-link edit border-0 bg-transparent p-0"
                                    th:title="${tipo.activo} ? 'Desactivar' : 'Activar'">
                                <i class="bi" th:classappend="${tipo.activo} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                <span th:text="${tipo.activo} ? 'Desactivar' : 'Activar'"></span>
                            </button>
                        </form>
                        <span class="action-sep">·</span>
                        <form th:action="@{/tipos-cerveza/{id}/eliminar(id=${tipo.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="action-link del border-0 bg-transparent p-0" data-confirm="¿Eliminar este tipo?">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal Nuevo -->
<div class="modal fade" id="modalNuevo" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-semibold"><i class="bi bi-plus-lg me-2"></i>Nuevo Tipo de Cerveza</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/tipos-cerveza/guardar}" th:object="${tipoCerveza}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="nombreTipo" class="form-label">Nombre *</label>
                        <input type="text" id="nombreTipo" th:field="*{nombre}" class="form-control" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label for="descripcionTipo" class="form-label">Descripción</label>
                        <textarea id="descripcionTipo" th:field="*{descripcion}" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
