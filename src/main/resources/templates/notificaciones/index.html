<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf"        th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${branding.name} + ' - Notificaciones'">Alera - Notificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .notif-row { transition: background .15s; }
        .notif-row:hover { background: color-mix(in srgb, var(--dorado) 6%, transparent); }
        .notif-row.leida { opacity: .6; }
        .notif-icono { font-size: 1.15rem; }
        .notif-tiempo { font-size: .75rem; color: #888; }
        .tipo-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: .72rem;
            font-weight: 600;
        }
        .tipo-badge-vencimiento   { background: rgba(13,110,253,.12); color: #0d6efd; }
        .tipo-badge-mantenimiento { background: rgba(13,202,240,.12); color: #0dcaf0; }
        .tipo-badge-sistema       { background: rgba(13,110,253,.12); color: #0d6efd; }
        html.dark-mode .notif-row:hover          { background: color-mix(in srgb, var(--dorado) 10%, transparent); }
        html.dark-mode .notif-tiempo             { color: #aaa; }
        html.dark-mode .tipo-badge-vencimiento   { background: rgba(13,110,253,.2); color: #6ea8fe; }
        html.dark-mode .tipo-badge-mantenimiento { background: rgba(13,202,240,.2); color: #6edff6; }
        html.dark-mode .tipo-badge-sistema       { background: rgba(13,110,253,.2); color: #6ea8fe; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-bell me-2"></i>Notificaciones</h1>
            <p class="subtitle mb-0"
               th:if="${totalNoLeidas > 0}"
               th:text="${totalNoLeidas} + ' sin leer'"></p>
            <p class="subtitle mb-0"
               th:unless="${totalNoLeidas > 0}">Todo al día</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <form th:action="@{/notificaciones/leer-todas}" method="post"
                  th:if="${totalNoLeidas > 0}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-check2-all me-1"></i>Marcar todas leídas
                </button>
            </form>
        </div>
    </div>

    <!-- Tabla/lista de notificaciones -->
    <div class="table-card mb-4">
        <div class="table-count">
            <span th:text="${notificaciones.totalElements}">0</span> notificaciones
        </div>

        <div th:if="${notificaciones.isEmpty()}" class="empty-state py-5">
            <i class="bi bi-bell-slash fs-1 text-muted d-block mb-2"></i>
            <p class="text-muted">Sin notificaciones</p>
        </div>

        <div th:unless="${notificaciones.isEmpty()}">
            <div th:each="n, iStat : ${notificaciones}"
                 class="notif-row d-flex align-items-start gap-3 px-4 py-3"
                 th:classappend="${n.leida} ? ' leida' : ''"
                 style="border-bottom: 1px solid #f1f5f9;">

                <!-- Icono tipo -->
                <div class="pt-1">
                    <i class="bi notif-icono"
                       th:classappend="${n.tipo.icono} + ' ' + ${n.tipo.colorClase}"></i>
                </div>

                <!-- Contenido -->
                <div class="flex-grow-1">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <span class="fw-semibold" th:text="${n.titulo}"></span>
                        <span class="badge rounded-pill bg-warning text-dark tipo-badge"
                              th:if="${n.tipo.name() == 'BAJO_STOCK'}">Bajo stock</span>
                        <span class="badge rounded-pill tipo-badge tipo-badge-vencimiento"
                              th:if="${n.tipo.name() == 'VENCIMIENTO'}">Vencimiento</span>
                        <span class="badge rounded-pill tipo-badge tipo-badge-mantenimiento"
                              th:if="${n.tipo.name() == 'MANTENIMIENTO'}">Mantenimiento</span>
                        <span class="badge rounded-pill tipo-badge tipo-badge-sistema"
                              th:if="${n.tipo.name() == 'SISTEMA'}">Sistema</span>
                        <span th:unless="${n.leida}"
                              class="badge rounded-pill bg-danger"
                              style="font-size:.65rem;padding:2px 6px;">Nueva</span>
                    </div>
                    <div class="text-muted mt-1" style="font-size:.85rem;"
                         th:if="${n.mensaje}" th:text="${n.mensaje}"></div>
                    <div class="notif-tiempo mt-1"
                         th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                </div>

                <!-- Acciones -->
                <div class="d-flex gap-2 align-items-center flex-shrink-0 pt-1">
                    <a th:if="${n.urlAccion}" th:href="${n.urlAccion}"
                       class="action-link view" title="Ver">
                        <i class="bi bi-arrow-right-circle"></i>
                    </a>
                    <button th:unless="${n.leida}"
                            class="action-link edit border-0 bg-transparent p-0 btn-marcar"
                            th:attr="data-id=${n.id}"
                            title="Marcar como leída">
                        <i class="bi bi-check2"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Paginación -->
        <div class="pagination-simple" th:if="${totalPaginas > 1}">
            <a th:href="@{/notificaciones(page=${paginaActual - 1})}"
               th:classappend="${paginaActual == 0} ? 'disabled' : ''">
                ← Anterior
            </a>
            <span>Página <strong th:text="${paginaActual + 1}">1</strong> de <span th:text="${totalPaginas}">1</span></span>
            <a th:href="@{/notificaciones(page=${paginaActual + 1})}"
               th:classappend="${paginaActual >= totalPaginas - 1} ? 'disabled' : ''">
                Siguiente →
            </a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var csrf       = document.querySelector('meta[name="_csrf"]')?.content;
    var csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    document.querySelectorAll('.btn-marcar').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var id = btn.dataset.id;
            fetch('/notificaciones/' + id + '/leer', {
                method: 'POST',
                credentials: 'same-origin',
                headers: csrfHeader ? { [csrfHeader]: csrf } : {}
            })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (!data) return;
                var row = btn.closest('.notif-row');
                row.classList.add('leida');
                btn.remove();
                // Quita badge "Nueva"
                row.querySelectorAll('.bg-danger').forEach(function(b) { b.remove(); });
            })
            .catch(function() {});
        });
    });
});
</script>
</body>
</html>
