<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf"        th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${branding.name} + ' - Notificaciones'">Alera - Notificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .notif-row { transition: background .15s; }
        .notif-row:hover { background: rgba(201,160,40,.06); }
        .notif-row.leida { opacity: .6; }
        .notif-icono { font-size: 1.15rem; }
        .notif-tiempo { font-size: .75rem; color: #888; }
        .tipo-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: .72rem;
            font-weight: 600;
        }
        html.dark-mode .notif-row:hover { background: rgba(201,160,40,.1); }
        html.dark-mode .notif-tiempo { color: #aaa; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h4 class="mb-0" style="font-family:var(--font-headings);">
                <i class="bi bi-bell me-2" style="color:var(--dorado);"></i>Notificaciones
            </h4>
            <small class="text-muted" th:if="${totalNoLeidas > 0}"
                   th:text="${totalNoLeidas} + ' sin leer'"></small>
            <small class="text-muted" th:unless="${totalNoLeidas > 0}">Todo al día</small>
        </div>
        <div class="d-flex gap-2">
            <form th:action="@{/notificaciones/leer-todas}" method="post"
                  th:if="${totalNoLeidas > 0}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-check2-all me-1"></i>Marcar todas leídas
                </button>
            </form>
        </div>
    </div>

    <div class="card card-zymos">
        <div class="card-body p-0">
            <div th:if="${notificaciones.isEmpty()}" class="text-center py-5 text-muted">
                <i class="bi bi-bell-slash" style="font-size:2.5rem;opacity:.4;"></i>
                <div class="mt-2">Sin notificaciones</div>
            </div>

            <div th:unless="${notificaciones.isEmpty()}">
                <div th:each="n, iStat : ${notificaciones}"
                     class="notif-row d-flex align-items-start gap-3 p-3"
                     th:classappend="${n.leida} ? ' leida' : ''"
                     th:style="${!iStat.last} ? 'border-bottom:1px solid rgba(0,0,0,.07)' : ''">

                    <!-- Icono tipo -->
                    <div class="pt-1">
                        <i class="bi notif-icono"
                           th:classappend="${n.tipo.icono} + ' ' + ${n.tipo.colorClase}"></i>
                    </div>

                    <!-- Contenido -->
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <span class="fw-600" th:text="${n.titulo}"></span>
                            <span class="badge rounded-pill bg-warning text-dark tipo-badge"
                                  th:if="${n.tipo.name() == 'BAJO_STOCK'}">Bajo stock</span>
                            <span class="badge rounded-pill tipo-badge"
                                  style="background:rgba(13,110,253,.12);color:#0d6efd;"
                                  th:if="${n.tipo.name() == 'VENCIMIENTO'}">Vencimiento</span>
                            <span class="badge rounded-pill tipo-badge"
                                  style="background:rgba(13,202,240,.12);color:#0dcaf0;"
                                  th:if="${n.tipo.name() == 'MANTENIMIENTO'}">Mantenimiento</span>
                            <span class="badge rounded-pill tipo-badge"
                                  style="background:rgba(13,110,253,.12);color:#0d6efd;"
                                  th:if="${n.tipo.name() == 'SISTEMA'}">Sistema</span>
                            <span th:unless="${n.leida}"
                                  class="badge rounded-pill bg-danger"
                                  style="font-size:.65rem;padding:2px 6px;">Nueva</span>
                        </div>
                        <div class="text-muted mt-1" style="font-size:.85rem;"
                             th:if="${n.mensaje}" th:text="${n.mensaje}"></div>
                        <div class="notif-tiempo mt-1"
                             th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                    </div>

                    <!-- Acciones -->
                    <div class="d-flex gap-2 align-items-center flex-shrink-0 pt-1">
                        <a th:if="${n.urlAccion}" th:href="${n.urlAccion}"
                           class="btn btn-sm btn-outline-secondary py-0 px-2"
                           title="Ver">
                            <i class="bi bi-arrow-right"></i>
                        </a>
                        <button th:unless="${n.leida}"
                                class="btn btn-sm btn-outline-secondary py-0 px-2 btn-marcar"
                                th:attr="data-id=${n.id}"
                                title="Marcar como leída">
                            <i class="bi bi-check2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Paginación -->
    <div th:if="${totalPaginas > 1}" class="d-flex justify-content-center mt-3">
        <nav>
            <ul class="pagination pagination-sm">
                <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/notificaciones(page=${paginaActual - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                    th:classappend="${i == paginaActual} ? 'active'">
                    <a class="page-link" th:href="@{/notificaciones(page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${paginaActual == totalPaginas - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/notificaciones(page=${paginaActual + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var csrf       = document.querySelector('meta[name="_csrf"]')?.content;
    var csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    document.querySelectorAll('.btn-marcar').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var id = btn.dataset.id;
            fetch('/notificaciones/' + id + '/leer', {
                method: 'POST',
                credentials: 'same-origin',
                headers: csrfHeader ? { [csrfHeader]: csrf } : {}
            })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (!data) return;
                var row = btn.closest('.notif-row');
                row.classList.add('leida');
                btn.remove();
                // Quita badge "Nueva"
                row.querySelectorAll('.bg-danger').forEach(function(b) { b.remove(); });
            })
            .catch(function() {});
        });
    });
});
</script>
</body>
</html>
