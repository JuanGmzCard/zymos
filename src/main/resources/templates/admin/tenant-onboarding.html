<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Onboarding ' + ${tenant.subdomain}">Alera - Onboarding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .wizard-steps {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 2rem;
        }
        .wz-step {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
        }
        .wz-step.done { color: #16a34a; }
        .wz-step.active { color: #1e293b; font-weight: 700; }
        .wz-circle {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700;
            background: #e2e8f0; color: #64748b;
            flex-shrink: 0;
        }
        .wz-step.done .wz-circle { background: #dcfce7; color: #16a34a; }
        .wz-step.active .wz-circle { background: var(--verde-zymos, #2563eb); color: #fff; }
        .wz-connector { flex: 1; height: 2px; background: #e2e8f0; margin: 0 0.75rem; min-width: 40px; }
        .wz-connector.done { background: #16a34a; }

        .tenant-summary {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.875rem 1.25rem;
            margin-bottom: 1.5rem;
        }
        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
        }

        html.dark-mode .tenant-summary { background: var(--dm-input); border-color: var(--dm-border-light); }
        html.dark-mode .form-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .wz-connector { background: var(--dm-border-med); }
        html.dark-mode .wz-step { color: var(--dm-text-muted); }
        html.dark-mode .wz-step.active { color: var(--dm-text); }
        html.dark-mode .wz-circle { background: var(--dm-input); color: var(--dm-text-muted); }
        html.dark-mode .wz-step.done { color: #4ade80; }
        html.dark-mode .wz-step.done .wz-circle { background: #14532d; color: #4ade80; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4" style="max-width:640px;">

    <div class="page-header">
        <h1><i class="bi bi-rocket-takeoff me-2"></i>Nuevo tenant</h1>
        <div class="subtitle">Onboarding en 2 pasos</div>
    </div>

    <!-- Progress steps -->
    <div class="wizard-steps">
        <div class="wz-step done">
            <div class="wz-circle"><i class="bi bi-check-lg"></i></div>
            <span>Tenant creado</span>
        </div>
        <div class="wz-connector done"></div>
        <div class="wz-step active">
            <div class="wz-circle">2</div>
            <span>Usuario administrador</span>
        </div>
    </div>

    <!-- Tenant summary -->
    <div class="tenant-summary d-flex align-items-center gap-3">
        <div class="rounded-3 p-2 d-flex align-items-center justify-content-center"
             th:style="'background:' + ${tenant.colorNavbar} + ';width:40px;height:40px;flex-shrink:0;'">
            <i class="bi bi-building" th:style="'color:' + ${tenant.colorAccent} + '; font-size:1rem;'"></i>
        </div>
        <div>
            <div class="fw-semibold small" th:text="${tenant.name}">Tenant</div>
            <code class="small" th:text="${tenant.subdomain}">subdomain</code>
        </div>
        <span class="badge bg-success ms-auto">Creado</span>
    </div>

    <!-- Ya tiene usuarios (ej. llegó aquí dos veces) -->
    <div th:if="${tieneUsuarios}" class="alert alert-info d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-info-circle"></i>
        <span>Este tenant ya tiene usuarios. Podés crear uno adicional o saltearte este paso.</span>
    </div>

    <div class="form-card">
        <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:0.7rem; letter-spacing:.06em;">
            Crear primer usuario administrador
        </h6>

        <form th:action="@{/admin/tenants/{s}/onboarding/guardar(s=${tenant.subdomain})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label class="form-label small fw-semibold">Usuario</label>
                <input type="text" name="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Contraseña</label>
                <input type="password" name="password" class="form-control" required autocomplete="new-password">
                <div class="form-text">Mínimo 6 caracteres.</div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Confirmar contraseña</label>
                <input type="password" name="confirmarPassword" class="form-control" required autocomplete="new-password">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-semibold">Rol</label>
                <select name="rol" class="form-select">
                    <option th:each="r : ${roles}"
                            th:value="${r.name()}"
                            th:text="${r.displayName}"
                            th:selected="${r.name() == 'ADMIN'}">Rol</option>
                </select>
            </div>

            <div class="d-flex gap-2 justify-content-end">
                <a th:href="@{/admin/tenants}" class="btn btn-outline-secondary btn-sm px-4">
                    Crear usuario después
                </a>
                <button type="submit" class="btn btn-primary btn-sm px-4">
                    <i class="bi bi-check-lg me-1"></i>Finalizar onboarding
                </button>
            </div>
        </form>
    </div>

</div>
</body>
</html>
