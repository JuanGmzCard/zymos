<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + #{roles.title}">Alera - Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .page-header { padding: 1.75rem 0 1rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.2rem; }
        .page-header .subtitle { color: #94a3b8; font-size: 0.875rem; }
        .stat-card-simple { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem 1.5rem; min-width: 130px; }
        .stat-card-simple .stat-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; margin-bottom: 0.25rem; }
        .stat-card-simple .stat-value { font-size: 1.75rem; font-weight: 700; color: #1e293b; line-height: 1; }
        .table-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .table-card .table-count { padding: 0.875rem 1.25rem; font-size: 0.875rem; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        .table-card table thead th { background: #f8fafc !important; color: #64748b !important; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 0.65rem 1rem; border-bottom: 1px solid #e2e8f0; }
        .table-card table tbody td { padding: 0.75rem 1rem; vertical-align: middle; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .table-card table tbody tr:last-child td { border-bottom: none; }
        .table-card table tbody tr:hover { background: #f8fafc; }
        .action-link { font-size: 0.8rem; text-decoration: none; padding: 0 0.25rem; border: none; background: transparent; cursor: pointer; }
        .action-link.edit { color: #475569; }
        .action-link.del  { color: #ef4444; }
        .action-link.toggle-on  { color: #16a34a; }
        .action-link.toggle-off { color: #94a3b8; }
        .action-sep { color: #cbd5e1; font-size: 0.75rem; margin: 0 0.1rem; }
        .modulo-badge { display: inline-block; font-size: 0.65rem; font-weight: 600; padding: 0.15rem 0.4rem; border-radius: 4px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; margin: 0.1rem; }
        .sistema-badge { font-size: 0.65rem; background: #dbeafe; color: #1d4ed8; border-radius: 4px; padding: 0.1rem 0.4rem; font-weight: 600; }
        html.dark-mode .page-header h1 { color: var(--dm-text); }
        html.dark-mode .stat-card-simple { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .stat-card-simple .stat-value { color: var(--dm-text); }
        html.dark-mode .table-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card table thead th { background: var(--dm-input) !important; color: var(--dm-text-muted) !important; border-color: var(--dm-border-light); }
        html.dark-mode .table-card table tbody td { color: var(--dm-text); border-color: var(--dm-border-faint); }
        html.dark-mode .table-card table tbody tr:hover { background: var(--dm-hover); }
        html.dark-mode .table-card .table-count { color: var(--dm-text-muted); border-color: var(--dm-border-light); }
        html.dark-mode .modulo-badge { background: var(--dm-input); color: var(--dm-text-muted); border-color: var(--dm-border-med); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-shield-lock me-2"></i><span th:text="#{roles.title}">Roles Personalizados</span></h1>
            <p class="subtitle mb-0" th:text="#{roles.subtitle}">Configura los accesos por módulo para cada rol de tu equipo</p>
        </div>
        <div class="pt-1">
            <a th:href="@{/admin/roles/nuevo}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-circle me-1"></i><span th:text="#{roles.nuevo}">Nuevo Rol</span>
            </a>
        </div>
    </div>

    <div th:if="${mensaje}" class="alert mb-3" role="alert"
         th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : (${tipoMensaje == 'warning'} ? 'alert-warning' : 'alert-danger')">
        <span th:text="${mensaje}"></span>
    </div>

    <div class="d-flex gap-3 flex-wrap mb-4">
        <div class="stat-card-simple">
            <div class="stat-label" th:text="#{roles.stats.total}">Total roles</div>
            <div class="stat-value" th:text="${totalRoles}">0</div>
        </div>
        <div class="stat-card-simple">
            <div class="stat-label" th:text="#{roles.stats.activos}">Activos</div>
            <div class="stat-value" th:text="${rolesActivos}" style="color:#16a34a;">0</div>
        </div>
    </div>

    <div class="table-card mb-4">
        <div class="table-count">
            <span th:text="${totalRoles}">0</span> <span th:text="#{roles.title}">roles</span>
        </div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="padding-left:1.25rem;" th:text="#{label.nombre}">Nombre</th>
                    <th th:text="#{label.descripcion}">Descripción</th>
                    <th th:text="#{roles.table.modulos}">Módulos</th>
                    <th class="text-center" th:text="#{label.estado}">Estado</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="rol : ${roles}">
                    <td style="padding-left:1.25rem;">
                        <span class="fw-semibold" th:text="${rol.nombre}">-</span>
                        <span th:if="${rol.esSistema}" class="sistema-badge ms-1" th:text="#{roles.badge.sistema}">Sistema</span>
                    </td>
                    <td>
                        <span class="text-muted" style="font-size:0.85rem;"
                              th:text="${rol.descripcion != null and !rol.descripcion.isEmpty()} ? ${rol.descripcion} : '—'">—</span>
                    </td>
                    <td>
                        <span th:if="${rol.permisos.isEmpty()}" class="text-muted" style="font-size:0.8rem;" th:text="#{roles.sin.modulos}">Sin módulos</span>
                        <span th:each="p : ${rol.permisos}" th:if="${p.puedeVer or p.puedeCrear or p.puedeEditar or p.puedeEliminar}"
                              class="modulo-badge" th:text="${p.modulo}">MOD</span>
                    </td>
                    <td class="text-center">
                        <span th:if="${rol.activo}" class="badge bg-success" th:text="#{badge.activo}">Activo</span>
                        <span th:unless="${rol.activo}" class="badge bg-secondary" th:text="#{badge.inactivo}">Inactivo</span>
                    </td>
                    <td class="pe-3">
                        <div class="d-flex align-items-center justify-content-end gap-1 flex-nowrap">
                            <a th:href="@{/admin/roles/editar/{id}(id=${rol.id})}"
                               class="action-link edit" th:title="#{action.edit}">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <span class="action-sep">·</span>
                            <form th:if="${!rol.esSistema}"
                                  th:action="@{/admin/roles/{id}/toggle(id=${rol.id})}" method="post" style="display:contents;">
                                <button type="submit" class="action-link p-0"
                                        th:classappend="${rol.activo} ? 'toggle-on' : 'toggle-off'"
                                        th:title="${rol.activo} ? #{action.deactivate} : #{action.activate}">
                                    <i class="bi" th:classappend="${rol.activo} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                </button>
                            </form>
                            <span th:if="${rol.esSistema}" class="action-link toggle-on" style="cursor:default;">
                                <i class="bi bi-toggle-on"></i>
                            </span>
                            <span class="action-sep" th:if="${!rol.esSistema}">·</span>
                            <form th:if="${!rol.esSistema}"
                                  th:action="@{/admin/roles/{id}/eliminar(id=${rol.id})}" method="post" style="display:contents;">
                                <button type="submit" class="action-link del p-0"
                                        th:title="#{action.delete}"
                                        th:attr="data-confirm=#{roles.confirm.eliminar}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${roles.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4" th:text="#{roles.empty}">No hay roles configurados</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
