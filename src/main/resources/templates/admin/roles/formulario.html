<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + (${modoEdicion} ? #{roles.editar} : #{roles.nuevo})">Alera - Rol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .page-header { padding: 1.75rem 0 1rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.2rem; }
        .page-header .subtitle { color: #94a3b8; font-size: 0.875rem; }
        .form-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .form-card-title { font-size: 0.85rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem; }
        /* Matriz de permisos */
        .perm-table th { font-size: 0.7rem; font-weight: 600; color: #64748b; text-transform: uppercase; padding: 0.5rem 0.75rem; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .perm-table td { padding: 0.6rem 0.75rem; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        .perm-table tbody tr:hover { background: #f8fafc; }
        .perm-table .modulo-name { font-weight: 600; font-size: 0.875rem; color: #1e293b; }
        .perm-table .modulo-desc { font-size: 0.75rem; color: #94a3b8; }
        .perm-check { width: 1.1rem; height: 1.1rem; accent-color: var(--verde-zymos, #2563eb); cursor: pointer; }
        .check-all { accent-color: #64748b; cursor: pointer; width: 1rem; height: 1rem; }
        .col-check { text-align: center; min-width: 70px; }
        .row-all-cell { text-align: center; }
        html.dark-mode .page-header h1 { color: var(--dm-text); }
        html.dark-mode .form-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .form-card-title { color: var(--dm-text-muted); }
        html.dark-mode .perm-table th { background: var(--dm-input); color: var(--dm-text-muted); border-color: var(--dm-border-light); }
        html.dark-mode .perm-table td { border-color: var(--dm-border-faint); }
        html.dark-mode .perm-table tbody tr:hover { background: var(--dm-hover); }
        html.dark-mode .perm-table .modulo-name { color: var(--dm-text); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1>
                <i class="bi bi-shield-lock me-2"></i>
                <span th:text="${modoEdicion} ? #{roles.editar} : #{roles.nuevo}">Nuevo Rol</span>
            </h1>
            <p class="subtitle mb-0">
                <a th:href="@{/admin/roles}" class="text-decoration-none text-muted">
                    <i class="bi bi-arrow-left me-1"></i><span th:text="#{roles.title}">Roles</span>
                </a>
            </p>
        </div>
    </div>

    <div th:if="${mensaje}" class="alert mb-3" role="alert"
         th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : 'alert-danger'">
        <span th:text="${mensaje}"></span>
    </div>

    <form th:action="${modoEdicion} ? @{/admin/roles/actualizar/{id}(id=${rol.id})} : @{/admin/roles/guardar}"
          method="post">

        <!-- Datos básicos -->
        <div class="form-card mb-3">
            <div class="form-card-title" th:text="#{roles.form.datos}">Información del Rol</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold" th:text="#{label.nombre}">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" required maxlength="100"
                           th:value="${rol != null} ? ${rol.nombre} : ''"
                           th:placeholder="#{roles.form.ph.nombre}" placeholder="Ej: Recursos Humanos">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-semibold" th:text="#{label.descripcion}">Descripción</label>
                    <input type="text" name="descripcion" class="form-control" maxlength="255"
                           th:value="${rol != null and rol.descripcion != null} ? ${rol.descripcion} : ''"
                           th:placeholder="#{roles.form.ph.descripcion}" placeholder="Descripción opcional">
                </div>
                <div class="col-md-2" th:if="${modoEdicion and rol != null and !rol.esSistema}">
                    <label class="form-label small fw-semibold d-block" th:text="#{label.estado}">Estado</label>
                    <div class="form-check form-switch mt-1">
                        <input class="form-check-input" type="checkbox" name="activo" value="true"
                               th:checked="${rol.activo}" id="switchActivo">
                        <label class="form-check-label small" for="switchActivo" th:text="#{badge.activo}">Activo</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Matriz de permisos -->
        <div class="form-card mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-card-title mb-0" th:text="#{roles.form.permisos}">Permisos por Módulo</div>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="btnToggleTodos">
                    <i class="bi bi-check2-square me-1"></i><span th:text="#{roles.form.btn.todos}">Marcar todo</span>
                </button>
            </div>
            <div class="table-responsive">
                <table class="table perm-table mb-0">
                    <thead>
                    <tr>
                        <th style="min-width:180px;" th:text="#{roles.table.modulos}">Módulo</th>
                        <th class="col-check">
                            <div th:text="#{roles.perm.ver}">Ver</div>
                            <input type="checkbox" class="check-all mt-1" data-col="Ver" title="Todos Ver">
                        </th>
                        <th class="col-check">
                            <div th:text="#{roles.perm.crear}">Crear</div>
                            <input type="checkbox" class="check-all mt-1" data-col="Crear" title="Todos Crear">
                        </th>
                        <th class="col-check">
                            <div th:text="#{roles.perm.editar}">Editar</div>
                            <input type="checkbox" class="check-all mt-1" data-col="Editar" title="Todos Editar">
                        </th>
                        <th class="col-check">
                            <div th:text="#{roles.perm.eliminar}">Eliminar</div>
                            <input type="checkbox" class="check-all mt-1" data-col="Eliminar" title="Todos Eliminar">
                        </th>
                        <th class="col-check" th:text="#{roles.perm.todos}">Todos</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="modulo : ${modulos}">
                        <td>
                            <div class="modulo-name" th:text="${modulo.displayName}">Módulo</div>
                        </td>
                        <!-- VER -->
                        <td class="row-all-cell">
                            <input type="checkbox" class="perm-check" name="modulosVer"
                                   th:value="${modulo.name()}"
                                   th:checked="${rol != null and rol.permisos != null and !#lists.isEmpty(rol.permisos.?[modulo == '__${modulo.name()}__' and puedeVer])}">
                        </td>
                        <!-- CREAR -->
                        <td class="row-all-cell">
                            <input type="checkbox" class="perm-check" name="modulosCrear"
                                   th:value="${modulo.name()}"
                                   th:checked="${rol != null and rol.permisos != null and !#lists.isEmpty(rol.permisos.?[modulo == '__${modulo.name()}__' and puedeCrear])}">
                        </td>
                        <!-- EDITAR -->
                        <td class="row-all-cell">
                            <input type="checkbox" class="perm-check" name="modulosEditar"
                                   th:value="${modulo.name()}"
                                   th:checked="${rol != null and rol.permisos != null and !#lists.isEmpty(rol.permisos.?[modulo == '__${modulo.name()}__' and puedeEditar])}">
                        </td>
                        <!-- ELIMINAR -->
                        <td class="row-all-cell">
                            <input type="checkbox" class="perm-check" name="modulosEliminar"
                                   th:value="${modulo.name()}"
                                   th:checked="${rol != null and rol.permisos != null and !#lists.isEmpty(rol.permisos.?[modulo == '__${modulo.name()}__' and puedeEliminar])}">
                        </td>
                        <!-- TODOS (fila) -->
                        <td class="row-all-cell">
                            <input type="checkbox" class="perm-check check-row"
                                   th:checked="${rol != null and rol.permisos != null and !#lists.isEmpty(rol.permisos.?[modulo == '__${modulo.name()}__' and puedeVer and puedeCrear and puedeEditar and puedeEliminar])}">
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-2 text-muted" style="font-size:0.78rem;">
                <i class="bi bi-info-circle me-1"></i>
                <span th:text="#{roles.form.nota.bpm}">Los usuarios con rol custom que tengan BPM → VER podrán acceder al módulo BPM.</span>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-check-circle me-1"></i>
                <span th:text="${modoEdicion} ? #{action.save} : #{roles.crear}">Crear Rol</span>
            </button>
            <a th:href="@{/admin/roles}" class="btn btn-outline-secondary btn-sm" th:text="#{action.cancel}">Cancelar</a>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
document.addEventListener('DOMContentLoaded', function () {
    // Checkbox "todos" por columna
    document.querySelectorAll('.check-all[data-col]').forEach(function(colChk) {
        colChk.addEventListener('change', function() {
            var col = this.dataset.col;
            var nameMap = { Ver: 'modulosVer', Crear: 'modulosCrear', Editar: 'modulosEditar', Eliminar: 'modulosEliminar' };
            document.querySelectorAll('input[name="' + nameMap[col] + '"]').forEach(function(c) { c.checked = colChk.checked; });
            sincronizarFilas();
        });
    });

    // Checkbox "todos" por fila
    document.querySelectorAll('.check-row').forEach(function(rowChk) {
        rowChk.addEventListener('change', function() {
            var row = this.closest('tr');
            row.querySelectorAll('.perm-check:not(.check-row)').forEach(function(c) { c.checked = rowChk.checked; });
        });
    });

    // Cuando un permiso individual cambia, actualizar check-row de la fila
    document.querySelectorAll('.perm-check:not(.check-row):not(.check-all)').forEach(function(chk) {
        chk.addEventListener('change', sincronizarFilas);
    });

    function sincronizarFilas() {
        document.querySelectorAll('tbody tr').forEach(function(row) {
            var checks = row.querySelectorAll('.perm-check:not(.check-row)');
            var checkRow = row.querySelector('.check-row');
            if (checkRow) checkRow.checked = Array.from(checks).every(function(c) { return c.checked; });
        });
    }

    // Botón "Marcar todo"
    var btnTodos = document.getElementById('btnToggleTodos');
    var todosSeleccionados = false;
    btnTodos.addEventListener('click', function() {
        todosSeleccionados = !todosSeleccionados;
        document.querySelectorAll('.perm-check').forEach(function(c) { c.checked = todosSeleccionados; });
        document.querySelectorAll('.check-all').forEach(function(c) { c.checked = todosSeleccionados; });
        var icon = btnTodos.querySelector('i');
        var label = btnTodos.querySelector('span');
        if (todosSeleccionados) {
            icon.className = 'bi bi-x-square me-1';
            label.textContent = label.getAttribute('data-deselect') || 'Desmarcar todo';
        } else {
            icon.className = 'bi bi-check2-square me-1';
            label.textContent = label.getAttribute('data-select') || 'Marcar todo';
        }
    });
});
</script>
</body>
</html>
