<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Tenants'">Alera - Tenants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Carga las fuentes de cada tenant para el preview -->
    <th:block th:each="t : ${tenants}">
        <link th:if="${t.fontHeadings != null and t.fontHeadings != 'Cinzel'}"
              th:href="@{'https://fonts.googleapis.com/css2?family=' + ${#strings.replace(t.fontHeadings,' ','+')} + ':wght@400;600;700&display=swap'}"
              rel="stylesheet">
    </th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-building-gear me-2"></i>Gestión de Tenants</h1>
            <p>Clientes registrados en la plataforma multi-tenant</p>
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-info" id="btnVerificarAlertas"
                    onclick="verificarAlertas()">
                <i class="bi bi-bell me-1"></i>Verificar alertas
            </button>
            <form th:action="@{/admin/tenants/cache/evict}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-warning">
                    <i class="bi bi-arrow-clockwise me-1"></i>Limpiar cache
                </button>
            </form>
            <a th:href="@{/admin/tenants/nuevo}" class="btn btn-zymos">
                <i class="bi bi-plus-circle me-1"></i>Nuevo Tenant
            </a>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <div th:if="${#lists.isEmpty(tenants)}" class="text-center text-muted py-5">
        <i class="bi bi-building" style="font-size:3rem; opacity:.4;"></i>
        <p class="mt-3">No hay tenants registrados aún</p>
    </div>

    <div class="row g-3">
        <div class="col-xl-4 col-md-6" th:each="t : ${tenants}">
            <div class="card-zymos h-100 overflow-hidden"
                 th:classappend="${!t.active} ? 'opacity-75' : ''">

                <!-- Franja de colores -->
                <div class="d-flex" style="height:10px;">
                    <div class="flex-fill" th:style="'background:' + ${t.colorNavbar}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorPrimary}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorAccent}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorAccentHover}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorCream}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorBodyBg}"></div>
                </div>

                <div class="p-3">
                    <!-- Subdomain + estado -->
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="d-flex align-items-center gap-2">
                            <code class="text-muted small" th:text="${t.subdomain}">default</code>
                            <span th:if="${t.active}" class="badge bg-success" style="font-size:.65rem;">Activo</span>
                            <span th:unless="${t.active}" class="badge bg-secondary" style="font-size:.65rem;">Inactivo</span>
                            <span th:if="${t.alertasIntentosFallidos > 0}"
                                  class="badge bg-warning text-dark"
                                  style="font-size:.65rem; cursor:default;"
                                  th:title="${'Email: ' + t.alertasIntentosFallidos + ' fallo(s) consecutivo(s)' + (t.alertasUltimoIntento != null ? ' · Último: ' + #temporals.format(t.alertasUltimoIntento, 'dd/MM HH:mm') : '')}">
                                <i class="bi bi-envelope-exclamation me-1"></i><span th:text="${t.alertasIntentosFallidos}"></span>
                            </span>
                        </div>
                        <i th:if="${!#strings.isEmpty(t.logoUrl)}"
                           class="bi bi-image text-muted" title="Tiene logo configurado"
                           style="font-size:.85rem;"></i>
                    </div>

                    <!-- Nombre y tagline -->
                    <h5 class="mb-1" th:text="${t.name}"
                        th:style="${t.fontHeadings != null} ? 'font-family: \'' + ${t.fontHeadings} + '\', serif' : ''">Nombre del tenant</h5>
                    <p class="text-muted small mb-3"
                       th:text="${!#strings.isEmpty(t.tagline)} ? ${t.tagline} : 'Sin tagline'"
                       th:classappend="${#strings.isEmpty(t.tagline)} ? 'fst-italic' : ''">Tagline</p>

                    <!-- Mini navbar preview -->
                    <div class="rounded-2 mb-3 px-2 py-2 d-flex align-items-center gap-2"
                         th:style="'background:' + ${t.colorNavbar}">
                        <i class="bi bi-droplet-fill"
                           th:unless="${!#strings.isEmpty(t.logoUrl)}"
                           th:style="'color:' + ${t.colorAccent} + '; font-size:.9rem;'"></i>
                        <img th:if="${!#strings.isEmpty(t.logoUrl)}"
                             th:src="${t.logoUrl}" alt="" style="height:18px; object-fit:contain;">
                        <span class="small fw-bold"
                              th:style="'font-family:\'' + ${t.fontHeadings != null ? t.fontHeadings : 'Cinzel'} + '\'; font-size:.8rem; flex:1; color:' + ${t.colorCream}"
                              th:text="${t.name}">Nombre</span>
                        <span class="rounded px-2 small"
                              th:style="'background:' + ${t.colorAccent} + '; color:' + ${t.colorNavbar} + '; font-size:.7rem; padding-top:2px; padding-bottom:2px;'">
                            Preview
                        </span>
                    </div>

                    <!-- Acciones -->
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/admin/tenants/editar/{sub}(sub=${t.subdomain})}"
                           class="btn btn-zymos-outline btn-sm flex-fill">
                            <i class="bi bi-pencil me-1"></i>Editar
                        </a>
                        <a th:href="@{/admin/tenants/{sub}/usuarios(sub=${t.subdomain})}"
                           class="btn btn-outline-secondary btn-sm flex-fill">
                            <i class="bi bi-people me-1"></i>Usuarios
                        </a>
                        <a th:href="@{/admin/tenants/{sub}/historial(sub=${t.subdomain})}"
                           class="btn btn-outline-secondary btn-sm flex-fill">
                            <i class="bi bi-clock-history me-1"></i>Historial
                        </a>
                        <a th:href="@{/admin/migracion/{sub}(sub=${t.subdomain})}"
                           class="btn btn-outline-info btn-sm flex-fill">
                            <i class="bi bi-cloud-upload me-1"></i>Migración
                        </a>
                        <form th:action="@{/admin/tenants/{sub}/toggle(sub=${t.subdomain})}" method="post">
                            <button type="submit" class="btn btn-sm"
                                    th:classappend="${t.active} ? 'btn-outline-warning' : 'btn-outline-success'">
                                <i class="bi" th:classappend="${t.active} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
function verificarAlertas() {
    var btn = document.getElementById('btnVerificarAlertas');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Verificando...';
    fetch('/alertas/ejecutar', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { [_csrfHeader()]: _csrfToken() }
    })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function() {
        btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Alertas verificadas';
        btn.className = 'btn btn-outline-success';
        setTimeout(function() {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-bell me-1"></i>Verificar alertas';
            btn.className = 'btn btn-outline-info';
        }, 3000);
    })
    .catch(function() {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-bell me-1"></i>Verificar alertas';
        btn.className = 'btn btn-outline-danger';
        setTimeout(function() { btn.className = 'btn btn-outline-info'; }, 3000);
    });
}
</script>
</body>
</html>
