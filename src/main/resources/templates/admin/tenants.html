<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Tenants'">Alera - Tenants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Carga las fuentes de cada tenant para el preview -->
    <th:block th:each="t : ${tenants}">
        <link th:if="${t.fontHeadings != null and t.fontHeadings != 'Cinzel'}"
              th:href="@{'https://fonts.googleapis.com/css2?family=' + ${#strings.replace(t.fontHeadings,' ','+')} + ':wght@400;600;700&display=swap'}"
              rel="stylesheet">
    </th:block>
    <style>
        .tenant-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }
        .tenant-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
        .tenant-card.inactive { opacity: 0.72; }
        .tenant-card-body { padding: 1rem 1.25rem; }
        .tenant-subdomain {
            font-family: monospace;
            font-size: 0.78rem;
            color: #64748b;
            background: #f1f5f9;
            border-radius: 4px;
            padding: 1px 6px;
        }
        .tenant-name {
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0.4rem 0 0.15rem;
        }
        .tenant-tagline {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.75rem;
        }
        .tenant-preview {
            border-radius: 5px;
            padding: 0.4rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.875rem;
        }
        .tenant-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .tenant-actions .btn { font-size: 0.75rem; padding: 0.25rem 0.6rem; }

        html.dark-mode .tenant-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .tenant-subdomain { background: var(--dm-input); color: var(--dm-text-muted); }
        html.dark-mode .tenant-name { color: var(--dm-text); }
        html.dark-mode .tenant-tagline { color: var(--dm-text-muted); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4" style="max-width:1400px;">

    <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
            <h1><i class="bi bi-building-gear me-2"></i>Gestión de Tenants</h1>
            <div class="subtitle">Clientes registrados en la plataforma multi-tenant</div>
        </div>
        <div class="d-flex gap-2 flex-wrap align-items-center">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnVerificarAlertas"
                    onclick="verificarAlertas()">
                <i class="bi bi-bell me-1"></i>Verificar alertas
            </button>
            <form th:action="@{/admin/tenants/cache/evict}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-clockwise me-1"></i>Limpiar cache
                </button>
            </form>
            <a th:href="@{/admin/tenants/nuevo}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-circle me-1"></i>Nuevo Tenant
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(tenants)}" class="content-card text-center py-5 text-muted">
        <i class="bi bi-building" style="font-size:2.5rem; opacity:.3;"></i>
        <p class="mt-3 mb-0">No hay tenants registrados aún</p>
    </div>

    <div class="row g-3 pb-4">
        <div class="col-xl-4 col-md-6" th:each="t : ${tenants}">
            <div class="tenant-card h-100" th:classappend="${!t.active} ? 'inactive' : ''">

                <!-- Color strip -->
                <div class="d-flex" style="height:6px;">
                    <div class="flex-fill" th:style="'background:' + ${t.colorNavbar}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorPrimary}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorAccent}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorAccentHover}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorCream}"></div>
                    <div class="flex-fill" th:style="'background:' + ${t.colorBodyBg}"></div>
                </div>

                <div class="tenant-card-body">
                    <!-- Header row: subdomain + badges -->
                    <div class="d-flex align-items-center gap-2 flex-wrap mb-1">
                        <span class="tenant-subdomain" th:text="${t.subdomain}">default</span>
                        <span th:if="${t.active}" class="badge bg-success" style="font-size:.65rem;">Activo</span>
                        <span th:unless="${t.active}" class="badge bg-secondary" style="font-size:.65rem;">Inactivo</span>
                        <span th:if="${t.alertasIntentosFallidos > 0}"
                              class="badge bg-warning text-dark"
                              style="font-size:.65rem; cursor:default;"
                              th:title="${'Email: ' + t.alertasIntentosFallidos + ' fallo(s) consecutivo(s)' + (t.alertasUltimoIntento != null ? ' · Último: ' + #temporals.format(t.alertasUltimoIntento, 'dd/MM HH:mm') : '')}">
                            <i class="bi bi-envelope-exclamation me-1"></i><span th:text="${t.alertasIntentosFallidos}"></span>
                        </span>
                        <span th:if="${t.planFin != null and t.planVencido}"
                              class="badge bg-danger" style="font-size:.65rem;"
                              th:title="${'Plan vencido desde ' + #temporals.format(t.planFin,'dd/MM/yyyy')}">
                            <i class="bi bi-calendar-x me-1"></i>Vencido
                        </span>
                        <span th:if="${t.planFin != null and !t.planVencido and t.planPorVencer}"
                              class="badge bg-warning text-dark" style="font-size:.65rem;"
                              th:title="${'Plan vence: ' + #temporals.format(t.planFin,'dd/MM/yyyy')}">
                            <i class="bi bi-calendar-exclamation me-1"></i>Por vencer
                        </span>
                        <span th:if="${t.planFin != null and !t.planVencido and !t.planPorVencer}"
                              class="badge bg-info text-dark" style="font-size:.65rem;"
                              th:title="${'Plan vigente hasta ' + #temporals.format(t.planFin,'dd/MM/yyyy')}">
                            <i class="bi bi-calendar-check me-1"></i><span th:text="${#temporals.format(t.planFin,'dd/MM/yy')}"></span>
                        </span>
                        <i th:if="${!#strings.isEmpty(t.logoUrl)}"
                           class="bi bi-image text-muted ms-auto" title="Tiene logo configurado"
                           style="font-size:.85rem;"></i>
                    </div>

                    <!-- Name & tagline -->
                    <div class="tenant-name" th:text="${t.name}"
                         th:style="${t.fontHeadings != null} ? 'font-family: \'' + ${t.fontHeadings} + '\', serif' : ''">Nombre</div>
                    <div class="tenant-tagline"
                         th:text="${!#strings.isEmpty(t.tagline)} ? ${t.tagline} : 'Sin tagline'"
                         th:classappend="${#strings.isEmpty(t.tagline)} ? 'fst-italic' : ''">Tagline</div>

                    <!-- Mini navbar preview -->
                    <div class="tenant-preview mb-3"
                         th:style="'background:' + ${t.colorNavbar}">
                        <i class="bi bi-droplet-fill"
                           th:unless="${!#strings.isEmpty(t.logoUrl)}"
                           th:style="'color:' + ${t.colorAccent} + '; font-size:.85rem;'"></i>
                        <img th:if="${!#strings.isEmpty(t.logoUrl)}"
                             th:src="${t.logoUrl}" alt="" style="height:16px; object-fit:contain;">
                        <span style="flex:1; font-size:.78rem; font-weight:600;"
                              th:style="'font-family:\'' + ${t.fontHeadings != null ? t.fontHeadings : 'Cinzel'} + '\'; font-size:.78rem; font-weight:600; color:' + ${t.colorCream}"
                              th:text="${t.name}">Nombre</span>
                        <span class="rounded px-2"
                              style="font-size:.68rem; padding-top:2px; padding-bottom:2px;"
                              th:style="'background:' + ${t.colorAccent} + '; color:' + ${t.colorNavbar} + '; font-size:.68rem; padding:2px 8px; border-radius:4px;'">
                            Preview
                        </span>
                    </div>

                    <!-- Actions -->
                    <div class="tenant-actions">
                        <a th:href="@{/admin/tenants/editar/{sub}(sub=${t.subdomain})}"
                           class="btn btn-outline-primary">
                            <i class="bi bi-pencil me-1"></i>Editar
                        </a>
                        <a th:href="@{/admin/tenants/{sub}/usuarios(sub=${t.subdomain})}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-people me-1"></i>Usuarios
                        </a>
                        <a th:href="@{/admin/tenants/{sub}/metricas(sub=${t.subdomain})}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-bar-chart-line me-1"></i>Métricas
                        </a>
                        <a th:href="@{/admin/tenants/{sub}/historial(sub=${t.subdomain})}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-clock-history me-1"></i>Historial
                        </a>
                        <a th:href="@{/admin/migracion/{sub}(sub=${t.subdomain})}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-cloud-upload me-1"></i>Migración
                        </a>
                        <form th:action="@{/admin/tenants/{sub}/toggle(sub=${t.subdomain})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn"
                                    th:classappend="${t.active} ? 'btn-outline-warning' : 'btn-outline-success'"
                                    th:title="${t.active} ? 'Desactivar' : 'Activar'">
                                <i class="bi" th:classappend="${t.active} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
function verificarAlertas() {
    var btn = document.getElementById('btnVerificarAlertas');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Verificando...';
    fetch('/alertas/ejecutar', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { [_csrfHeader()]: _csrfToken() }
    })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function() {
        btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Alertas verificadas';
        btn.className = 'btn btn-outline-success btn-sm';
        setTimeout(function() {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-bell me-1"></i>Verificar alertas';
            btn.className = 'btn btn-outline-secondary btn-sm';
        }, 3000);
    })
    .catch(function() {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-bell me-1"></i>Verificar alertas';
        btn.className = 'btn btn-outline-danger btn-sm';
        setTimeout(function() { btn.className = 'btn btn-outline-secondary btn-sm'; }, 3000);
    });
}
</script>
</body>
</html>
