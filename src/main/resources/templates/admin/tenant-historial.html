<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Historial de ' + ${tenant.subdomain}">Alera - Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4" style="max-width:900px;">

    <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
            <h1><i class="bi bi-clock-history me-2"></i>Historial — <code th:text="${tenant.subdomain}">tenant</code></h1>
            <div class="subtitle" th:text="${tenant.name} + ' · ' + ${historial.size()} + ' evento(s)'">Tenant</div>
        </div>
        <a th:href="@{/admin/tenants/editar/{s}(s=${tenant.subdomain})}" class="btn btn-outline-secondary btn-sm align-self-start">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <div class="table-card mb-4">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Acción</th>
                        <th>Usuario</th>
                        <th>Detalles</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(historial)}">
                        <td colspan="4" class="text-center text-muted py-5">
                            <i class="bi bi-inbox d-block mb-2" style="font-size:1.5rem; opacity:.4;"></i>
                            Sin eventos registrados
                        </td>
                    </tr>
                    <tr th:each="h : ${historial}">
                        <td class="text-nowrap text-muted small"
                            th:text="${#temporals.format(h.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span class="badge"
                                  th:text="${h.accion}"
                                  th:style="${h.accion == 'CREADO'} ? 'background:#2563eb;color:white'
                                           : (${h.accion == 'EDITADO'} ? 'background:#0284c7;color:white'
                                           : (${h.accion == 'ACTIVADO'} ? 'background:#16a34a;color:white'
                                           : (${h.accion == 'DESACTIVADO'} ? 'background:#64748b;color:white'
                                           : (${h.accion.startsWith('USUARIO')} ? 'background:#7c3aed;color:white'
                                           : 'background:#64748b;color:white'))))">
                            </span>
                        </td>
                        <td class="small" th:text="${h.usuario ?: '-'}"></td>
                        <td class="small text-muted" style="max-width:360px; word-break:break-word;" th:text="${h.detalles ?: '-'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-simple">
            <div th:replace="~{fragments/paginacion :: paginacion}"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
