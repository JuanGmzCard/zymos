<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Historial de ' + ${tenant.subdomain}">Alera - Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-clock-history me-2"></i>Historial — <code th:text="${tenant.subdomain}">tenant</code></h1>
            <p th:text="${tenant.name} + ' · ' + ${historial.size()} + ' evento(s)'">Tenant</p>
        </div>
        <a th:href="@{/admin/tenants/editar/{s}(s=${tenant.subdomain})}" class="btn btn-alera-outline">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>
</div>

<div class="container-fluid px-4 py-4" style="max-width:860px;">
    <div class="card-alera p-0 overflow-hidden">
        <table class="table mb-0 align-middle">
            <thead>
                <tr>
                    <th class="detail-label px-3 py-2">Fecha</th>
                    <th class="detail-label px-3 py-2">Acción</th>
                    <th class="detail-label px-3 py-2">Usuario</th>
                    <th class="detail-label px-3 py-2">Detalles</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(historial)}">
                    <td colspan="4" class="text-center text-muted py-4">Sin eventos registrados</td>
                </tr>
                <tr th:each="h : ${historial}">
                    <td class="px-3 py-2 text-muted small text-nowrap"
                        th:text="${#temporals.format(h.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="px-3 py-2">
                        <span class="badge"
                              th:text="${h.accion}"
                              th:style="${h.accion == 'CREADO'} ? 'background:var(--dorado);color:#222'
                                       : (${h.accion == 'EDITADO'} ? 'background:#0288D1;color:white'
                                       : (${h.accion == 'ACTIVADO'} ? 'background:#198754;color:white'
                                       : (${h.accion == 'DESACTIVADO'} ? 'background:#6c757d;color:white'
                                       : (${h.accion.startsWith('USUARIO')} ? 'background:#7b2d8b;color:white'
                                       : 'background:#6c757d;color:white'))))">
                        </span>
                    </td>
                    <td class="px-3 py-2 small" th:text="${h.usuario ?: '-'}"></td>
                    <td class="px-3 py-2 small text-muted" th:text="${h.detalles ?: '-'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
