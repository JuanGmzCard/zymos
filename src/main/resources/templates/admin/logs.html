<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + #{admin.log.title}">Alera - Log de Accesos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4" style="max-width:1300px;">

    <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
            <h1><i class="bi bi-shield-lock me-2"></i><span th:text="#{admin.log.title}">Log de Accesos</span></h1>
            <div class="subtitle" th:text="#{admin.log.subtitle}">Registro de intentos de login y accesos denegados</div>
        </div>
        <div th:if="${fallidosHora > 0}"
             class="alert alert-warning mb-0 py-2 px-3 d-flex align-items-center gap-2 align-self-start">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="#{admin.log.alerta.fallidos(${fallidosHora})}"></span>
        </div>
    </div>

    <!-- Filtros -->
    <div class="filter-card d-flex align-items-center gap-2 flex-wrap mb-3">
        <span class="small text-muted fw-semibold me-1" th:text="#{admin.log.filtrar}">Filtrar:</span>
        <a th:href="@{/admin/logs}" class="btn btn-sm"
           th:classappend="${tipoFiltro.isBlank()} ? 'btn-primary' : 'btn-outline-secondary'"
           th:text="#{admin.log.filter.todos}">Todos</a>
        <a th:href="@{/admin/logs(tipo='LOGIN_OK')}" class="btn btn-sm"
           th:classappend="${tipoFiltro == 'LOGIN_OK'} ? 'btn-success' : 'btn-outline-success'">
            <i class="bi bi-check-circle me-1"></i><span th:text="#{admin.log.filter.ok}">Login OK</span></a>
        <a th:href="@{/admin/logs(tipo='LOGIN_FALLIDO')}" class="btn btn-sm"
           th:classappend="${tipoFiltro == 'LOGIN_FALLIDO'} ? 'btn-danger' : 'btn-outline-danger'">
            <i class="bi bi-x-circle me-1"></i><span th:text="#{admin.log.filter.fallidos}">Fallidos</span></a>
        <a th:href="@{/admin/logs(tipo='ACCESO_DENEGADO')}" class="btn btn-sm"
           th:classappend="${tipoFiltro == 'ACCESO_DENEGADO'} ? 'btn-warning' : 'btn-outline-warning'">
            <i class="bi bi-shield-x me-1"></i><span th:text="#{admin.log.filter.denegados}">Denegados</span></a>
        <span class="ms-auto small text-muted"
              th:text="#{admin.log.registros(${totalRegistros})}"></span>
    </div>

    <!-- Tabla -->
    <div class="table-card mb-4">
        <div class="table-responsive">
            <table class="table mb-0" style="font-size:0.8rem;">
                <thead>
                    <tr>
                        <th th:text="#{admin.log.col.fecha}">Fecha</th>
                        <th th:text="#{admin.log.col.tipo}">Tipo</th>
                        <th th:text="#{admin.log.col.usuario}">Usuario</th>
                        <th th:text="#{admin.log.col.ip}">IP</th>
                        <th th:text="#{admin.log.col.url}">URL</th>
                        <th th:text="#{admin.log.col.detalles}">Detalles</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="6" class="text-center text-muted py-5">
                            <i class="bi bi-shield-check d-block mb-2" style="font-size:1.5rem; opacity:.4;"></i>
                            <span th:text="#{admin.log.empty}">Sin registros</span>
                        </td>
                    </tr>
                    <tr th:each="entry : ${logs}">
                        <td class="text-muted text-nowrap"
                            th:text="${#temporals.format(entry.fecha,'dd/MM/yyyy HH:mm:ss')}">—</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${entry.tipo == 'LOGIN_OK'} ? 'bg-success' :
                                                  (${entry.tipo == 'LOGIN_FALLIDO'} ? 'bg-danger' : 'bg-warning text-dark')"
                                  th:text="${entry.tipo}">—</span>
                        </td>
                        <td class="fw-semibold" th:text="${entry.usuario ?: '—'}">—</td>
                        <td class="text-muted font-monospace" th:text="${entry.ip ?: '—'}">—</td>
                        <td class="text-muted" th:text="${entry.url ?: '—'}">—</td>
                        <td class="text-muted"
                            th:text="${entry.detalles != null} ? ${#strings.abbreviate(entry.detalles, 60)} : '—'">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-simple">
            <div th:replace="~{fragments/paginacion :: paginacion}"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
