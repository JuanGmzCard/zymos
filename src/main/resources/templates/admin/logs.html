<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Log de Accesos'">Alera - Log de Accesos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-shield-lock me-2"></i>Log de Accesos</h1>
            <p>Registro de intentos de login y accesos denegados</p>
        </div>
        <!-- Alerta si hay fallos recientes -->
        <div th:if="${fallidosHora > 0}"
             class="alert alert-warning mb-0 py-2 px-3 d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span><strong th:text="${fallidosHora}"></strong> intento<span th:if="${fallidosHora != 1}">s</span>
                  de login fallido<span th:if="${fallidosHora != 1}">s</span> en la última hora</span>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- Filtros -->
    <div class="d-flex gap-2 mb-3 align-items-center">
        <span class="text-muted small me-1">Filtrar:</span>
        <a th:href="@{/admin/logs}" class="btn btn-sm"
           th:classappend="${tipoFiltro.isBlank()} ? 'btn-zymos' : 'btn-zymos-outline'">Todos</a>
        <a th:href="@{/admin/logs(tipo='LOGIN_OK')}" class="btn btn-sm"
           th:classappend="${tipoFiltro == 'LOGIN_OK'} ? 'btn-success' : 'btn-outline-success'">
            <i class="bi bi-check-circle me-1"></i>Login OK</a>
        <a th:href="@{/admin/logs(tipo='LOGIN_FALLIDO')}" class="btn btn-sm"
           th:classappend="${tipoFiltro == 'LOGIN_FALLIDO'} ? 'btn-danger' : 'btn-outline-danger'">
            <i class="bi bi-x-circle me-1"></i>Fallidos</a>
        <a th:href="@{/admin/logs(tipo='ACCESO_DENEGADO')}" class="btn btn-sm"
           th:classappend="${tipoFiltro == 'ACCESO_DENEGADO'} ? 'btn-warning' : 'btn-outline-warning'">
            <i class="bi bi-shield-x me-1"></i>Denegados</a>
        <span class="ms-auto text-muted small"
              th:text="${totalRegistros} + ' registros'"></span>
    </div>

    <!-- Tabla -->
    <div class="card-zymos">
        <div class="table-responsive">
            <table class="table table-zymos mb-0" style="font-size:0.8rem;">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Usuario</th>
                        <th>IP</th>
                        <th>URL</th>
                        <th>Detalles</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="6" class="text-center text-muted py-4">Sin registros</td>
                    </tr>
                    <tr th:each="entry : ${logs}">
                        <td class="text-muted text-nowrap"
                            th:text="${#temporals.format(entry.fecha,'dd/MM/yyyy HH:mm:ss')}">—</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${entry.tipo == 'LOGIN_OK'} ? 'bg-success' :
                                                  (${entry.tipo == 'LOGIN_FALLIDO'} ? 'bg-danger' : 'bg-warning text-dark')"
                                  th:text="${entry.tipo}">—</span>
                        </td>
                        <td class="fw-600" th:text="${entry.usuario ?: '—'}">—</td>
                        <td class="text-muted font-monospace small" th:text="${entry.ip ?: '—'}">—</td>
                        <td class="text-muted small" th:text="${entry.url ?: '—'}">—</td>
                        <td class="text-muted small"
                            th:text="${entry.detalles != null} ? ${#strings.abbreviate(entry.detalles, 60)} : '—'">—</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-transparent py-2">
            <div th:replace="~{fragments/paginacion :: paginacion}"></div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
