<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding != null ? branding.name : 'Alera'} + ' - Plan vencido'">Alera - Plan vencido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .plan-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .plan-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 3rem 2.5rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
        }
        .plan-icon {
            font-size: 3rem;
            color: var(--dorado);
            margin-bottom: 1rem;
        }
        .plan-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--verde-alera);
            margin-bottom: 1rem;
        }
        .plan-desc {
            color: #6c757d;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="plan-page" style="background:var(--fondo);">

<div class="plan-card">
    <div class="plan-icon">
        <i class="bi bi-exclamation-octagon-fill"></i>
    </div>
    <div class="plan-title">Plan vencido</div>
    <p class="plan-desc">
        El plan de <span th:text="${branding != null ? branding.name : 'tu cuenta'}">tu cuenta</span>
        venció y el período de gracia finalizó. Contacta al administrador para renovarlo y recuperar el acceso.
    </p>
    <a th:href="@{/logout}" class="btn btn-primary px-4">
        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
    </a>
</div>

</body>
</html>
