<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Iniciar Sesión'">Alera - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:inline="text">
@import url('https://fonts.googleapis.com/css2?family=[[${branding.fontHeadings != null ? #strings.replace(branding.fontHeadings, ' ', '+') : 'Cinzel'}]]:wght@400;600;700&family=[[${branding.fontBody != null ? #strings.replace(branding.fontBody, ' ', '+') : 'Raleway'}]]:wght@300;400;500;600&display=swap');
    :root {
        --font-headings: '[[${branding.fontHeadings != null ? branding.fontHeadings : 'Cinzel'}]]', serif;
        --font-body:     '[[${branding.fontBody != null ? branding.fontBody : 'Raleway'}]]', sans-serif;
        --verde-oscuro: [[${branding.colorNavbar}]];
        --verde-alera:  [[${branding.colorPrimary}]];
        --dorado:       [[${branding.colorAccent}]];
        --dorado-claro: [[${branding.colorAccentHover}]];
        --crema:        [[${branding.colorCream}]];
        --fondo:        [[${branding.colorBodyBg}]];
        --texto-claro:  [[${branding.colorCream}]];
    }
    </style>
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <img th:if="${!#strings.isEmpty(branding.logoUrl)}"
                     th:src="${branding.logoUrl}" alt=""
                     style="max-height:90px;max-width:240px;object-fit:contain;">
                <i th:unless="${!#strings.isEmpty(branding.logoUrl)}"
                   class="bi bi-droplet-fill"></i>
            </div>
            <h1 class="login-title" th:text="${branding.name}">Alera</h1>
            <p class="login-subtitle" th:text="${branding.tagline}">Sistema de Trazabilidad Cervecera</p>
        </div>

        <div class="login-body-content">
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>Usuario o contraseña incorrectos
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle me-2"></i>Sesión cerrada correctamente
            </div>
            <div th:if="${param.expired}" class="alert alert-warning">
                <i class="bi bi-clock me-2"></i>Tu sesión expiró por inactividad (30 min). Inicia sesión nuevamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>
        </div>

        <div class="login-footer">
            <small class="text-muted"
                   th:text="${branding.name} + ' © 2024 — Trazabilidad Artesanal'">Alera © 2024 — Trazabilidad Artesanal</small>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
