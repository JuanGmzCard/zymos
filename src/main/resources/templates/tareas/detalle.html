<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${branding.name} + ' - ' + ${tarea.titulo}">Alera - Tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .tarea-item-row { padding:0.6rem 0; border-bottom:1px solid #f1f5f9; display:flex; align-items:flex-start; gap:0.75rem; }
        .tarea-item-row:last-child { border-bottom:none; }
        .item-check { width:20px; height:20px; border-radius:4px; border:2px solid #94a3b8; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:2px; transition:background .15s; }
        .item-check.done { background:#16a34a; border-color:#16a34a; color:#fff; }
        .item-desc.done { text-decoration:line-through; color:#94a3b8; }
        .progress-bar-tall { height:8px; border-radius:4px; }
        html.dark-mode .section-box { background:var(--dm-card); border-color:var(--dm-border-med); }
        html.dark-mode .section-box .sh { border-color:var(--dm-border-med); color:var(--dm-text-soft); }
        html.dark-mode .tarea-item-row { border-color:var(--dm-border-faint); }
        html.dark-mode .item-desc { color:var(--dm-text); }
        html.dark-mode .item-desc.done { color:var(--dm-text-dimmer); }
        html.dark-mode .item-check { border-color:var(--dm-border-heavy); }
        html.dark-mode .detail-label { color:var(--dm-text-muted); }
        html.dark-mode .detail-value { color:var(--dm-text-strong); }
        html.dark-mode .progress { background:var(--dm-input); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1">
                    <li class="breadcrumb-item"><a th:href="@{/tareas}" th:text="#{tarea.title}">Tareas</a></li>
                    <li class="breadcrumb-item active" th:text="${tarea.titulo}">—</li>
                </ol>
            </nav>
            <h1 th:text="${tarea.titulo}">Tarea</h1>
            <div class="d-flex gap-2 align-items-center mt-1">
                <span class="badge" th:classappend="${tarea.estado.badgeClass}" th:text="${tarea.estado.displayName}">—</span>
                <span class="badge prioridad-badge" th:classappend="${tarea.prioridad.badgeClass}"
                      th:text="${tarea.prioridad.displayName}" style="font-size:.7rem;border-radius:4px;padding:2px 8px">—</span>
                <span th:if="${tarea.vencida}" class="badge bg-danger" th:text="#{tarea.label.vencida}">Vencida</span>
            </div>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/tareas/editar/{id}(id=${tarea.id})}"
               sec:authorize="hasAnyRole('ADMIN','SUPERADMIN') or hasAuthority('MODULO_TAREAS_EDITAR')"
               class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-pencil me-1"></i>Editar
            </a>
            <form th:action="@{/tareas/{id}/eliminar(id=${tarea.id})}" method="post" style="display:contents"
                  th:attr="data-confirm=#{tarea.confirm.eliminar}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-danger btn-sm"
                        sec:authorize="hasAnyRole('ADMIN','SUPERADMIN') or hasAuthority('MODULO_TAREAS_ELIMINAR')">
                    <i class="bi bi-trash me-1"></i>Eliminar
                </button>
            </form>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert alert-dismissible mb-3"
         th:classappend="'alert-' + ${tipoMensaje}">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
        <!-- Info -->
        <div class="col-lg-4">
            <div class="section-box mb-3">
                <div class="sh small fw-600 px-3 py-2 text-uppercase" style="color:#64748b;font-size:.7rem">
                    Información
                </div>
                <div class="sb p-3">
                    <div th:if="${tarea.descripcion != null and !tarea.descripcion.isEmpty()}" class="mb-3">
                        <div class="detail-label" th:text="#{tarea.label.descripcion}">Descripción</div>
                        <div class="detail-value" th:text="${tarea.descripcion}">—</div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <div class="detail-label" th:text="#{tarea.label.asignado}">Asignado a</div>
                            <div class="detail-value" th:text="${tarea.asignadoA != null ? tarea.asignadoA : '—'}">—</div>
                        </div>
                        <div class="col-6">
                            <div class="detail-label" th:text="#{tarea.label.creado}">Creado por</div>
                            <div class="detail-value" th:text="${tarea.creadoPor != null ? tarea.creadoPor : '—'}">—</div>
                        </div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <div class="detail-label" th:text="#{tarea.label.vencimiento}">Vencimiento</div>
                            <div class="detail-value"
                                 th:text="${tarea.fechaVencimiento != null ? #temporals.format(tarea.fechaVencimiento,'dd/MM/yyyy') : '—'}"
                                 th:classappend="${tarea.vencida} ? 'text-danger fw-semibold' : ''">—</div>
                        </div>
                        <div class="col-6">
                            <div class="detail-label" th:text="#{tarea.label.creado.en}">Creado el</div>
                            <div class="detail-value"
                                 th:text="${tarea.createdAt != null ? #temporals.format(tarea.createdAt,'dd/MM/yyyy HH:mm') : '—'}">—</div>
                        </div>
                    </div>
                    <div th:if="${tarea.refLabel != null}">
                        <div class="detail-label" th:text="#{tarea.label.referencia}">Referencia</div>
                        <div class="detail-value">
                            <a th:href="${tarea.refUrl}" th:text="${tarea.refLabel}"
                               class="text-decoration-none">—</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ítems -->
        <div class="col-lg-8">
            <div class="section-box">
                <div class="sh px-3 py-2 d-flex justify-content-between align-items-center">
                    <span class="small fw-600 text-uppercase" style="color:#64748b;font-size:.7rem"
                          th:text="#{tarea.label.items}">Ítems</span>
                    <span th:if="${!tarea.items.isEmpty()}" class="small text-muted"
                          th:text="${tarea.porcentajeCompletado} + '% completado'">0%</span>
                </div>
                <div th:if="${!tarea.items.isEmpty()}" class="px-3 pt-2 pb-1">
                    <div class="progress progress-bar-tall mb-3">
                        <div class="progress-bar bg-success" id="progreso-bar"
                             th:style="'width:' + ${tarea.porcentajeCompletado} + '%'"></div>
                    </div>
                </div>
                <div class="sb px-3 pb-3">
                    <div th:if="${tarea.items.isEmpty()}" class="text-muted small text-center py-3"
                         th:text="#{tarea.label.sin.items}">Sin ítems</div>
                    <div th:each="item : ${tarea.items}" class="tarea-item-row"
                         th:id="'item-row-' + ${item.id}">
                        <!-- Checkbox toggle -->
                        <div class="item-check"
                             th:classappend="${item.completado} ? 'done' : ''"
                             th:attr="data-tarea=${tarea.id}, data-item=${item.id}"
                             th:id="'chk-' + ${item.id}">
                            <i class="bi bi-check2" th:if="${item.completado}"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="item-desc" th:classappend="${item.completado} ? 'done' : ''"
                                 th:text="${item.descripcion}" th:id="'desc-' + ${item.id}">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
(function () {
    const csrf = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    document.addEventListener('click', function (e) {
        const chk = e.target.closest('.item-check');
        if (!chk) return;
        const tareaId = chk.dataset.tarea;
        const itemId  = chk.dataset.item;

        fetch('/tareas/' + tareaId + '/items/' + itemId + '/toggle', {
            method: 'POST',
            headers: { [csrfHeader]: csrf, 'Content-Type': 'application/json' }
        })
        .then(r => { if (!r.ok) return null; return r.json(); })
        .then(data => {
            if (!data) return;
            const done = data.completado;
            chk.classList.toggle('done', done);
            chk.innerHTML = done ? '<i class="bi bi-check2"></i>' : '';
            const desc = document.getElementById('desc-' + itemId);
            if (desc) desc.classList.toggle('done', done);
            const bar = document.getElementById('progreso-bar');
            if (bar) bar.style.width = data.pct + '%';
        });
    });
}());
</script>
</body>
</html>
