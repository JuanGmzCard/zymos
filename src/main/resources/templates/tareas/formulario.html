<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf"        th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${branding.name} + ' - ' + (${modoEdicion} ? #{tarea.editar} : #{tarea.nueva})">Alera - Tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .item-row { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:0.75rem 1rem; margin-bottom:0.5rem; }
        .item-row .btn-remove { opacity:0; transition:opacity .15s; }
        .item-row:hover .btn-remove { opacity:1; }

        /* Typeahead referencia */
        .ref-search-wrap { position:relative; }
        .ref-dropdown { position:absolute; top:100%; left:0; right:0; z-index:1000;
            background:#fff; border:1px solid #cbd5e1; border-radius:6px; box-shadow:0 4px 12px rgba(0,0,0,.1);
            max-height:220px; overflow-y:auto; display:none; }
        .ref-dropdown.show { display:block; }
        .ref-item { padding:.5rem .75rem; cursor:pointer; border-bottom:1px solid #f1f5f9; font-size:.875rem; }
        .ref-item:last-child { border-bottom:none; }
        .ref-item:hover, .ref-item.active { background:#f1f5f9; }
        .ref-item .ref-sub { font-size:.75rem; color:#94a3b8; }
        .ref-chip { display:inline-flex; align-items:center; gap:.4rem;
            background:#eff6ff; border:1px solid #bfdbfe; border-radius:20px;
            padding:.2rem .65rem; font-size:.82rem; color:#1d4ed8; }
        .ref-chip .bi-x { cursor:pointer; }

        html.dark-mode .filter-card,
        html.dark-mode .table-card { background:var(--dm-card); border-color:var(--dm-border-med); }
        html.dark-mode .item-row { background:var(--dm-input); border-color:var(--dm-border-med); }
        html.dark-mode .form-control, html.dark-mode .form-select { background:var(--dm-input); color:var(--dm-text); border-color:var(--dm-border-med); }
        html.dark-mode .form-label { color:var(--dm-text-soft); }
        html.dark-mode .ref-dropdown { background:var(--dm-card); border-color:var(--dm-border-med); }
        html.dark-mode .ref-item:hover, html.dark-mode .ref-item.active { background:var(--dm-hover); }
        html.dark-mode .ref-item .ref-sub { color:var(--dm-text-muted); }
        html.dark-mode .ref-chip { background:rgba(37,99,235,.15); border-color:rgba(37,99,235,.35); color:#93c5fd; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera -->
    <div class="page-header">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
                <li class="breadcrumb-item"><a th:href="@{/tareas}" th:text="#{tarea.title}">Tareas</a></li>
                <li class="breadcrumb-item active"
                    th:text="${modoEdicion} ? #{tarea.editar} : #{tarea.nueva}">Nueva Tarea</li>
            </ol>
        </nav>
        <h1 th:text="${modoEdicion} ? #{tarea.editar} : #{tarea.nueva}">Nueva Tarea</h1>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert alert-dismissible mb-3"
         th:classappend="'alert-' + ${tipoMensaje}">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="${modoEdicion} ? @{/tareas/actualizar/{id}(id=${tarea.id})} : @{/tareas/guardar}"
          method="post" id="tareaForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <!-- Referencia (tipo + id) -->
        <input type="hidden" name="refTipo" id="refTipo" th:value="${tarea != null ? tarea.refTipo : ''}">
        <input type="hidden" name="refId"   id="refId"   th:value="${tarea != null ? tarea.refId   : ''}">

        <div class="row g-3">
            <!-- Panel izquierdo -->
            <div class="col-lg-8">
                <div class="table-card p-3 mb-3">
                    <!-- Título -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{tarea.label.titulo}">Título</label>
                        <input type="text" name="titulo" class="form-control" required maxlength="200"
                               th:placeholder="#{tarea.ph.titulo}"
                               th:value="${tarea != null ? tarea.titulo : ''}">
                    </div>
                    <!-- Descripción -->
                    <div>
                        <label class="form-label" th:text="#{tarea.label.descripcion}">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3"
                                  th:placeholder="#{tarea.ph.descripcion}"
                                  th:text="${tarea != null ? tarea.descripcion : ''}"></textarea>
                    </div>
                </div>

                <!-- Ítems -->
                <div class="table-card">
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                        <span class="fw-semibold" th:text="#{tarea.label.items}">Ítems de la tarea</span>
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="btnAgregarItem">
                            <i class="bi bi-plus-lg me-1"></i><span th:text="#{tarea.btn.agregar.item}">Agregar ítem</span>
                        </button>
                    </div>
                    <div class="p-3" id="itemsContainer">
                        <th:block th:if="${modoEdicion and tarea != null}" th:each="item, stat : ${tarea.items}">
                            <div class="item-row" th:id="'item-' + ${stat.index}">
                                <div class="d-flex gap-2 align-items-center">
                                    <input type="text" name="itemDesc" class="form-control form-control-sm flex-grow-1"
                                           required maxlength="500"
                                           th:placeholder="#{tarea.ph.item}"
                                           th:value="${item.descripcion}">
                                    <button type="button" class="btn btn-outline-danger btn-sm btn-remove"
                                            th:attr="data-target=${'item-' + stat.index}" title="Eliminar">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </div>
                        </th:block>
                        <div id="noItemsMsg" class="text-muted small text-center py-3"
                             th:if="${!modoEdicion or tarea == null or tarea.items.isEmpty()}"
                             th:text="#{tarea.label.sin.items}">Sin ítems</div>
                    </div>
                </div>
            </div>

            <!-- Panel derecho -->
            <div class="col-lg-4">
                <div class="table-card p-3">
                    <!-- Asignado a -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{tarea.label.asignado}">Asignado a</label>
                        <select name="asignadoA" class="form-select">
                            <option value="" th:text="#{tarea.select.usuario}">— Sin asignar —</option>
                            <option th:each="u : ${usuarios}"
                                    th:value="${u.username}"
                                    th:text="${u.username}"
                                    th:selected="${tarea != null and tarea.asignadoA != null and tarea.asignadoA == u.username}"></option>
                        </select>
                    </div>
                    <!-- Prioridad -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{tarea.label.prioridad}">Prioridad</label>
                        <select name="prioridad" class="form-select">
                            <option th:each="p : ${prioridades}"
                                    th:value="${p.name()}"
                                    th:text="${p.displayName}"
                                    th:selected="${tarea != null ? tarea.prioridad == p : p.name() == 'MEDIA'}"></option>
                        </select>
                    </div>
                    <!-- Fecha vencimiento -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{tarea.label.vencimiento}">Fecha vencimiento</label>
                        <input type="date" name="fechaVencimiento" class="form-control"
                               th:value="${tarea != null and tarea.fechaVencimiento != null ? #temporals.format(tarea.fechaVencimiento,'yyyy-MM-dd') : ''}">
                    </div>

                    <!-- Referencia -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{tarea.label.referencia}">Referencia</label>
                        <!-- Selector de tipo -->
                        <select class="form-select mb-2" id="selectRefTipo">
                            <option value="" th:text="#{tarea.select.sin.referencia}">— Sin referencia —</option>
                            <option th:each="t : ${tiposRef}"
                                    th:value="${t.valor}"
                                    th:text="${t.etiqueta}"
                                    th:selected="${tarea != null and tarea.refTipo != null and tarea.refTipo == t.valor}"></option>
                        </select>
                        <!-- Chip cuando hay referencia activa (edit mode) -->
                        <div id="refChipZone" th:if="${tarea != null and tarea.refLabel != null}"
                             style="margin-bottom:.5rem">
                            <span class="ref-chip" id="refChip">
                                <i class="bi bi-link-45deg"></i>
                                <span id="refChipLabel" th:text="${tarea.refLabel}"></span>
                                <i class="bi bi-x" id="btnClearRef"></i>
                            </span>
                        </div>
                        <!-- Búsqueda typeahead -->
                        <div class="ref-search-wrap" id="refSearchWrap"
                             th:style="${tarea != null and tarea.refLabel != null} ? 'display:none' : ''">
                            <input type="text" id="refSearch" class="form-control"
                                   th:placeholder="#{tarea.ph.buscar.referencia}"
                                   autocomplete="off">
                            <div id="refDropdown" class="ref-dropdown"></div>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>
                            <span th:text="${modoEdicion} ? #{tarea.btn.actualizar} : #{tarea.btn.guardar}">Guardar</span>
                        </button>
                        <a th:href="${modoEdicion} ? @{/tareas/{id}(id=${tarea.id})} : @{/tareas}"
                           class="btn btn-outline-secondary" th:text="#{action.cancel}">Cancelar</a>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
(function () {
    // ── Ítems ────────────────────────────────────────────────────────────────
    let itemCount = document.querySelectorAll('.item-row').length;

    function addItemRow() {
        const idx = itemCount++;
        const noMsg = document.getElementById('noItemsMsg');
        if (noMsg) noMsg.remove();
        const div = document.createElement('div');
        div.className = 'item-row';
        div.id = 'item-' + idx;
        div.innerHTML =
            '<div class="d-flex gap-2 align-items-center">' +
              '<input type="text" name="itemDesc" class="form-control form-control-sm flex-grow-1" required maxlength="500" placeholder="Descripción del ítem">' +
              '<button type="button" class="btn btn-outline-danger btn-sm btn-remove" data-target="item-' + idx + '" title="Eliminar"><i class="bi bi-x-lg"></i></button>' +
            '</div>';
        document.getElementById('itemsContainer').appendChild(div);
    }

    document.getElementById('btnAgregarItem').addEventListener('click', addItemRow);

    document.addEventListener('click', function (e) {
        const btn = e.target.closest('.btn-remove');
        if (!btn) return;
        const row = document.getElementById(btn.dataset.target);
        if (row) row.remove();
        if (!document.querySelectorAll('.item-row').length) {
            const msg = document.createElement('div');
            msg.id = 'noItemsMsg';
            msg.className = 'text-muted small text-center py-3';
            msg.textContent = 'Sin ítems registrados';
            document.getElementById('itemsContainer').appendChild(msg);
        }
    });

    // ── Referencia typeahead ─────────────────────────────────────────────────
    const selectTipo   = document.getElementById('selectRefTipo');
    const refSearch    = document.getElementById('refSearch');
    const refDropdown  = document.getElementById('refDropdown');
    const refSearchWrap = document.getElementById('refSearchWrap');
    const hiddenTipo   = document.getElementById('refTipo');
    const hiddenId     = document.getElementById('refId');
    const btnClear     = document.getElementById('btnClearRef');
    const chipZone     = document.getElementById('refChipZone');
    const chipLabel    = document.getElementById('refChipLabel');

    let debounceTimer = null;

    function showSearchWrap() {
        if (refSearchWrap) refSearchWrap.style.display = '';
        if (chipZone) chipZone.style.display = 'none';
        if (refSearch) refSearch.value = '';
    }

    function showChip(label) {
        if (!chipZone) {
            // Crear chip si no existe (nueva tarea)
            const zone = document.createElement('div');
            zone.id = 'refChipZone';
            zone.style.marginBottom = '.5rem';
            zone.innerHTML = '<span class="ref-chip" id="refChip"><i class="bi bi-link-45deg"></i> <span id="refChipLabel"></span> <i class="bi bi-x" id="btnClearRef"></i></span>';
            refSearchWrap.parentNode.insertBefore(zone, refSearchWrap);
            document.getElementById('btnClearRef').addEventListener('click', clearRef);
        }
        const zone = document.getElementById('refChipZone');
        document.getElementById('refChipLabel').textContent = label;
        zone.style.display = '';
        if (refSearchWrap) refSearchWrap.style.display = 'none';
    }

    function clearRef() {
        hiddenTipo.value = '';
        hiddenId.value   = '';
        showSearchWrap();
        closeDropdown();
    }

    function closeDropdown() {
        if (refDropdown) {
            refDropdown.classList.remove('show');
            refDropdown.innerHTML = '';
        }
    }

    function fetchSuggestions(tipo, q) {
        if (!tipo || q.trim().length < 2) { closeDropdown(); return; }
        fetch('/tareas/suggest-ref?tipo=' + encodeURIComponent(tipo) + '&q=' + encodeURIComponent(q), {
            headers: {'X-Requested-With': 'XMLHttpRequest'}
        })
        .then(r => r.json())
        .then(items => {
            refDropdown.innerHTML = '';
            if (!items.length) {
                refDropdown.innerHTML = '<div class="ref-item text-muted">Sin resultados</div>';
            } else {
                items.forEach(function(item) {
                    const div = document.createElement('div');
                    div.className = 'ref-item';
                    div.innerHTML = '<div class="fw-semibold">' + (item.label || '') + '</div>' +
                                    (item.sub ? '<div class="ref-sub">' + item.sub + '</div>' : '');
                    div.addEventListener('click', function() {
                        hiddenTipo.value = selectTipo.value;
                        hiddenId.value   = item.id;
                        showChip(item.label);
                        closeDropdown();
                    });
                    refDropdown.appendChild(div);
                });
            }
            refDropdown.classList.add('show');
        })
        .catch(function() { closeDropdown(); });
    }

    if (selectTipo) {
        selectTipo.addEventListener('change', function() {
            hiddenTipo.value = '';
            hiddenId.value   = '';
            showSearchWrap();
            closeDropdown();
            // Si elige "sin referencia" ocultar el search
            if (!this.value && refSearchWrap) refSearchWrap.style.display = 'none';
        });

        // Al cargar, si ya hay un tipo seleccionado pero no hay chip, mostrar search
        if (selectTipo.value && !document.getElementById('refChipZone')) {
            if (refSearchWrap) refSearchWrap.style.display = '';
        }
        // Si no hay tipo, ocultar search
        if (!selectTipo.value && refSearchWrap && !document.getElementById('refChipZone')) {
            refSearchWrap.style.display = 'none';
        }
    }

    if (refSearch) {
        refSearch.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                fetchSuggestions(selectTipo.value, refSearch.value);
            }, 260);
        });
        refSearch.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeDropdown();
        });
    }

    if (btnClear) {
        btnClear.addEventListener('click', clearRef);
    }

    document.addEventListener('click', function(e) {
        if (refDropdown && !refDropdown.contains(e.target) && e.target !== refSearch) {
            closeDropdown();
        }
    });
}());
</script>
</body>
</html>
