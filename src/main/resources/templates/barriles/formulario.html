<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + (${barril.id != null} ? ' - Editar Barril' : ' - Nuevo Barril')">Alera - Barril</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4">
        <h1>
            <i class="bi bi-bucket me-2"></i>
            <span th:text="${barril.id != null} ? 'Editar Barril' : 'Registrar Barril'">Barril</span>
        </h1>
        <p th:text="${barril.id != null} ? 'Modifica los datos del barril ' + ${barril.codigo} : 'Ingresa los datos del nuevo barril'">
            Gestión de barriles
        </p>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <form th:action="${barril.id != null} ? @{/barriles/actualizar/{id}(id=${barril.id})} : @{/barriles/guardar}"
                  th:object="${barril}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                <div class="card-zymos mb-4">
                    <div class="card-header">
                        <h5><i class="bi bi-info-circle me-2"></i>Datos del Barril</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">

                            <!-- Código -->
                            <div class="col-md-4">
                                <label for="codigo" class="form-label fw-600">Código <span class="text-danger">*</span></label>
                                <input type="text" id="codigo" name="codigo" class="form-control"
                                       th:value="*{codigo}" th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid'"
                                       placeholder="Ej: KEG-001" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('codigo')}"
                                     th:errors="*{codigo}">Error</div>
                                <small class="text-muted">Código único para identificar el barril</small>
                            </div>

                            <!-- Tipo -->
                            <div class="col-md-4">
                                <label for="tipo" class="form-label fw-600">Tipo</label>
                                <select id="tipo" name="tipo" class="form-select">
                                    <option value="">— Sin especificar —</option>
                                    <option th:each="t : ${tiposBarril}"
                                            th:value="${t}"
                                            th:text="${t}"
                                            th:selected="${barril.tipo == t}">Tipo</option>
                                </select>
                            </div>

                            <!-- Capacidad -->
                            <div class="col-md-4">
                                <label for="capacidadLitros" class="form-label fw-600">Capacidad (L)</label>
                                <input type="number" id="capacidadLitros" name="capacidadLitros"
                                       class="form-control" step="0.5" min="1" max="999"
                                       th:value="*{capacidadLitros != null ? capacidadLitros.stripTrailingZeros().toPlainString() : ''}"
                                       placeholder="Ej: 20">
                            </div>

                            <!-- Estado -->
                            <div class="col-md-4">
                                <label for="estado" class="form-label fw-600">Estado</label>
                                <select id="estado" name="estado" class="form-select">
                                    <option th:each="est : ${estados}"
                                            th:value="${est.name()}"
                                            th:text="${est.displayName}"
                                            th:selected="${barril.estado == est}">Estado</option>
                                </select>
                            </div>

                            <!-- Código de lote asociado -->
                            <div class="col-md-4">
                                <label for="codigoLote" class="form-label fw-600">Lote asociado</label>
                                <input type="text" id="codigoLote" name="codigoLote" class="form-control"
                                       th:value="*{codigoLote}"
                                       placeholder="Ej: IPA-003" autocomplete="off">
                                <small class="text-muted">Código del lote de cerveza cargado</small>
                            </div>

                            <!-- Cliente -->
                            <div class="col-md-4">
                                <label for="clienteNombre" class="form-label fw-600">Cliente / Destino</label>
                                <input type="text" id="clienteNombre" name="clienteNombre" class="form-control"
                                       th:value="*{clienteNombre}"
                                       placeholder="Nombre del cliente">
                            </div>

                            <!-- Fecha despacho -->
                            <div class="col-md-4">
                                <label for="fechaDespacho" class="form-label fw-600">Fecha de despacho</label>
                                <input type="date" id="fechaDespacho" name="fechaDespacho" class="form-control"
                                       th:value="${barril.fechaDespacho != null ? #temporals.format(barril.fechaDespacho,'yyyy-MM-dd') : ''}">
                            </div>

                            <!-- Observaciones -->
                            <div class="col-12">
                                <label for="observaciones" class="form-label fw-600">Observaciones</label>
                                <textarea id="observaciones" name="observaciones" class="form-control" rows="3"
                                          placeholder="Estado físico, daños, notas de mantenimiento..."
                                          th:text="*{observaciones}"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-zymos">
                        <i class="bi bi-floppy me-1"></i>
                        <span th:text="${barril.id != null} ? 'Guardar cambios' : 'Registrar barril'">Guardar</span>
                    </button>
                    <a th:href="${barril.id != null} ? @{/barriles/ver/{id}(id=${barril.id})} : @{/barriles}"
                       class="btn btn-secondary">
                        <i class="bi bi-x me-1"></i>Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
