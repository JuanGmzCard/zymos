<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Proveedores'">Alera - Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-building me-2"></i>Proveedores</h1>
            <p>Directorio de proveedores de la cervecería</p>
        </div>
        <a th:href="@{/proveedores/nuevo}" class="btn btn-zymos">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Proveedor
        </a>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <div th:if="${#lists.isEmpty(proveedores)}" class="empty-state">
        <i class="bi bi-building"></i>
        <h5>Sin proveedores registrados</h5>
        <a th:href="@{/proveedores/nuevo}" class="btn btn-zymos mt-2">Agregar Proveedor</a>
    </div>

    <div th:unless="${#lists.isEmpty(proveedores)}" class="card-zymos">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5><i class="bi bi-list-ul me-2"></i>Listado de Proveedores</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small" th:text="${#lists.size(proveedores)} + ' proveedores'"></span>
                <div class="position-relative">
                    <input type="text" id="proveedorInput" class="form-control form-control-sm"
                           style="width:210px;" placeholder="Buscar proveedor..." autocomplete="off">
                    <div id="proveedorSuggest" class="search-suggest" style="display:none;"></div>
                </div>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-zymos mb-0">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>NIT/RUT</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prov : ${proveedores}">
                        <td>
                            <span class="fw-600" th:text="${prov.nombre}">—</span>
                            <div class="text-muted small" th:if="${prov.direccion != null and !prov.direccion.isBlank()}"
                                 th:text="${#strings.abbreviate(prov.direccion,50)}"></div>
                        </td>
                        <td class="text-muted" th:text="${prov.nit ?: '—'}">—</td>
                        <td class="text-muted" th:text="${prov.telefono ?: '—'}">—</td>
                        <td>
                            <a th:if="${prov.email != null and !prov.email.isBlank()}"
                               th:href="'mailto:' + ${prov.email}" th:text="${prov.email}">—</a>
                            <span th:unless="${prov.email != null and !prov.email.isBlank()}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:if="${prov.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${prov.activo}" class="badge bg-secondary">Inactivo</span>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/facturas(proveedor=${prov.nombre})}"
                                   class="btn btn-sm btn-zymos-outline" title="Ver facturas">
                                    <i class="bi bi-receipt"></i>
                                </a>
                                <a th:href="@{/proveedores/editar/{id}(id=${prov.id})}"
                                   class="btn btn-sm btn-outline-secondary" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/proveedores/eliminar/{id}(id=${prov.id})}" method="post"
                                      onsubmit="return confirm('¿Eliminar proveedor?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function() {
    var debTimer, activeIdx = -1;
    var input   = document.getElementById('proveedorInput');
    var suggest = document.getElementById('proveedorSuggest');
    if (!input || !suggest) return;

    input.addEventListener('input', function() {
        clearTimeout(debTimer);
        activeIdx = -1;
        var q = this.value.trim();
        if (q.length < 2) { hide(); return; }
        debTimer = setTimeout(function() { doFetch(q); }, 260);
    });

    input.addEventListener('keydown', function(e) {
        var items = suggest.querySelectorAll('a.ss-item');
        if (e.key === 'Escape') { hide(); return; }
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            setActive(items, Math.min(activeIdx + 1, items.length - 1));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setActive(items, Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            items[activeIdx].click();
        }
    });

    document.addEventListener('click', function(e) {
        if (!input.closest('.position-relative').contains(e.target)) hide();
    });

    function setActive(items, idx) {
        items.forEach(function(a) { a.classList.remove('ss-active'); });
        activeIdx = idx;
        if (items[idx]) items[idx].classList.add('ss-active');
    }

    function hide() {
        suggest.style.display = 'none';
        suggest.innerHTML = '';
        activeIdx = -1;
    }

    function doFetch(q) {
        fetch('/proveedores/suggest?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) render(data, q); })
            .catch(function() {});
    }

    function render(items, q) {
        if (!items.length) {
            suggest.innerHTML = '<div class="ss-empty">Sin resultados para &ldquo;' + esc(q) + '&rdquo;</div>';
            suggest.style.display = 'block';
            return;
        }
        var html = '';
        items.forEach(function(item) {
            var badge = item.activo
                ? '<span class="badge bg-success ms-auto" style="font-size:.65rem;">Activo</span>'
                : '<span class="badge bg-secondary ms-auto" style="font-size:.65rem;">Inactivo</span>';
            html += '<a href="' + esc(item.url) + '" class="ss-item">' +
                '<i class="bi bi-building ss-icon"></i>' +
                '<span class="ss-title">' + esc(item.nombre) + '</span>' +
                (item.nit ? '<span class="ss-sub">' + esc(item.nit) + '</span>' : '') +
                badge +
                '</a>';
        });
        suggest.innerHTML = html;
        suggest.style.display = 'block';
        activeIdx = -1;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
})();
</script>
</body>
</html>
