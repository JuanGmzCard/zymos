<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Proveedores'">Alera - Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .stat-card-simple {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            min-width: 130px;
        }
        .stat-card-simple .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }
        .stat-card-simple .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1;
            color: #1e293b;
        }

        .page-header {
            padding: 1.75rem 0 1rem;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.2rem;
            font-family: var(--font-body), sans-serif;
        }
        .page-header .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .filter-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .table-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        .table-card .table-count {
            padding: 0.875rem 1.25rem;
            font-size: 0.875rem;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-card table thead th {
            background: #f8fafc !important;
            color: #64748b !important;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-card table tbody td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        .table-card table tbody tr:last-child td { border-bottom: none; }
        .table-card table tbody tr:hover { background: #f8fafc; }

        .action-link {
            font-size: 0.8rem;
            text-decoration: none;
            padding: 0 0.25rem;
        }
        .action-link.view  { color: var(--verde-zymos, #2563eb); }
        .action-link.edit  { color: #475569; }
        .action-link.del   { color: #ef4444; }
        .action-link:hover.view { color: var(--dorado, #1d4ed8); text-decoration: underline; }
        .action-link:hover.edit { color: #1e293b; text-decoration: underline; }
        .action-link:hover.del  { color: #b91c1c; text-decoration: underline; }
        .action-sep { color: #cbd5e1; font-size: 0.75rem; margin: 0 0.1rem; }

        html.dark-mode .stat-card-simple { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .stat-card-simple .stat-value { color: var(--dm-text); }
        html.dark-mode .filter-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card table thead th { background: var(--dm-input) !important; color: var(--dm-text-muted) !important; border-color: var(--dm-border-light); }
        html.dark-mode .table-card table tbody td { color: var(--dm-text); border-color: var(--dm-border-faint); }
        html.dark-mode .table-card table tbody tr:hover { background: var(--dm-hover); }
        html.dark-mode .table-card .table-count { color: var(--dm-text-muted); border-color: var(--dm-border-light); }
        html.dark-mode .page-header h1 { color: var(--dm-text); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-building me-2"></i>Proveedores</h1>
            <p class="subtitle mb-0">Directorio de proveedores de la cervecería</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/proveedores/nuevo}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Nuevo Proveedor
            </a>
        </div>
    </div>

    <!-- Stat cards -->
    <div class="d-flex gap-3 flex-wrap mb-4">
        <div class="stat-card-simple">
            <div class="stat-label">Total</div>
            <div class="stat-value" th:text="${#lists.size(proveedores)}">0</div>
        </div>
    </div>

    <!-- Filtro + búsqueda -->
    <div class="filter-card mb-3">
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <div class="position-relative">
                <input type="text" id="proveedorInput" class="form-control form-control-sm"
                       style="width:240px;" placeholder="Buscar por nombre o NIT..." autocomplete="off">
                <div id="proveedorSuggest" class="search-suggest" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="table-card mb-4">
        <div class="table-count">
            <span th:text="${#lists.size(proveedores)}">0</span> proveedores
        </div>

        <div th:if="${#lists.isEmpty(proveedores)}" class="text-center py-5 text-muted">
            <i class="bi bi-building fs-1 d-block mb-2"></i>
            <p>No hay proveedores registrados</p>
            <a th:href="@{/proveedores/nuevo}" class="btn btn-primary btn-sm mt-1">
                <i class="bi bi-plus-lg me-1"></i>Agregar Proveedor
            </a>
        </div>

        <div th:unless="${#lists.isEmpty(proveedores)}" class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="padding-left:1.25rem;">Nombre</th>
                    <th>NIT / RUT</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prov : ${proveedores}">
                    <td style="padding-left:1.25rem;">
                        <span class="fw-semibold" th:text="${prov.nombre}">—</span>
                        <div class="text-muted small" th:if="${prov.direccion != null and !prov.direccion.isBlank()}"
                             th:text="${#strings.abbreviate(prov.direccion,50)}"></div>
                    </td>
                    <td class="text-muted" th:text="${prov.nit ?: '—'}">—</td>
                    <td class="text-muted" th:text="${prov.telefono ?: '—'}">—</td>
                    <td>
                        <a th:if="${prov.email != null and !prov.email.isBlank()}"
                           th:href="'mailto:' + ${prov.email}" th:text="${prov.email}"
                           class="action-link view">—</a>
                        <span th:unless="${prov.email != null and !prov.email.isBlank()}" class="text-muted">—</span>
                    </td>
                    <td>
                        <span th:if="${prov.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${prov.activo}" class="badge bg-secondary">Inactivo</span>
                    </td>
                    <td class="text-end pe-3">
                        <a th:href="@{/facturas(proveedor=${prov.nombre})}"
                           class="action-link view" title="Ver facturas">
                            <i class="bi bi-receipt"></i>
                        </a>
                        <span class="action-sep">·</span>
                        <a th:href="@{/proveedores/editar/{id}(id=${prov.id})}"
                           class="action-link edit">Editar</a>
                        <span class="action-sep">·</span>
                        <form th:action="@{/proveedores/eliminar/{id}(id=${prov.id})}" method="post"
                              class="d-inline"
                              onsubmit="return confirm('¿Eliminar proveedor?')">
                            <button type="submit" class="action-link del border-0 bg-transparent p-0">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
(function() {
    var debTimer, activeIdx = -1;
    var input   = document.getElementById('proveedorInput');
    var suggest = document.getElementById('proveedorSuggest');
    if (!input || !suggest) return;

    input.addEventListener('input', function() {
        clearTimeout(debTimer);
        activeIdx = -1;
        var q = this.value.trim();
        if (q.length < 2) { hide(); return; }
        debTimer = setTimeout(function() { doFetch(q); }, 260);
    });

    input.addEventListener('keydown', function(e) {
        var items = suggest.querySelectorAll('a.ss-item');
        if (e.key === 'Escape') { hide(); return; }
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            setActive(items, Math.min(activeIdx + 1, items.length - 1));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setActive(items, Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            items[activeIdx].click();
        }
    });

    document.addEventListener('click', function(e) {
        if (!input.closest('.position-relative').contains(e.target)) hide();
    });

    function setActive(items, idx) {
        items.forEach(function(a) { a.classList.remove('ss-active'); });
        activeIdx = idx;
        if (items[idx]) items[idx].classList.add('ss-active');
    }

    function hide() {
        suggest.style.display = 'none';
        suggest.innerHTML = '';
        activeIdx = -1;
    }

    function doFetch(q) {
        fetch('/proveedores/suggest?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) render(data, q); })
            .catch(function() {});
    }

    function render(items, q) {
        if (!items.length) {
            suggest.innerHTML = '<div class="ss-empty">Sin resultados para &ldquo;' + esc(q) + '&rdquo;</div>';
            suggest.style.display = 'block';
            return;
        }
        var html = '';
        items.forEach(function(item) {
            var badge = item.activo
                ? '<span class="badge bg-success ms-auto" style="font-size:.65rem;">Activo</span>'
                : '<span class="badge badge-neutral ms-auto" style="font-size:.65rem;">Inactivo</span>';
            html += '<a href="' + esc(item.url) + '" class="ss-item">' +
                '<i class="bi bi-building ss-icon"></i>' +
                '<span class="ss-title">' + esc(item.nombre) + '</span>' +
                (item.nit ? '<span class="ss-sub">' + esc(item.nit) + '</span>' : '') +
                badge +
                '</a>';
        });
        suggest.innerHTML = html;
        suggest.style.display = 'block';
        activeIdx = -1;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
})();
</script>
</body>
</html>
