<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Proveedor'">Alera - Proveedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <h1 th:text="${proveedorId != null} ? 'Editar Proveedor' : 'Nuevo Proveedor'">Proveedor</h1>
        <a th:href="@{/proveedores}" class="btn btn-outline-crema">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- Stats si existe -->
    <div class="row g-3 mb-4" th:if="${proveedorId != null}">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${countFacturas ?: 0}">0</div>
                <div class="stat-label">Facturas Emitidas</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card success">
                <div class="stat-number"
                     th:text="'$' + ${totalFacturas != null} ? ${#numbers.formatDecimal(totalFacturas,1,'COMMA',0,'POINT')} : '0'">$0</div>
                <div class="stat-label">Total Compras</div>
            </div>
        </div>
    </div>

    <form th:action="${proveedorId != null} ? @{/proveedores/actualizar/{id}(id=${proveedorId})} : @{/proveedores/guardar}"
          th:object="${proveedor}" method="post">

        <div class="form-section">
            <div class="form-section-title"><i class="bi bi-building me-2"></i>Datos del Proveedor</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required
                           placeholder="Nombre o razón social">
                </div>
                <div class="col-md-3">
                    <label class="form-label">NIT / RUT</label>
                    <input type="text" th:field="*{nit}" class="form-control" placeholder="900.123.456-7">
                </div>
                <div class="col-md-3 d-flex align-items-end pb-1">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" th:field="*{activo}" id="activoCheck">
                        <label class="form-check-label" for="activoCheck">Proveedor activo</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-control" placeholder="+57 300 000 0000">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="contacto@proveedor.com">
                </div>
                <div class="col-12">
                    <label class="form-label">Dirección</label>
                    <textarea th:field="*{direccion}" class="form-control" rows="2"
                              placeholder="Dirección física del proveedor"></textarea>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button type="submit" class="btn btn-zymos px-4">
                <i class="bi bi-save me-2"></i>
                <span th:text="${proveedorId != null} ? 'Actualizar' : 'Guardar'">Guardar</span>
            </button>
            <a th:href="@{/proveedores}" class="btn btn-zymos-outline px-4">Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
