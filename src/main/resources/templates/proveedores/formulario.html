<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + (${proveedorId != null} ? #{prov.form.edit} : #{prov.form.new})">Alera - Proveedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1>
                <i class="bi bi-building me-2"></i>
                <span th:text="${proveedorId != null} ? #{prov.form.edit} : #{prov.form.new}">Proveedor</span>
            </h1>
            <p class="subtitle mb-0" th:text="#{prov.form.subtitle}">Datos fiscales y de contacto del proveedor</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <a th:href="@{/proveedores}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i><span th:text="#{action.cancel}">Cancelar</span>
            </a>
        </div>
    </div>

    <!-- Stats si existe -->
    <div class="row g-3 mb-4" th:if="${proveedorId != null}">
        <div class="col-6 col-md-3">
            <div class="stat-card-simple">
                <div class="stat-label" th:text="#{prov.stats.facturas}">Facturas emitidas</div>
                <div class="stat-value" th:text="${countFacturas ?: 0}">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card-simple">
                <div class="stat-label" th:text="#{prov.stats.total.compras}">Total compras</div>
                <div class="stat-value success"
                     th:text="${totalFacturas != null} ? ${branding.simboloMoneda} + ${#numbers.formatDecimal(totalFacturas,1,'COMMA',0,'POINT')} : '0'">$0</div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8">

            <form th:action="${proveedorId != null} ? @{/proveedores/actualizar/{id}(id=${proveedorId})} : @{/proveedores/guardar}"
                  th:object="${proveedor}" method="post">

                <div class="content-card mb-4">
                    <div class="content-card-title pb-2 mb-3">
                        <i class="bi bi-building me-2"></i><span th:text="#{prov.section.datos}">DATOS DEL PROVEEDOR</span>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="nombre"><span th:text="#{label.nombre}">Nombre</span> <span class="text-danger">*</span></label>
                            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required
                                   th:placeholder="#{prov.form.nombre.ph}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="nit" th:text="#{prov.table.nit}">NIT / RUT</label>
                            <input type="text" id="nit" th:field="*{nit}" class="form-control" th:placeholder="#{prov.form.nit.ph}">
                        </div>
                        <div class="col-md-3 d-flex align-items-end pb-1">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{activo}" id="activoCheck">
                                <label class="form-check-label" for="activoCheck" th:text="#{prov.form.activo.label}">Proveedor activo</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="telefono" th:text="#{label.telefono}">Teléfono</label>
                            <input type="text" id="telefono" th:field="*{telefono}" class="form-control" th:placeholder="#{prov.form.telefono.ph}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="email" th:text="#{label.email}">Email</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" th:placeholder="#{prov.form.email.ph}">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="direccion" th:text="#{prov.form.dir.label}">Dirección</label>
                            <textarea id="direccion" th:field="*{direccion}" class="form-control" rows="2"
                                      th:placeholder="#{prov.form.dir.ph}"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-save me-2"></i>
                            <span th:text="${proveedorId != null} ? #{action.update} : #{action.save}">Guardar</span>
                        </button>
                        <a th:href="@{/proveedores}" class="btn btn-outline-secondary px-4" th:text="#{action.cancel}">Cancelar</a>
                    </div>

                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
