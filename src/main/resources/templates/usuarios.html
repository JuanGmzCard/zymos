<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Usuarios'">Alera - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-people me-2"></i>Usuarios</h1>
            <p>Gestión de acceso al sistema</p>
        </div>
        <button class="btn btn-zymos" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario">
            <i class="bi bi-person-plus me-1"></i>Nuevo Usuario
        </button>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <div th:if="${mensaje}" class="alert" role="alert"
         th:classappend="'alert-' + ${tipoMensaje}" th:text="${mensaje}"></div>

    <div class="card-zymos">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-people me-2"></i>Lista de Usuarios</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small">
                    <i class="bi bi-person-fill-check me-1"></i>
                    Sesión activa: <strong sec:authentication="name">usuario</strong>
                </span>
                <div class="position-relative">
                    <input type="text" id="usuarioInput" class="form-control form-control-sm"
                           style="width:190px;" placeholder="Buscar usuario..." autocomplete="off">
                    <div id="usuarioSuggest" class="search-suggest" style="display:none;"></div>
                </div>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-zymos mb-0">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Creado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}"
                    th:id="'usuario-' + ${usuario.id}"
                    th:classappend="${usuario.username == #authentication.name} ? 'table-warning' : ''">
                    <td>
                        <span class="fw-600" th:text="${usuario.username}">-</span>
                        <span th:if="${usuario.username == #authentication.name}"
                              class="badge bg-warning text-dark ms-2" style="font-size:0.7rem;">
                            <i class="bi bi-person-fill me-1"></i>Tú
                        </span>
                    </td>
                    <td>
                        <span class="badge badge-neutral"
                              th:text="${usuario.rol.displayName}">-</span>
                    </td>
                    <td class="text-center">
                        <span th:if="${usuario.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${usuario.activo}" class="badge bg-danger">Inactivo</span>
                    </td>
                    <td class="text-center">
                        <small th:text="${usuario.createdAt != null}
                            ? ${#temporals.format(usuario.createdAt,'dd/MM/yyyy')} : '—'">-</small>
                    </td>
                    <td class="text-end">
                        <div class="d-flex gap-1 justify-content-end">

                            <!-- Toggle activo — deshabilitado para el usuario en sesión -->
                            <form th:if="${usuario.username != #authentication.name}"
                                  th:action="@{/usuarios/{id}/toggle(id=${usuario.id})}" method="post"
                                  class="d-inline">
                                <button type="submit" class="btn btn-sm"
                                        th:classappend="${usuario.activo} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:title="${usuario.activo} ? 'Desactivar' : 'Activar'">
                                    <i class="bi" th:classappend="${usuario.activo} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                </button>
                            </form>
                            <button th:if="${usuario.username == #authentication.name}"
                                    class="btn btn-sm btn-outline-secondary" disabled
                                    title="No puedes desactivarte a ti mismo">
                                <i class="bi bi-toggle-on"></i>
                            </button>

                            <!-- Cambiar contraseña -->
                            <button class="btn btn-sm btn-outline-primary"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#modalPwd' + ${usuario.id}"
                                    title="Cambiar contraseña">
                                <i class="bi bi-key"></i>
                            </button>

                            <!-- Cambiar rol — deshabilitado para el usuario en sesión -->
                            <button th:if="${usuario.username != #authentication.name}"
                                    class="btn btn-sm btn-outline-info"
                                    data-bs-toggle="modal"
                                    th:attr="data-bs-target='#modalRol' + ${usuario.id}"
                                    title="Cambiar rol">
                                <i class="bi bi-person-gear"></i>
                            </button>
                            <button th:if="${usuario.username == #authentication.name}"
                                    class="btn btn-sm btn-outline-secondary" disabled
                                    title="No puedes cambiar tu propio rol">
                                <i class="bi bi-person-gear"></i>
                            </button>

                            <!-- Eliminar — deshabilitado para el usuario en sesión -->
                            <form th:if="${usuario.username != #authentication.name}"
                                  th:action="@{/usuarios/{id}/eliminar(id=${usuario.id})}" method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('¿Eliminar este usuario?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                            <button th:if="${usuario.username == #authentication.name}"
                                    class="btn btn-sm btn-outline-secondary" disabled
                                    title="No puedes eliminarte a ti mismo">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>

                        <!-- Modal cambiar contraseña -->
                        <div class="modal fade" th:id="'modalPwd' + ${usuario.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header" style="background:var(--verde-alera);">
                                        <h5 class="modal-title" style="color:var(--dorado);font-family:var(--font-headings);">
                                            <i class="bi bi-key me-2"></i>Cambiar Contraseña
                                        </h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/usuarios/{id}/password(id=${usuario.id})}" method="post">
                                        <div class="modal-body">
                                            <p class="text-muted mb-3">
                                                Usuario: <strong th:text="${usuario.username}"></strong>
                                            </p>
                                            <div class="mb-3">
                                                <label class="form-label">Nueva contraseña</label>
                                                <div class="input-group">
                                                    <input type="password" name="newPassword" class="form-control"
                                                           required minlength="8" placeholder="Mínimo 8 caracteres, una letra y un número">
                                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd(this)" tabindex="-1" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Confirmar contraseña</label>
                                                <div class="input-group">
                                                    <input type="password" name="confirmPassword" class="form-control"
                                                           required minlength="8" placeholder="Repite la contraseña">
                                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd(this)" tabindex="-1" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                            <button type="submit" class="btn btn-zymos">Cambiar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- Modal cambiar rol -->
                        <div th:if="${usuario.username != #authentication.name}"
                             class="modal fade" th:id="'modalRol' + ${usuario.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header" style="background:var(--verde-alera);">
                                        <h5 class="modal-title" style="color:var(--dorado);font-family:var(--font-headings);">
                                            <i class="bi bi-person-gear me-2"></i>Cambiar Rol
                                        </h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/usuarios/{id}/rol(id=${usuario.id})}" method="post">
                                        <div class="modal-body">
                                            <p class="text-muted mb-3">
                                                Usuario: <strong th:text="${usuario.username}"></strong>
                                            </p>
                                            <div class="mb-3">
                                                <label class="form-label">Nuevo rol</label>
                                                <select name="rol" class="form-select">
                                                    <option th:each="rolOpc : ${roles}"
                                                            th:value="${rolOpc.name()}"
                                                            th:text="${rolOpc.displayName}"
                                                            th:selected="${rolOpc == usuario.rol}">
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                            <button type="submit" class="btn btn-zymos">Guardar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Nuevo Usuario -->
<div class="modal fade" id="modalNuevoUsuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:var(--verde-alera);">
                <h5 class="modal-title" style="color:var(--dorado);font-family:var(--font-headings);">
                    <i class="bi bi-person-plus me-2"></i>Nuevo Usuario
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/usuarios/guardar}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Usuario *</label>
                        <input type="text" name="username" class="form-control" required
                               placeholder="Nombre de usuario">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña *</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control"
                                   required minlength="8" placeholder="Mínimo 8 caracteres, una letra y un número">
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd(this)" tabindex="-1" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña *</label>
                        <div class="input-group">
                            <input type="password" name="confirmPassword" class="form-control"
                                   required minlength="8" placeholder="Repite la contraseña">
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd(this)" tabindex="-1" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select name="rol" class="form-select">
                            <option th:each="rol : ${roles}"
                                    th:value="${rol.name()}"
                                    th:text="${rol.displayName}">
                            </option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-zymos">Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<style>
tr:target > td { animation: usuarioFlash 1.8s ease; }
@keyframes usuarioFlash {
    0%,100% { background: transparent; }
    15%,55% { background: color-mix(in srgb, var(--dorado) 22%, transparent); }
}
</style>
<script>
(function() {
    var debTimer, activeIdx = -1;
    var input   = document.getElementById('usuarioInput');
    var suggest = document.getElementById('usuarioSuggest');
    if (!input || !suggest) return;

    input.addEventListener('input', function() {
        clearTimeout(debTimer);
        activeIdx = -1;
        var q = this.value.trim();
        if (q.length < 2) { hide(); return; }
        debTimer = setTimeout(function() { doFetch(q); }, 260);
    });

    input.addEventListener('keydown', function(e) {
        var items = suggest.querySelectorAll('a.ss-item');
        if (e.key === 'Escape') { hide(); return; }
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            setActive(items, Math.min(activeIdx + 1, items.length - 1));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setActive(items, Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            items[activeIdx].click();
        }
    });

    document.addEventListener('click', function(e) {
        if (!input.closest('.position-relative').contains(e.target)) hide();
    });

    function setActive(items, idx) {
        items.forEach(function(a) { a.classList.remove('ss-active'); });
        activeIdx = idx;
        if (items[idx]) items[idx].classList.add('ss-active');
    }

    function hide() {
        suggest.style.display = 'none';
        suggest.innerHTML = '';
        activeIdx = -1;
    }

    function doFetch(q) {
        fetch('/usuarios/suggest?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) render(data, q); })
            .catch(function() {});
    }

    function render(items, q) {
        if (!items.length) {
            suggest.innerHTML = '<div class="ss-empty">Sin resultados para &ldquo;' + esc(q) + '&rdquo;</div>';
            suggest.style.display = 'block';
            return;
        }
        var html = '';
        items.forEach(function(item) {
            var badge = item.activo
                ? '<span class="badge bg-success ms-auto" style="font-size:.65rem;">Activo</span>'
                : '<span class="badge bg-danger ms-auto" style="font-size:.65rem;">Inactivo</span>';
            html += '<a href="#' + esc(item.anchor) + '" class="ss-item" onclick="hideSuggest()">' +
                '<i class="bi bi-person-circle ss-icon"></i>' +
                '<span class="ss-title">' + esc(item.username) + '</span>' +
                '<span class="ss-sub">' + esc(item.rol) + '</span>' +
                badge +
                '</a>';
        });
        suggest.innerHTML = html;
        suggest.style.display = 'block';
        activeIdx = -1;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.hideSuggest = function() { hide(); };
})();
</script>
</body>
</html>
