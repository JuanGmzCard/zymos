<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + #{usuarios.title}">Alera - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .stat-card-simple {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            min-width: 130px;
        }
        .stat-card-simple .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }
        .stat-card-simple .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1;
            color: #1e293b;
        }

        .page-header {
            padding: 1.75rem 0 1rem;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.2rem;
            font-family: var(--font-body), sans-serif;
        }
        .page-header .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .filter-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .table-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        .table-card .table-count {
            padding: 0.875rem 1.25rem;
            font-size: 0.875rem;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-card table thead th {
            background: #f8fafc !important;
            color: #64748b !important;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-card table tbody td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        .table-card table tbody tr:last-child td { border-bottom: none; }
        .table-card table tbody tr:hover { background: #f8fafc; }
        .table-card table tbody tr.row-current { background: #fffbeb; }
        .table-card table tbody tr.row-current:hover { background: #fef9c3; }

        .action-link {
            font-size: 0.8rem;
            text-decoration: none;
            padding: 0 0.25rem;
        }
        .action-link.view  { color: var(--verde-zymos, #2563eb); }
        .action-link.edit  { color: #475569; }
        .action-link.del   { color: #ef4444; }
        .action-link:hover.view { color: var(--dorado, #1d4ed8); text-decoration: underline; }
        .action-link:hover.edit { color: #1e293b; text-decoration: underline; }
        .action-link:hover.del  { color: #b91c1c; text-decoration: underline; }
        .action-sep { color: #cbd5e1; font-size: 0.75rem; margin: 0 0.1rem; }

        /* Row flash on :target */
        tr:target > td { animation: usuarioFlash 1.8s ease; }
        @keyframes usuarioFlash {
            0%,100% { background: transparent; }
            15%,55% { background: color-mix(in srgb, var(--dorado) 22%, transparent); }
        }

        html.dark-mode .stat-card-simple { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .stat-card-simple .stat-value { color: var(--dm-text); }
        html.dark-mode .filter-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .table-card table thead th { background: var(--dm-input) !important; color: var(--dm-text-muted) !important; border-color: var(--dm-border-light); }
        html.dark-mode .table-card table tbody td { color: var(--dm-text); border-color: var(--dm-border-faint); }
        html.dark-mode .table-card table tbody tr:hover { background: var(--dm-hover); }
        html.dark-mode .table-card .table-count { color: var(--dm-text-muted); border-color: var(--dm-border-light); }
        html.dark-mode .page-header h1 { color: var(--dm-text); }
        html.dark-mode .table-card table tbody tr.row-current { background: var(--dm-hover); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-people me-2"></i><span th:text="#{usuarios.title}">Usuarios</span></h1>
            <p class="subtitle mb-0" th:text="#{usuarios.subtitle}">Gestión de acceso al sistema</p>
        </div>
        <div class="d-flex gap-2 pt-1">
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario">
                <i class="bi bi-person-plus me-1"></i><span th:text="#{usuarios.nuevo}">Nuevo Usuario</span>
            </button>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert mb-3" role="alert"
         th:classappend="${tipoMensaje == 'success'} ? 'alert-success' : (${tipoMensaje == 'warning'} ? 'alert-warning' : 'alert-danger')">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- Stat cards -->
    <div class="d-flex gap-3 flex-wrap mb-4">
        <div class="stat-card-simple">
            <div class="stat-label" th:text="#{usuarios.stats.total}">Total</div>
            <div class="stat-value" th:text="${#lists.size(usuarios)}">0</div>
        </div>
        <div class="stat-card-simple">
            <div class="stat-label" th:text="#{usuarios.stats.sesion}">Sesión activa</div>
            <div class="stat-value" style="font-size:1rem; padding-top:0.3rem; color:#475569;"
                 sec:authentication="name">usuario</div>
        </div>
    </div>

    <!-- Búsqueda -->
    <div class="filter-card mb-3">
        <div class="d-flex gap-2 align-items-center">
            <div class="position-relative">
                <input type="text" id="usuarioInput" class="form-control form-control-sm"
                       style="width:240px;" th:placeholder="#{usuarios.placeholder}" placeholder="Buscar usuario..." autocomplete="off">
                <div id="usuarioSuggest" class="search-suggest" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="table-card mb-4">
        <div class="table-count">
            <span th:text="${#lists.size(usuarios)}">0</span> <span th:text="#{usuarios.title}">usuarios</span>
        </div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="padding-left:1.25rem;" th:text="#{label.usuario}">Usuario</th>
                    <th th:text="#{usuarios.table.rol}">Rol</th>
                    <th class="text-center" th:text="#{label.estado}">Estado</th>
                    <th class="text-center" th:text="#{usuarios.table.creado}">Creado</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}"
                    th:id="'usuario-' + ${usuario.id}"
                    th:classappend="${usuario.username == #authentication.name} ? 'row-current' : ''">
                    <td style="padding-left:1.25rem;">
                        <span class="fw-semibold" th:text="${usuario.username}">-</span>
                        <span th:if="${usuario.username == #authentication.name}"
                              class="badge bg-warning text-dark ms-2" style="font-size:0.7rem;">
                            <i class="bi bi-person-fill me-1"></i><span th:text="#{usuarios.badge.tu}">Tú</span>
                        </span>
                    </td>
                    <td>
                        <span class="badge bg-light text-dark border" style="font-size:0.72rem;"
                              th:text="${usuario.rol.displayName}">-</span>
                    </td>
                    <td class="text-center">
                        <span th:if="${usuario.activo}" class="badge bg-success" th:text="#{badge.activo}">Activo</span>
                        <span th:unless="${usuario.activo}" class="badge bg-danger" th:text="#{badge.inactivo}">Inactivo</span>
                    </td>
                    <td class="text-center">
                        <small class="text-muted" th:text="${usuario.createdAt != null}
                            ? ${#temporals.format(usuario.createdAt,'dd/MM/yyyy')} : '—'">-</small>
                    </td>
                    <td class="text-end pe-3">
                        <!-- Toggle activo -->
                        <form th:if="${usuario.username != #authentication.name}"
                              th:action="@{/usuarios/{id}/toggle(id=${usuario.id})}" method="post"
                              class="d-inline">
                            <button type="submit" class="action-link border-0 bg-transparent p-0"
                                    th:classappend="${usuario.activo} ? 'del' : 'view'"
                                    th:title="${usuario.activo} ? #{usuarios.action.desactivar} : #{usuarios.action.activar}">
                                <i class="bi" th:classappend="${usuario.activo} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                            </button>
                        </form>
                        <span th:if="${usuario.username == #authentication.name}"
                              class="action-link edit" style="cursor:default;"
                              th:title="#{usuarios.action.no.self.desactivar}" title="No puedes desactivarte a ti mismo">
                            <i class="bi bi-toggle-on"></i>
                        </span>

                        <span class="action-sep">·</span>

                        <!-- Cambiar contraseña -->
                        <button class="action-link edit border-0 bg-transparent p-0"
                                data-bs-toggle="modal"
                                th:attr="data-bs-target='#modalPwd' + ${usuario.id}"
                                th:title="#{usuarios.action.password}" title="Cambiar contraseña">
                            <i class="bi bi-key"></i>
                        </button>

                        <span class="action-sep">·</span>

                        <!-- Cambiar rol -->
                        <button th:if="${usuario.username != #authentication.name}"
                                class="action-link edit border-0 bg-transparent p-0"
                                data-bs-toggle="modal"
                                th:attr="data-bs-target='#modalRol' + ${usuario.id}"
                                th:title="#{usuarios.action.rol}" title="Cambiar rol">
                            <i class="bi bi-person-gear"></i>
                        </button>
                        <span th:if="${usuario.username == #authentication.name}"
                              class="action-link edit" style="cursor:default;"
                              th:title="#{usuarios.action.no.self.rol}" title="No puedes cambiar tu propio rol">
                            <i class="bi bi-person-gear"></i>
                        </span>

                        <span class="action-sep" th:if="${usuario.username != #authentication.name}">·</span>

                        <!-- Eliminar -->
                        <form th:if="${usuario.username != #authentication.name}"
                              th:action="@{/usuarios/{id}/eliminar(id=${usuario.id})}" method="post"
                              class="d-inline">
                            <button type="submit" class="action-link del border-0 bg-transparent p-0"
                                    th:title="#{action.delete}" title="Eliminar"
                                    th:attr="data-confirm=#{usuarios.confirm.eliminar}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>

                        <!-- Modal cambiar contraseña -->
                        <div class="modal fade" th:id="'modalPwd' + ${usuario.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title fw-semibold">
                                            <i class="bi bi-key me-2"></i><span th:text="#{usuarios.modal.pwd.title}">Cambiar Contraseña</span>
                                        </h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/usuarios/{id}/password(id=${usuario.id})}" method="post">
                                        <div class="modal-body">
                                            <p class="text-muted mb-3">
                                                <span th:text="#{label.usuario}">Usuario</span>: <strong th:text="${usuario.username}"></strong>
                                            </p>
                                            <div class="mb-3">
                                                <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.nueva.pwd}">Nueva contraseña</label>
                                                <div class="input-group">
                                                    <input type="password" name="newPassword" class="form-control"
                                                           required minlength="8"
                                                           th:placeholder="#{usuarios.modal.ph.pwd}" placeholder="Mínimo 8 caracteres">
                                                    <button type="button" class="btn btn-outline-secondary btn-toggle-pwd" tabindex="-1"
                                                            th:title="#{login.password.toggle}" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.confirmar}">Confirmar contraseña</label>
                                                <div class="input-group">
                                                    <input type="password" name="confirmPassword" class="form-control"
                                                           required minlength="8"
                                                           th:placeholder="#{usuarios.modal.ph.confirmar}" placeholder="Repite la contraseña">
                                                    <button type="button" class="btn btn-outline-secondary btn-toggle-pwd" tabindex="-1"
                                                            th:title="#{login.password.toggle}" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal"
                                                    th:text="#{action.cancel}">Cancelar</button>
                                            <button type="submit" class="btn btn-sm btn-primary"
                                                    th:text="#{usuarios.modal.btn.cambiar}">Cambiar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- Modal cambiar rol -->
                        <div th:if="${usuario.username != #authentication.name}"
                             class="modal fade" th:id="'modalRol' + ${usuario.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title fw-semibold">
                                            <i class="bi bi-person-gear me-2"></i><span th:text="#{usuarios.modal.rol.title}">Cambiar Rol</span>
                                        </h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/usuarios/{id}/rol(id=${usuario.id})}" method="post">
                                        <div class="modal-body">
                                            <p class="text-muted mb-3">
                                                <span th:text="#{label.usuario}">Usuario</span>: <strong th:text="${usuario.username}"></strong>
                                            </p>
                                            <div class="mb-3">
                                                <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.rol}">Nuevo rol</label>
                                                <select name="rol" class="form-select">
                                                    <option th:each="rolOpc : ${roles}"
                                                            th:value="${rolOpc.name()}"
                                                            th:text="${rolOpc.displayName}"
                                                            th:selected="${rolOpc == usuario.rol}">
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal"
                                                    th:text="#{action.cancel}">Cancelar</button>
                                            <button type="submit" class="btn btn-sm btn-primary"
                                                    th:text="#{action.save}">Guardar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal Nuevo Usuario -->
<div class="modal fade" id="modalNuevoUsuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-semibold">
                    <i class="bi bi-person-plus me-2"></i><span th:text="#{usuarios.modal.nuevo.title}">Nuevo Usuario</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/usuarios/guardar}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.username}">Usuario *</label>
                        <input type="text" name="username" class="form-control" required
                               th:placeholder="#{usuarios.modal.ph.username}" placeholder="Nombre de usuario">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.pwd}">Contraseña *</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control"
                                   required minlength="8"
                                   th:placeholder="#{usuarios.modal.ph.pwd}" placeholder="Mínimo 8 caracteres">
                            <button type="button" class="btn btn-outline-secondary btn-toggle-pwd" tabindex="-1"
                                    th:title="#{login.password.toggle}" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.confirmar}">Confirmar Contraseña *</label>
                        <div class="input-group">
                            <input type="password" name="confirmPassword" class="form-control"
                                   required minlength="8"
                                   th:placeholder="#{usuarios.modal.ph.confirmar}" placeholder="Repite la contraseña">
                            <button type="button" class="btn btn-outline-secondary btn-toggle-pwd" tabindex="-1"
                                    th:title="#{login.password.toggle}" title="Mostrar/ocultar"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold" th:text="#{usuarios.modal.label.rol}">Rol</label>
                        <select name="rol" class="form-select">
                            <option th:each="rol : ${roles}"
                                    th:value="${rol.name()}"
                                    th:text="${rol.displayName}">
                            </option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal"
                            th:text="#{action.cancel}">Cancelar</button>
                    <button type="submit" class="btn btn-sm btn-primary"
                            th:text="#{usuarios.crear}">Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
(function() {
    var debTimer, activeIdx = -1;
    var input   = document.getElementById('usuarioInput');
    var suggest = document.getElementById('usuarioSuggest');
    if (!input || !suggest) return;

    input.addEventListener('input', function() {
        clearTimeout(debTimer);
        activeIdx = -1;
        var q = this.value.trim();
        if (q.length < 2) { hide(); return; }
        debTimer = setTimeout(function() { doFetch(q); }, 260);
    });

    input.addEventListener('keydown', function(e) {
        var items = suggest.querySelectorAll('a.ss-item');
        if (e.key === 'Escape') { hide(); return; }
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            setActive(items, Math.min(activeIdx + 1, items.length - 1));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setActive(items, Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            items[activeIdx].click();
        }
    });

    document.addEventListener('click', function(e) {
        if (!input.closest('.position-relative').contains(e.target)) hide();
    });

    function setActive(items, idx) {
        items.forEach(function(a) { a.classList.remove('ss-active'); });
        activeIdx = idx;
        if (items[idx]) items[idx].classList.add('ss-active');
    }

    function hide() {
        suggest.style.display = 'none';
        suggest.innerHTML = '';
        activeIdx = -1;
    }

    function doFetch(q) {
        fetch('/usuarios/suggest?q=' + encodeURIComponent(q), { credentials: 'same-origin' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) render(data, q); })
            .catch(function() {});
    }

    function render(items, q) {
        if (!items.length) {
            suggest.innerHTML = '<div class="ss-empty">Sin resultados para &ldquo;' + esc(q) + '&rdquo;</div>';
            suggest.style.display = 'block';
            return;
        }
        var html = '';
        items.forEach(function(item) {
            var badge = item.activo
                ? '<span class="badge bg-success ms-auto" style="font-size:.65rem;">Activo</span>'
                : '<span class="badge bg-danger ms-auto" style="font-size:.65rem;">Inactivo</span>';
            html += '<a href="#' + esc(item.anchor) + '" class="ss-item">' +
                '<i class="bi bi-person-circle ss-icon"></i>' +
                '<span class="ss-title">' + esc(item.username) + '</span>' +
                '<span class="ss-sub">' + esc(item.rol) + '</span>' +
                badge +
                '</a>';
        });
        suggest.innerHTML = html;
        suggest.style.display = 'block';
        activeIdx = -1;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.hideSuggest = function() { hide(); };

    suggest.addEventListener('click', function(e) {
        if (e.target.closest('a.ss-item')) hide();
    });
})();
</script>
</body>
</html>
