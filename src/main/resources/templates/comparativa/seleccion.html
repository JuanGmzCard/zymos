<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Comparativa de Lotes'">Alera - Comparativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera -->
    <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
            <h1><i class="bi bi-bar-chart-steps me-2" style="color:var(--verde-zymos,#2563eb);"></i>Comparativa de Lotes</h1>
            <p class="subtitle">Seleccioná entre 2 y 6 lotes para comparar sus métricas</p>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${mensaje}" th:classappend="'alert alert-' + ${tipoMensaje} + ' alert-dismissible fade show mb-3'" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtro de búsqueda -->
    <div class="filter-card mb-3">
        <form th:action="@{/comparativa}" method="get" class="d-flex gap-2 align-items-center flex-wrap">
            <i class="bi bi-search text-secondary"></i>
            <input type="search" name="q" class="form-control form-control-sm"
                   style="max-width:280px;"
                   placeholder="Buscar por código o estilo…"
                   th:value="${qFiltro}" autocomplete="off">
            <button type="submit" class="btn btn-sm btn-primary">Buscar</button>
            <a th:if="${!qFiltro.isBlank()}" th:href="@{/comparativa}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>Limpiar
            </a>
        </form>
    </div>

    <!-- Formulario de selección -->
    <form action="/comparativa/resultado" method="get" id="formComparativa">

        <!-- Barra de acción -->
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
            <span class="text-secondary" style="font-size:0.875rem;">
                <span id="contadorSeleccion">0</span> seleccionado<span id="pluralS" style="display:none;">s</span>
                <span class="text-secondary"> (mín. 2, máx. 6)</span>
            </span>
            <button type="submit" id="btnComparar" class="btn btn-primary btn-sm" disabled>
                <i class="bi bi-bar-chart-steps me-1"></i>Comparar seleccionados
            </button>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(lotes)}" class="content-card text-center py-5">
            <i class="bi bi-clipboard-x" style="font-size:2.5rem; color:#cbd5e1;"></i>
            <p class="mt-3 text-secondary mb-0">No se encontraron lotes</p>
        </div>

        <!-- Tabla de lotes -->
        <div class="table-card" th:unless="${#lists.isEmpty(lotes)}">
            <div class="table-responsive">
                <table class="table mb-0" style="font-size:0.85rem;">
                    <thead>
                        <tr>
                            <th style="width:36px;"></th>
                            <th>Código</th>
                            <th>Estilo</th>
                            <th>Fecha</th>
                            <th>Fase</th>
                            <th class="text-end">OG</th>
                            <th class="text-end">FG</th>
                            <th class="text-end">ABV</th>
                            <th class="text-end">Litros</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lote : ${lotes}"
                            class="lote-row" style="cursor:pointer;"
                            th:data-id="${lote.id}">
                            <td class="text-center" onclick="event.stopPropagation()">
                                <input class="form-check-input chk-lote" type="checkbox"
                                       name="ids" th:value="${lote.id}">
                            </td>
                            <td>
                                <span class="fw-bold font-monospace" style="color:var(--verde-zymos,#2563eb);" th:text="${lote.codigoLote}">—</span>
                            </td>
                            <td th:text="${lote.estilo}">—</td>
                            <td class="text-secondary text-nowrap"
                                th:text="${lote.fechaElaboracion != null} ? ${#temporals.format(lote.fechaElaboracion,'dd/MM/yy')} : '—'">—</td>
                            <td>
                                <span class="phase-badge"
                                      th:text="${lote.faseActual}"
                                      th:classappend="${lote.completado} ? 'phase-carb' :
                                          (${lote.faseActual == 'Carbonatación'} ? 'phase-carb' :
                                          (${lote.faseActual == 'Maduración'} ? 'phase-madur' :
                                          (${lote.faseActual == 'Acondicionamiento'} ? 'phase-acond' :
                                          (${lote.faseActual == 'Fermentación'} ? 'phase-ferm' : 'phase-inicio'))))">
                                </span>
                            </td>
                            <td class="text-end font-monospace"
                                th:text="${lote.densidadInicial != null} ? ${lote.densidadInicial} : '—'">—</td>
                            <td class="text-end font-monospace"
                                th:text="${lote.densidadFinal != null} ? ${lote.densidadFinal} : '—'">—</td>
                            <td class="text-end fw-semibold"
                                th:text="${lote.abv != null} ? ${lote.abv.stripTrailingZeros().toPlainString()} + '%' : '—'">—</td>
                            <td class="text-end"
                                th:text="${lote.litrosFinales != null} ? ${lote.litrosFinales.stripTrailingZeros().toPlainString()} + ' L' : '—'">—</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const checkboxes = document.querySelectorAll('.chk-lote');
    const btnComparar = document.getElementById('btnComparar');
    const contador = document.getElementById('contadorSeleccion');
    const pluralS = document.getElementById('pluralS');
    const MAX = 6;

    function actualizarContador() {
        const checked = document.querySelectorAll('.chk-lote:checked');
        const n = checked.length;
        contador.textContent = n;
        pluralS.style.display = n !== 1 ? 'inline' : 'none';
        btnComparar.disabled = n < 2;
        // Deshabilitar checkboxes no seleccionados si ya hay 6
        checkboxes.forEach(chk => {
            if (!chk.checked) chk.disabled = n >= MAX;
        });
    }

    checkboxes.forEach(chk => chk.addEventListener('change', actualizarContador));

    // Clic en la fila activa el checkbox
    document.querySelectorAll('.lote-row').forEach(row => {
        row.addEventListener('click', () => {
            const chk = row.querySelector('.chk-lote');
            if (chk.disabled) return;
            chk.checked = !chk.checked;
            actualizarContador();
        });
    });

    actualizarContador();
})();
</script>
</body>
</html>
