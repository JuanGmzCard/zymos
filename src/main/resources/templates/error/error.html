<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding != null ? branding.name : 'Alera'} + ' - Error'">Alera - Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .error-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 3rem 2.5rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--dorado);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--verde-alera);
            margin-bottom: 1rem;
        }
        .error-desc {
            color: #6c757d;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .error-icon {
            font-size: 3rem;
            color: #dee2e6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="error-page" style="background:var(--fondo);">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="error-content">
    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill" style="color:var(--dorado);"></i>
        </div>
        <div class="error-code" th:text="${codigo}">500</div>
        <div class="error-title" th:text="${titulo}">Error</div>
        <p class="error-desc" th:text="${descripcion}">Ocurrió un error inesperado.</p>

        <div class="d-flex gap-2 justify-content-center flex-wrap">
            <a th:href="${volverUrl != null} ? ${volverUrl} : '/dashboard'"
               class="btn btn-primary px-4">
                <i class="bi bi-arrow-left me-2"></i>
                <span th:text="${volverTexto != null} ? ${volverTexto} : 'Ir al Dashboard'">Volver</span>
            </a>
            <a th:href="@{/}" class="btn btn-outline-secondary px-4">
                <i class="bi bi-house me-1"></i><span th:text="#{error.home}">Inicio</span>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
