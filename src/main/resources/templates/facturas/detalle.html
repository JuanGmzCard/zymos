<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alera - Detalle Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 th:text="'Factura ' + (${factura.numeroFactura != null} ? ${factura.numeroFactura} : '#' + ${factura.id})">Factura</h1>
            <p th:text="${factura.proveedor}">Proveedor</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/facturas/editar/{id}(id=${factura.id})}" class="btn btn-alera">
                <i class="bi bi-pencil me-1"></i>Editar
            </a>
            <a th:href="@{/facturas}" class="btn btn-alera-outline">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div class="row g-4">
        <!-- Datos generales -->
        <div class="col-md-4">
            <div class="card-alera h-100">
                <div class="card-header"><h5><i class="bi bi-info-circle me-2"></i>Datos Generales</h5></div>
                <div class="card-body">
                    <div class="mb-3">
                        <div class="detail-label">N° Factura</div>
                        <div class="detail-value highlight" th:text="${factura.numeroFactura != null} ? ${factura.numeroFactura} : 'Sin número'">-</div>
                    </div>
                    <div class="mb-3">
                        <div class="detail-label">Proveedor</div>
                        <div class="detail-value" th:text="${factura.proveedor}">-</div>
                    </div>
                    <div class="mb-3">
                        <div class="detail-label">Fecha</div>
                        <div class="detail-value" th:text="${factura.fechaFactura != null} ? ${#temporals.format(factura.fechaFactura,'dd/MM/yyyy')} : '-'">-</div>
                    </div>
                    <div th:if="${factura.descripcion != null}">
                        <div class="detail-label">Descripción</div>
                        <div class="detail-value small" th:text="${factura.descripcion}">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Resumen financiero -->
        <div class="col-md-4">
            <div class="card-alera h-100">
                <div class="card-header"><h5><i class="bi bi-calculator me-2"></i>Resumen Financiero</h5></div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal (base sin IVA)</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(factura.subtotal,1,'COMMA',2,'POINT')}">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">IVA (por ítem)</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(factura.valorIva,1,'COMMA',2,'POINT')}">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2" th:if="${factura.costoEnvio != null and factura.costoEnvio.compareTo(T(java.math.BigDecimal).ZERO) != 0}">
                        <span class="text-muted">Envío</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(factura.costoEnvio,1,'COMMA',2,'POINT')}">-</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">TOTAL</span>
                        <span class="fw-bold detail-value highlight" th:text="'$' + ${#numbers.formatDecimal(factura.valorTotal,1,'COMMA',2,'POINT')}">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Items -->
        <div class="col-12">
            <div class="card-alera">
                <div class="card-header"><h5><i class="bi bi-list-ul me-2"></i>Items de la Factura</h5></div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th style="background:#364318;color:#F5EDD0;padding:0.75rem 1rem;">Tipo</th>
                            <th style="background:#364318;color:#F5EDD0;">Nombre</th>
                            <th style="background:#364318;color:#F5EDD0;">Cantidad</th>
                            <th style="background:#364318;color:#F5EDD0;">V. Unitario</th>
                            <th style="background:#364318;color:#F5EDD0;">Desc.</th>
                            <th style="background:#364318;color:#F5EDD0;">IVA %</th>
                            <th style="background:#364318;color:#F5EDD0;">Valor IVA</th>
                            <th style="background:#364318;color:#F5EDD0;">Total Línea</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${factura.items}">
                            <td class="ps-3">
                                <span class="badge" th:classappend="${item.tipoItem != null and item.tipoItem.name() == 'INSUMO'} ? 'bg-success' : 'bg-info'"
                                      th:text="${item.tipoItem != null} ? ${item.tipoItem.displayName} : '-'">-</span>
                            </td>
                            <td th:text="${item.nombre}">-</td>
                            <td th:text="${item.cantidad} + ' ' + (${item.unidad} != null ? ${item.unidad} : '')">-</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.valorUnitario,1,'COMMA',2,'POINT')}">-</td>
                            <td th:text="${item.porcentajeDescuento} + '%'">-</td>
                            <td th:text="${item.porcentajeIvaItem} + '%'">-</td>
                            <td class="text-muted small"
                                th:text="'$' + ${#numbers.formatDecimal(item.valorIvaItem,1,'COMMA',2,'POINT')}">-</td>
                            <td class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(item.valorLinea,1,'COMMA',2,'POINT')}">-</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
