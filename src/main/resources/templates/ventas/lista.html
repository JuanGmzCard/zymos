<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - Ventas'">Alera - Ventas</title>
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Hero -->
<div class="hero-section">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h1><i class="bi bi-bag-check me-2"></i>Ventas y Despacho</h1>
                <p class="mb-0">Registro de salidas y despachos por lote</p>
            </div>
            <div sec:authorize="hasAnyRole('ADMIN','FACTURACION','SUPERADMIN')">
                <a th:href="@{/ventas/nuevo}" class="btn btn-zymos">
                    <i class="bi bi-plus-lg me-1"></i>Nueva Venta
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- Flash -->
    <div th:if="${mensaje}" class="alert"
         th:classappend="'alert-' + ${tipoMensaje}" role="alert" th:text="${mensaje}"></div>

    <!-- Stat-cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-bag-check"></i></div>
                <div class="stat-card-value" th:text="${statsTotal}">0</div>
                <div class="stat-card-label">Total Ventas</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-hourglass-split"></i></div>
                <div class="stat-card-value" th:text="${statsPendientes}">0</div>
                <div class="stat-card-label">Pendientes</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-people"></i></div>
                <div class="stat-card-value" th:text="${statsClientes}">0</div>
                <div class="stat-card-label">Clientes Únicos</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-currency-dollar"></i></div>
                <div class="stat-card-value"
                     th:text="'$' + ${#numbers.formatDecimal(statsIngresos,1,'COMMA',0,'POINT')}">$0</div>
                <div class="stat-card-label">Ingresos Despachados</div>
            </div>
        </div>
    </div>

    <!-- Filtros + búsqueda -->
    <div class="card-zymos mb-4">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>Ventas</h5>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <!-- Typeahead -->
                <div class="position-relative">
                    <input type="search" id="ventaSearch" class="form-control form-control-sm"
                           placeholder="Buscar cliente o lote…" autocomplete="off"
                           style="min-width:200px;" data-suggest-url="/ventas/suggest">
                    <div id="ventaSuggest" class="search-suggest" style="display:none;"></div>
                </div>
                <!-- Tabs de estado -->
                <th:block th:each="est : ${estados}">
                    <a th:href="@{/ventas(estado=${est.name()},desde=${desde},hasta=${hasta})}"
                       class="btn btn-sm"
                       th:classappend="${estadoFiltro != null and estadoFiltro.name() == est.name()} ? 'btn-zymos' : 'btn-outline-secondary'"
                       th:text="${est.displayName}">—</a>
                </th:block>
                <a th:if="${estadoFiltro != null or desde != null or hasta != null}"
                   th:href="@{/ventas}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-x"></i>
                </a>
            </div>
        </div>

        <!-- Filtro fechas -->
        <div class="card-body border-bottom py-2">
            <form th:action="@{/ventas}" method="get" class="row g-2 align-items-end">
                <input type="hidden" name="estado" th:if="${estadoFiltro != null}" th:value="${estadoFiltro}">
                <div class="col-auto">
                    <label class="form-label form-label-sm mb-0">Desde</label>
                    <input type="date" name="desde" class="form-control form-control-sm"
                           th:value="${desde}">
                </div>
                <div class="col-auto">
                    <label class="form-label form-label-sm mb-0">Hasta</label>
                    <input type="date" name="hasta" class="form-control form-control-sm"
                           th:value="${hasta}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-zymos">
                        <i class="bi bi-search me-1"></i>Filtrar
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabla -->
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-zymos table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-3">Cliente</th>
                            <th>Lote</th>
                            <th>Fecha</th>
                            <th class="text-center">Cantidad</th>
                            <th class="text-center">Estado</th>
                            <th class="text-end pe-3">Valor Total</th>
                            <th style="width:80px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(ventas)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-bag-x fs-4 d-block mb-2"></i>
                                No hay ventas registradas
                            </td>
                        </tr>
                        <tr th:each="v : ${ventas}">
                            <td class="ps-3 fw-semibold" th:text="${v.cliente}">—</td>
                            <td>
                                <a th:if="${v.codigoLote != null}"
                                   th:href="@{/ver/{id}(id=${v.lote?.id})}"
                                   th:text="${v.codigoLote}"
                                   class="text-decoration-none" style="color:var(--dorado);font-weight:600;">—</a>
                                <span th:if="${v.codigoLote == null}" class="text-muted">Sin lote</span>
                            </td>
                            <td th:text="${v.fechaDespacho != null} ? ${#temporals.format(v.fechaDespacho,'dd/MM/yyyy')} : '—'">—</td>
                            <td class="text-center"
                                th:text="${#numbers.formatDecimal(v.cantidad,1,3)} + ' ' + (${v.unidad ?: ''})">—</td>
                            <td class="text-center">
                                <span class="badge" th:classappend="${v.estado.badgeClass}"
                                      th:text="${v.estado.displayName}">—</span>
                            </td>
                            <td class="text-end pe-3 fw-bold"
                                th:text="'$' + ${#numbers.formatDecimal(v.valorTotal,1,'COMMA',0,'POINT')}">—</td>
                            <td>
                                <a th:href="@{/ventas/ver/{id}(id=${v.id})}"
                                   class="btn btn-sm btn-outline-secondary py-0 px-2"
                                   title="Ver detalle">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Paginación -->
        <div th:if="${totalPaginas > 1}" class="card-footer">
            <div th:replace="~{fragments/paginacion :: paginacion(
                baseUrl='/ventas',
                extraParams=${(estadoFiltro != null ? '&estado=' + estadoFiltro : '') + (desde != null ? '&desde=' + desde : '') + (hasta != null ? '&hasta=' + hasta : '')},
                paginaActual=${paginaActual},
                totalPaginas=${totalPaginas})}"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const input = document.getElementById('ventaSearch');
    const box   = document.getElementById('ventaSuggest');
    if (!input) return;
    let timer;
    input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 2) { box.style.display = 'none'; return; }
        timer = setTimeout(() => {
            fetch('/ventas/suggest?q=' + encodeURIComponent(q))
                .then(r => r.json()).then(items => {
                    if (!items.length) { box.style.display = 'none'; return; }
                    box.innerHTML = items.map(i =>
                        `<a href="${i.url}" class="ss-item">
                            <i class="bi bi-bag-check ss-icon"></i>
                            <span class="ss-title">${i.titulo}</span>
                            <span class="ss-sub">${i.sub}</span>
                         </a>`).join('');
                    box.style.display = 'block';
                });
        }, 260);
    });
    document.addEventListener('click', e => {
        if (!input.contains(e.target)) box.style.display = 'none';
    });
})();
</script>
</body>
</html>
