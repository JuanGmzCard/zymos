<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + (${ventaId != null} ? ' - Editar Venta' : ' - Nueva Venta')">Alera - Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 th:text="${ventaId != null} ? 'Editar Venta' : 'Nueva Venta'">Nueva Venta</h1>
                <p class="mb-0">Registra una salida o despacho de producto</p>
            </div>
            <a th:href="@{/ventas}" class="btn btn-outline-crema">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card-zymos">
                <div class="card-header">
                    <h5><i class="bi bi-pencil-square me-2"></i>Datos de la Venta</h5>
                </div>
                <div class="card-body">
                    <form th:action="${ventaId != null} ? @{/ventas/actualizar/{id}(id=${ventaId})} : @{/ventas/guardar}"
                          th:object="${ventaForm}" method="post" novalidate>

                        <!-- Cliente -->
                        <div class="mb-3">
                            <label for="cliente" class="form-label detail-label">Cliente *</label>
                            <input type="text" id="cliente" th:field="*{cliente}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('cliente')} ? 'is-invalid' : ''"
                                   placeholder="Nombre del cliente o empresa">
                            <div class="invalid-feedback" th:errors="*{cliente}">—</div>
                        </div>

                        <!-- Lote (typeahead) -->
                        <div class="mb-3">
                            <label for="codigoLoteBuscador" class="form-label detail-label">Lote</label>
                            <div class="position-relative">
                                <input type="search" id="codigoLoteBuscador" th:field="*{codigoLoteBuscador}"
                                       class="form-control" placeholder="Buscar por código de lote…"
                                       autocomplete="off">
                                <div id="loteSuggest" class="search-suggest" style="display:none;"></div>
                            </div>
                            <input type="hidden" id="loteId" th:field="*{loteId}">
                            <div class="form-text text-muted">Opcional. Si no se selecciona un lote, la venta queda sin lote asociado.</div>
                        </div>

                        <!-- Fecha + Estado -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="fechaDespacho" class="form-label detail-label">Fecha de Despacho *</label>
                                <input type="date" id="fechaDespacho" th:field="*{fechaDespacho}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('fechaDespacho')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{fechaDespacho}">—</div>
                            </div>
                            <div class="col-md-6">
                                <label for="estado" class="form-label detail-label">Estado</label>
                                <select id="estado" th:field="*{estado}" class="form-select">
                                    <option th:each="est : ${estados}"
                                            th:value="${est.name()}"
                                            th:text="${est.displayName}">—</option>
                                </select>
                            </div>
                        </div>

                        <!-- Cantidad + Unidad -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="cantidad" class="form-label detail-label">Cantidad *</label>
                                <input type="number" id="cantidad" th:field="*{cantidad}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('cantidad')} ? 'is-invalid' : ''"
                                       step="0.001" min="0.001" placeholder="0.000"
                                       oninput="calcularTotal()">
                                <div class="invalid-feedback" th:errors="*{cantidad}">—</div>
                            </div>
                            <div class="col-md-6">
                                <label for="unidad" class="form-label detail-label">Unidad</label>
                                <select id="unidad" th:field="*{unidad}" class="form-select">
                                    <option value="">— seleccionar —</option>
                                    <option value="L">L (litros)</option>
                                    <option value="botella">Botella (330 mL)</option>
                                    <option value="botella650">Botella (650 mL)</option>
                                    <option value="lata">Lata (355 mL)</option>
                                    <option value="growler">Growler</option>
                                    <option value="barril">Barril</option>
                                    <option value="kg">kg</option>
                                    <option value="und">Unidad</option>
                                </select>
                            </div>
                        </div>

                        <!-- Precio + Descuento -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="precioUnitario" class="form-label detail-label">Precio Unitario *</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" id="precioUnitario" th:field="*{precioUnitario}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('precioUnitario')} ? 'is-invalid' : ''"
                                           step="0.01" min="0" placeholder="0.00"
                                           oninput="calcularTotal()">
                                </div>
                                <div class="invalid-feedback" th:errors="*{precioUnitario}">—</div>
                            </div>
                            <div class="col-md-6">
                                <label for="descuentoPct" class="form-label detail-label">Descuento (%)</label>
                                <div class="input-group">
                                    <input type="number" id="descuentoPct" th:field="*{descuentoPct}"
                                           class="form-control"
                                           step="0.01" min="0" max="100" placeholder="0"
                                           oninput="calcularTotal()">
                                    <span class="input-group-text">%</span>
                                </div>
                            </div>
                        </div>

                        <!-- Preview total -->
                        <div class="alert alert-info py-2 mb-3" id="previewTotal" style="display:none;">
                            <i class="bi bi-calculator me-2"></i>
                            <strong>Total estimado: </strong>
                            <span id="totalPreview" style="color:var(--verde-alera);font-weight:700;">$0</span>
                        </div>

                        <!-- Notas -->
                        <div class="mb-3">
                            <label for="notas" class="form-label detail-label">Notas</label>
                            <textarea id="notas" th:field="*{notas}"
                                      class="form-control" rows="2"
                                      placeholder="Observaciones, número de pedido, condiciones de entrega…"></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/ventas}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-zymos">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${ventaId != null} ? 'Actualizar' : 'Registrar Venta'">Guardar</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function calcularTotal() {
    const qty   = parseFloat(document.getElementById('cantidad').value)      || 0;
    const price = parseFloat(document.getElementById('precioUnitario').value) || 0;
    const disc  = parseFloat(document.getElementById('descuentoPct').value)   || 0;
    if (qty > 0 && price >= 0) {
        const total = qty * price * (1 - disc / 100);
        document.getElementById('totalPreview').textContent =
            '$' + total.toLocaleString('es-CO', {minimumFractionDigits: 0, maximumFractionDigits: 0});
        document.getElementById('previewTotal').style.display = 'block';
    } else {
        document.getElementById('previewTotal').style.display = 'none';
    }
}

// Typeahead de lote
(function () {
    const input  = document.getElementById('codigoLoteBuscador');
    const hidden = document.getElementById('loteId');
    const box    = document.getElementById('loteSuggest');
    if (!input) return;
    let timer;
    input.addEventListener('input', () => {
        hidden.value = '';
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 2) { box.style.display = 'none'; return; }
        timer = setTimeout(() => {
            fetch('/suggest?q=' + encodeURIComponent(q))
                .then(r => r.json()).then(items => {
                    if (!items.length) { box.style.display = 'none'; return; }
                    box.innerHTML = items.map(i =>
                        `<a href="#" class="ss-item" data-lote-id="${i.id || ''}" data-codigo="${i.codigoLote || ''}"
                            onclick="seleccionarLote(this);return false;">
                            <i class="bi bi-clipboard-data ss-icon"></i>
                            <span class="ss-title">${i.codigoLote}</span>
                            <span class="ss-sub">${i.estilo || ''}</span>
                         </a>`).join('');
                    box.style.display = 'block';
                });
        }, 260);
    });
    document.addEventListener('click', e => {
        if (!input.contains(e.target)) box.style.display = 'none';
    });
})();

function seleccionarLote(el) {
    document.getElementById('codigoLoteBuscador').value = el.dataset.codigo;
    document.getElementById('loteId').value             = el.dataset.loteId;
    document.getElementById('loteSuggest').style.display = 'none';
}

calcularTotal();
</script>
</body>
</html>
