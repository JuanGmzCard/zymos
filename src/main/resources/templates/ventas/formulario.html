<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${branding.name} + (${ventaId != null} ? ' - Editar Venta' : ' - Nueva Venta')">Alera - Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .items-table th { font-size: 0.75rem; background: var(--verde-alera); color: var(--crema); padding: 6px 8px; }
        .items-table td { vertical-align: middle; padding: 4px 6px; }
        .items-table .item-total { font-weight: 600; color: var(--dorado); font-size: 0.9rem; min-width: 80px; }
        html.dark-mode .items-table th { background: var(--dm-verde-bg); color: var(--dm-text); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="hero-section">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 th:text="${ventaId != null} ? 'Editar Venta' : 'Nueva Venta'">Nueva Venta</h1>
                <p class="mb-0">Registra una salida o despacho de producto</p>
            </div>
            <a th:href="@{/ventas}" class="btn btn-outline-crema">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>
</div>

<div class="container-fluid px-4 py-4">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="card-zymos">
                <div class="card-header">
                    <h5><i class="bi bi-pencil-square me-2"></i>Datos de la Venta</h5>
                </div>
                <div class="card-body">
                    <form th:action="${ventaId != null} ? @{/ventas/actualizar/{id}(id=${ventaId})} : @{/ventas/guardar}"
                          th:object="${ventaForm}" method="post" novalidate id="ventaForm">

                        <!-- Errores generales de ítems -->
                        <div th:if="${#fields.hasErrors('items') or #fields.hasErrors('items*')}"
                             class="alert alert-danger py-2 mb-3">
                            <i class="bi bi-exclamation-triangle me-1"></i>
                            <th:block th:each="err : ${#fields.errors('items*')}" th:text="${err + ' '}"></th:block>
                        </div>

                        <!-- ─── Datos generales ─────────────────────── -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-5">
                                <label for="cliente" class="form-label detail-label">Cliente *</label>
                                <input type="text" id="cliente" th:field="*{cliente}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('cliente')} ? 'is-invalid' : ''"
                                       placeholder="Nombre del cliente o empresa">
                                <div class="invalid-feedback" th:errors="*{cliente}">—</div>
                            </div>
                            <div class="col-md-4">
                                <label for="fechaDespacho" class="form-label detail-label">Fecha de Despacho *</label>
                                <input type="date" id="fechaDespacho" th:field="*{fechaDespacho}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('fechaDespacho')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{fechaDespacho}">—</div>
                            </div>
                            <div class="col-md-3">
                                <label for="estado" class="form-label detail-label">Estado</label>
                                <select id="estado" th:field="*{estado}" class="form-select">
                                    <option th:each="est : ${estados}"
                                            th:value="${est.name()}"
                                            th:text="${est.displayName}">—</option>
                                </select>
                            </div>
                        </div>

                        <!-- ─── Ítems de la venta ───────────────────── -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label detail-label mb-0">Ítems de la venta *</label>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="agregarFila()">
                                    <i class="bi bi-plus-lg me-1"></i>Agregar ítem
                                </button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered mb-0 items-table">
                                    <thead>
                                        <tr>
                                            <th style="min-width:180px;">Lote</th>
                                            <th style="min-width:130px;">Descripción</th>
                                            <th style="min-width:90px;">Cantidad *</th>
                                            <th style="min-width:140px;">Unidad</th>
                                            <th style="min-width:110px;">Precio Unit. *</th>
                                            <th style="min-width:80px;">Desc. %</th>
                                            <th style="min-width:90px;" class="text-end">Total</th>
                                            <th style="width:40px;"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="itemsBody">
                                        <tr th:each="item, iStat : *{items}" class="item-row">
                                            <!-- Lote typeahead -->
                                            <td>
                                                <div class="position-relative">
                                                    <input type="text" class="form-control form-control-sm lote-buscador"
                                                           th:name="'items[' + ${iStat.index} + '].codigoLoteBuscador'"
                                                           th:value="${item.codigoLoteBuscador}"
                                                           placeholder="Buscar lote…" autocomplete="off">
                                                    <div class="search-suggest lote-suggest" style="display:none;"></div>
                                                </div>
                                                <input type="hidden" class="lote-id-hidden"
                                                       th:name="'items[' + ${iStat.index} + '].loteId'"
                                                       th:value="${item.loteId}">
                                                <div class="lote-empaque-badge mt-1" style="display:none;"></div>
                                            </td>
                                            <!-- Descripción -->
                                            <td>
                                                <input type="text" class="form-control form-control-sm"
                                                       th:name="'items[' + ${iStat.index} + '].descripcion'"
                                                       th:value="${item.descripcion}"
                                                       placeholder="Opcional">
                                            </td>
                                            <!-- Cantidad -->
                                            <td>
                                                <input type="number" class="form-control form-control-sm item-cantidad"
                                                       th:name="'items[' + ${iStat.index} + '].cantidad'"
                                                       th:value="${item.cantidad}"
                                                       step="0.001" min="0.001" required>
                                            </td>
                                            <!-- Unidad -->
                                            <td>
                                                <select class="form-select form-select-sm item-unidad"
                                                        th:field="*{items[__${iStat.index}__].unidad}">
                                                    <option value="">— seleccionar —</option>
                                                    <optgroup label="Botellas">
                                                        <option value="Botella 330ml">Botella 330ml</option>
                                                        <option value="Botella 500ml">Botella 500ml</option>
                                                        <option value="Botella 750ml">Botella 750ml</option>
                                                        <option value="Botella 1000ml">Botella 1000ml</option>
                                                    </optgroup>
                                                    <optgroup label="Latas">
                                                        <option value="Lata 330ml">Lata 330ml</option>
                                                        <option value="Lata 355ml">Lata 355ml</option>
                                                        <option value="Lata 473ml">Lata 473ml</option>
                                                    </optgroup>
                                                    <optgroup label="Barriles / Kegs">
                                                        <option value="Barril 10L">Barril 10L</option>
                                                        <option value="Barril 20L">Barril 20L</option>
                                                        <option value="Barril 30L">Barril 30L</option>
                                                        <option value="Barril 50L">Barril 50L</option>
                                                    </optgroup>
                                                    <optgroup label="Growlers">
                                                        <option value="Growler 1L">Growler 1L</option>
                                                        <option value="Growler 2L">Growler 2L</option>
                                                        <option value="Growler 3.8L">Growler 3.8L</option>
                                                    </optgroup>
                                                    <optgroup label="Otros">
                                                        <option value="A granel">A granel</option>
                                                        <option value="L">Litros (L)</option>
                                                        <option value="und">Unidad</option>
                                                    </optgroup>
                                                </select>
                                            </td>
                                            <!-- Precio unitario -->
                                            <td>
                                                <div class="input-group input-group-sm">
                                                    <span class="input-group-text">$</span>
                                                    <input type="number" class="form-control form-control-sm item-precio"
                                                           th:name="'items[' + ${iStat.index} + '].precioUnitario'"
                                                           th:value="${item.precioUnitario}"
                                                           step="0.01" min="0" required placeholder="0.00">
                                                </div>
                                            </td>
                                            <!-- Descuento -->
                                            <td>
                                                <div class="input-group input-group-sm">
                                                    <input type="number" class="form-control form-control-sm item-descuento"
                                                           th:name="'items[' + ${iStat.index} + '].descuentoPct'"
                                                           th:value="${item.descuentoPct}"
                                                           step="0.01" min="0" max="100" placeholder="0">
                                                    <span class="input-group-text">%</span>
                                                </div>
                                            </td>
                                            <!-- Total fila -->
                                            <td class="text-end item-total">—</td>
                                            <!-- Eliminar -->
                                            <td class="text-center">
                                                <button type="button" class="btn btn-outline-danger btn-sm py-0 px-1"
                                                        onclick="eliminarFila(this)" title="Eliminar ítem">
                                                    <i class="bi bi-trash3"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr>
                                            <td colspan="6" class="text-end fw-semibold pe-2">Total Venta:</td>
                                            <td class="text-end pe-2">
                                                <span id="grandTotal" style="font-weight:700;color:var(--dorado);">$0</span>
                                            </td>
                                            <td></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>

                        <!-- Notas -->
                        <div class="mb-3">
                            <label for="notas" class="form-label detail-label">Notas</label>
                            <textarea id="notas" th:field="*{notas}"
                                      class="form-control" rows="2"
                                      placeholder="Observaciones, número de pedido, condiciones de entrega…"></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/ventas}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-zymos">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${ventaId != null} ? 'Actualizar' : 'Registrar Venta'">Guardar</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
// Número inicial de filas (desde servidor)
var rowCount = /*[[${ventaForm.items.size()}]]*/ 0;

var UNIT_OPTIONS = `
    <option value="">— seleccionar —</option>
    <optgroup label="Botellas">
        <option value="Botella 330ml">Botella 330ml</option>
        <option value="Botella 500ml">Botella 500ml</option>
        <option value="Botella 750ml">Botella 750ml</option>
        <option value="Botella 1000ml">Botella 1000ml</option>
    </optgroup>
    <optgroup label="Latas">
        <option value="Lata 330ml">Lata 330ml</option>
        <option value="Lata 355ml">Lata 355ml</option>
        <option value="Lata 473ml">Lata 473ml</option>
    </optgroup>
    <optgroup label="Barriles / Kegs">
        <option value="Barril 10L">Barril 10L</option>
        <option value="Barril 20L">Barril 20L</option>
        <option value="Barril 30L">Barril 30L</option>
        <option value="Barril 50L">Barril 50L</option>
    </optgroup>
    <optgroup label="Growlers">
        <option value="Growler 1L">Growler 1L</option>
        <option value="Growler 2L">Growler 2L</option>
        <option value="Growler 3.8L">Growler 3.8L</option>
    </optgroup>
    <optgroup label="Otros">
        <option value="A granel">A granel</option>
        <option value="L">Litros (L)</option>
        <option value="und">Unidad</option>
    </optgroup>`;

function crearFilaHTML(idx) {
    return `<td>
        <div class="position-relative">
            <input type="text" class="form-control form-control-sm lote-buscador"
                   name="items[${idx}].codigoLoteBuscador" placeholder="Buscar lote…" autocomplete="off">
            <div class="search-suggest lote-suggest" style="display:none;"></div>
        </div>
        <input type="hidden" class="lote-id-hidden" name="items[${idx}].loteId" value="">
        <div class="lote-empaque-badge mt-1" style="display:none;"></div>
    </td>
    <td><input type="text" class="form-control form-control-sm" name="items[${idx}].descripcion" placeholder="Opcional"></td>
    <td><input type="number" class="form-control form-control-sm item-cantidad" name="items[${idx}].cantidad" step="0.001" min="0.001" required></td>
    <td><select class="form-select form-select-sm item-unidad" name="items[${idx}].unidad">${UNIT_OPTIONS}</select></td>
    <td><div class="input-group input-group-sm"><span class="input-group-text">$</span>
        <input type="number" class="form-control form-control-sm item-precio" name="items[${idx}].precioUnitario" step="0.01" min="0" required placeholder="0.00">
        </div></td>
    <td><div class="input-group input-group-sm">
        <input type="number" class="form-control form-control-sm item-descuento" name="items[${idx}].descuentoPct" step="0.01" min="0" max="100" placeholder="0">
        <span class="input-group-text">%</span></div></td>
    <td class="text-end item-total">—</td>
    <td class="text-center"><button type="button" class="btn btn-outline-danger btn-sm py-0 px-1" onclick="eliminarFila(this)" title="Eliminar ítem"><i class="bi bi-trash3"></i></button></td>`;
}

function agregarFila() {
    var idx = rowCount++;
    var tbody = document.getElementById('itemsBody');
    var tr = document.createElement('tr');
    tr.className = 'item-row';
    tr.innerHTML = crearFilaHTML(idx);
    tbody.appendChild(tr);
    actualizarTotales();
}

function eliminarFila(btn) {
    var rows = document.querySelectorAll('#itemsBody .item-row');
    if (rows.length <= 1) return;
    btn.closest('tr').remove();
    reindexarFilas();
    actualizarTotales();
}

function reindexarFilas() {
    var rows = document.querySelectorAll('#itemsBody .item-row');
    rows.forEach(function(row, idx) {
        row.querySelectorAll('[name*="items["]').forEach(function(el) {
            el.name = el.name.replace(/items\[\d+\]/, 'items[' + idx + ']');
        });
        // Also update id from th:field-generated selects
        row.querySelectorAll('[id*="items"]').forEach(function(el) {
            el.id = el.id.replace(/items\d+/, 'items' + idx);
        });
    });
    rowCount = rows.length;
}

function actualizarTotales() {
    var rows = document.querySelectorAll('#itemsBody .item-row');
    var grand = 0;
    rows.forEach(function(row) {
        var qty   = parseFloat(row.querySelector('.item-cantidad')?.value)   || 0;
        var price = parseFloat(row.querySelector('.item-precio')?.value)     || 0;
        var disc  = parseFloat(row.querySelector('.item-descuento')?.value)  || 0;
        var total = qty * price * (1 - disc / 100);
        var cell  = row.querySelector('.item-total');
        if (cell) cell.textContent = qty > 0 && price >= 0 ? '$' + fmtNum(total) : '—';
        grand += total;
    });
    document.getElementById('grandTotal').textContent = '$' + fmtNum(grand);
}

function fmtNum(n) {
    return n.toLocaleString('es-CO', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

// ── Typeahead de lote (delegado) ──────────────────────────────────────────────
var loteTimer;
document.getElementById('itemsBody').addEventListener('input', function(e) {
    if (e.target.classList.contains('lote-buscador')) {
        var input   = e.target;
        var cell    = input.closest('td');
        var suggest = cell.querySelector('.lote-suggest');
        var hidden  = cell.querySelector('.lote-id-hidden');
        hidden.value = '';
        var badge = cell.querySelector('.lote-empaque-badge');
        if (badge) badge.style.display = 'none';
        clearTimeout(loteTimer);
        var q = input.value.trim();
        if (q.length < 2) { suggest.style.display = 'none'; return; }
        loteTimer = setTimeout(function() {
            fetch('/ventas/suggest-lotes?q=' + encodeURIComponent(q))
                .then(function(r) { return r.json(); })
                .then(function(items) {
                    if (!items.length) { suggest.style.display = 'none'; return; }
                    suggest.innerHTML = items.map(function(i) {
                        var cdFull = (i.carbDestino || '').trim();
                        var cd = cdFull.replace(/^\s*\d+\s*[×x]\s*/i, '').trim();
                        var litros = i.litrosDisponibles || i.litrosFinales || '';
                        return '<a href="#" class="ss-item" data-lote-id="' + (i.id||'') +
                               '" data-codigo="' + (i.codigoLote||'') +
                               '" data-carb-destino="' + cd + '"' +
                               '" data-carb-destino-full="' + cdFull.replace(/"/g,'&quot;') + '"' +
                               '" data-litros="' + litros + '"' +
                               ' onclick="seleccionarLote(this, event.target.closest(\'td\'));return false;">' +
                               '<i class="bi bi-clipboard-data ss-icon"></i>' +
                               '<span class="ss-title">' + (i.codigoLote||'') + '</span>' +
                               '<span class="ss-sub">' + (i.estilo||'') + (cd ? ' · ' + cd : '') + (litros ? ' · ' + litros + ' L disp.' : '') + '</span>' +
                               '</a>';
                    }).join('');
                    suggest.style.display = 'block';
                });
        }, 260);
    }
    if (e.target.classList.contains('item-cantidad') ||
        e.target.classList.contains('item-precio')   ||
        e.target.classList.contains('item-descuento')) {
        actualizarTotales();
    }
});

document.getElementById('itemsBody').addEventListener('change', function(e) {
    if (e.target.classList.contains('item-unidad') ||
        e.target.classList.contains('item-cantidad') ||
        e.target.classList.contains('item-precio')  ||
        e.target.classList.contains('item-descuento')) {
        actualizarTotales();
    }
});

document.addEventListener('click', function(e) {
    document.querySelectorAll('.lote-suggest').forEach(function(s) {
        if (!s.closest('td').contains(e.target)) s.style.display = 'none';
    });
});

function seleccionarLote(el, cell) {
    if (!cell) cell = el.closest('td');
    var suggest = cell.querySelector('.lote-suggest');
    var hidden  = cell.querySelector('.lote-id-hidden');
    var buscador = cell.querySelector('.lote-buscador');
    var row = cell.closest('tr');
    if (buscador) buscador.value = el.dataset.codigo;
    if (hidden)   hidden.value   = el.dataset.loteId;
    if (suggest)  suggest.style.display = 'none';
    // Auto-fill unidad from carbDestino
    var cd = el.dataset.carbDestino || '';
    if (cd && row) {
        var selUnidad = row.querySelector('.item-unidad');
        if (selUnidad && cd) {
            for (var i = 0; i < selUnidad.options.length; i++) {
                if (selUnidad.options[i].value === cd) {
                    selUnidad.value = cd;
                    break;
                }
            }
        }
    }
    // Show empaque badge
    var badge = cell.querySelector('.lote-empaque-badge');
    if (badge) {
        var cdFull = el.dataset.carbDestinoFull || '';
        var litros = el.dataset.litros || '';
        if (cdFull || litros) {
            var parts = [];
            if (cdFull) parts.push('<i class="bi bi-box-seam me-1"></i>' + cdFull);
            if (litros) parts.push('<i class="bi bi-droplet me-1"></i>' + litros + ' L disponibles');
            badge.innerHTML = '<small class="text-muted">' + parts.join(' &nbsp;·&nbsp; ') + '</small>';
            badge.style.display = '';
        } else {
            badge.style.display = 'none';
        }
    }
}

// Calcular totales al cargar (para edición)
actualizarTotales();
</script>
</body>
</html>
