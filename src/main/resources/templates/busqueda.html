<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branding.name} + ' - ' + #{busqueda.title}">Alera - Búsqueda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:attr="nonce=${cspNonce}">
        .result-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }
        .result-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.25rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }
        .result-card .list-group-item {
            border-left: none;
            border-right: none;
            border-color: #f1f5f9;
            padding: 0.65rem 1.25rem;
        }
        .result-card .list-group-item:first-child { border-top: none; }
        .result-card .list-group-item:last-child  { border-bottom: none; }
        .result-card .list-group-item:hover       { background: #f8fafc; }
        .result-card-footer {
            padding: 0.65rem 1.25rem;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .result-code {
            font-weight: 700;
            color: var(--verde-zymos, #2563eb);
            font-size: 0.88rem;
        }
        html.dark-mode .result-card             { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .result-card-header      { background: var(--dm-input); border-color: var(--dm-border-light); color: var(--dm-text-muted); }
        html.dark-mode .result-card .list-group-item { background: var(--dm-card); border-color: var(--dm-border-faint); color: var(--dm-text); }
        html.dark-mode .result-card .list-group-item:hover { background: var(--dm-hover); }
        html.dark-mode .result-card-footer      { background: var(--dm-input); border-color: var(--dm-border-light); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">

    <!-- Cabecera de página -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1><i class="bi bi-search me-2"></i><span th:text="#{busqueda.title}">Búsqueda</span></h1>
            <p class="subtitle mb-0" th:text="#{busqueda.resultados(total, q)}">0 resultados</p>
        </div>
    </div>

    <!-- Formulario de nueva búsqueda -->
    <div class="filter-card mb-4">
        <form th:action="@{/buscar}" method="get" class="d-flex gap-2" style="max-width:520px;">
            <input type="search" name="q" class="form-control form-control-sm"
                   th:value="${q}"
                   th:placeholder="#{busqueda.placeholder}"
                   placeholder="Buscar lotes, recetas, insumos, proveedores, equipos...">
            <button type="submit" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-search me-1"></i><span th:text="#{busqueda.btn.buscar}">Buscar</span>
            </button>
        </form>
    </div>

    <!-- Sin resultados -->
    <div th:if="${total == 0}" class="table-card mb-4">
        <div class="empty-state py-5">
            <i class="bi bi-search fs-1 text-muted d-block mb-2"></i>
            <p class="text-muted mb-0" th:text="#{busqueda.sin.resultados(q)}">No se encontraron resultados</p>
        </div>
    </div>

    <!-- Resultados -->
    <div class="row g-3 mb-4" th:unless="${total == 0}">

        <!-- Lotes -->
        <div class="col-lg-4" th:if="${!#lists.isEmpty(lotes)}">
            <div class="result-card h-100">
                <div class="result-card-header">
                    <span><i class="bi bi-droplet-fill me-2"></i><span th:text="#{busqueda.sec.lotes}">Lotes</span></span>
                    <span class="badge" style="background:var(--verde-zymos,#2563eb);border-radius:12px;font-weight:600;"
                          th:text="${#lists.size(lotes)}"></span>
                </div>
                <div class="list-group list-group-flush">
                    <a th:each="lote : ${lotes}"
                       th:href="@{/ver/{id}(id=${lote.id})}"
                       class="list-group-item list-group-item-action">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="result-code" th:text="${lote.codigoLote}">—</div>
                                <div class="text-muted small" th:text="${lote.estilo}">—</div>
                            </div>
                            <span class="phase-badge"
                                  th:classappend="${lote.completado} ? 'completado' : 'fermentacion'"
                                  th:text="${lote.completado} ? #{busqueda.badge.completado} : ${lote.faseActual}"
                                  style="font-size:0.65rem;">—</span>
                        </div>
                    </a>
                </div>
                <div class="result-card-footer">
                    <a th:href="@{/(estilo=${q})}" class="btn btn-outline-secondary btn-sm w-100"
                       th:text="#{busqueda.ver.lotes}">Ver todos los lotes</a>
                </div>
            </div>
        </div>

        <!-- Recetas -->
        <div class="col-lg-4" th:if="${!#lists.isEmpty(recetas)}">
            <div class="result-card h-100">
                <div class="result-card-header">
                    <span><i class="bi bi-journal-bookmark me-2"></i><span th:text="#{busqueda.sec.recetas}">Recetas</span></span>
                    <span class="badge" style="background:var(--verde-zymos,#2563eb);border-radius:12px;font-weight:600;"
                          th:text="${#lists.size(recetas)}"></span>
                </div>
                <div class="list-group list-group-flush">
                    <a th:each="rec : ${recetas}"
                       th:href="@{/recetas/ver/{id}(id=${rec.id})}"
                       class="list-group-item list-group-item-action">
                        <div class="fw-semibold small" th:text="${rec.nombre}">—</div>
                        <div class="text-muted small">
                            <span th:text="${rec.estilo}">—</span>
                            <span th:if="${rec.ogObjetivo != null}" class="ms-2">
                                OG <span th:text="${rec.ogObjetivo}"></span>
                            </span>
                        </div>
                    </a>
                </div>
                <div class="result-card-footer">
                    <a th:href="@{/recetas}" class="btn btn-outline-secondary btn-sm w-100"
                       th:text="#{busqueda.ver.recetas}">Ver todas las recetas</a>
                </div>
            </div>
        </div>

        <!-- Insumos -->
        <div class="col-lg-4" th:if="${!#lists.isEmpty(insumos)}">
            <div class="result-card h-100">
                <div class="result-card-header">
                    <span><i class="bi bi-box-seam me-2"></i><span th:text="#{busqueda.sec.inventario}">Inventario</span></span>
                    <span class="badge" style="background:var(--verde-zymos,#2563eb);border-radius:12px;font-weight:600;"
                          th:text="${#lists.size(insumos)}"></span>
                </div>
                <div class="list-group list-group-flush">
                    <a th:each="ins : ${insumos}"
                       th:href="@{/inventario}"
                       class="list-group-item list-group-item-action">
                        <div class="fw-semibold small" th:text="${ins.nombre}">—</div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-secondary" style="font-size:.7rem;" th:text="${ins.tipo}">—</span>
                            <span class="small fw-semibold"
                                  th:classappend="${ins.bajoStock} ? 'text-danger' : 'text-muted'"
                                  th:text="${ins.cantidad.stripTrailingZeros().toPlainString()} + ' ' + ${ins.unidad}">—</span>
                        </div>
                    </a>
                </div>
                <div class="result-card-footer">
                    <a th:href="@{/inventario(nombre=${q})}" class="btn btn-outline-secondary btn-sm w-100"
                       th:text="#{busqueda.ver.inventario}">Buscar en inventario</a>
                </div>
            </div>
        </div>

        <!-- Proveedores -->
        <div class="col-lg-4" th:if="${!#lists.isEmpty(proveedores)}">
            <div class="result-card h-100">
                <div class="result-card-header">
                    <span><i class="bi bi-truck me-2"></i><span th:text="#{busqueda.sec.proveedores}">Proveedores</span></span>
                    <span class="badge" style="background:var(--verde-zymos,#2563eb);border-radius:12px;font-weight:600;"
                          th:text="${#lists.size(proveedores)}"></span>
                </div>
                <div class="list-group list-group-flush">
                    <a th:each="prov : ${proveedores}"
                       th:href="@{/proveedores/editar/{id}(id=${prov.id})}"
                       class="list-group-item list-group-item-action">
                        <div class="fw-semibold small" th:text="${prov.nombre}">—</div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-muted small" th:text="${prov.nit != null} ? |#{label.nit}: ${prov.nit}| : ''">—</span>
                            <span th:if="${!prov.activo}" class="badge bg-secondary" style="font-size:.65rem;"
                                  th:text="#{badge.inactivo}">Inactivo</span>
                        </div>
                    </a>
                </div>
                <div class="result-card-footer">
                    <a th:href="@{/proveedores}" class="btn btn-outline-secondary btn-sm w-100"
                       th:text="#{busqueda.ver.proveedores}">Ver todos los proveedores</a>
                </div>
            </div>
        </div>

        <!-- Equipos -->
        <div class="col-lg-4" th:if="${!#lists.isEmpty(equipos)}">
            <div class="result-card h-100">
                <div class="result-card-header">
                    <span><i class="bi bi-gear me-2"></i><span th:text="#{busqueda.sec.equipos}">Equipos</span></span>
                    <span class="badge" style="background:var(--verde-zymos,#2563eb);border-radius:12px;font-weight:600;"
                          th:text="${#lists.size(equipos)}"></span>
                </div>
                <div class="list-group list-group-flush">
                    <a th:each="eq : ${equipos}"
                       th:href="@{/equipos/ver/{id}(id=${eq.id})}"
                       class="list-group-item list-group-item-action">
                        <div class="fw-semibold small" th:text="${eq.nombre}">—</div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-secondary" style="font-size:.7rem;" th:text="${eq.tipo}">—</span>
                            <span class="small"
                                  th:text="${eq.estado.displayName}"
                                  th:classappend="${eq.estado.name() == 'OPERATIVO'} ? 'fw-semibold' : 'text-muted'">—</span>
                        </div>
                    </a>
                </div>
                <div class="result-card-footer">
                    <a th:href="@{/equipos}" class="btn btn-outline-secondary btn-sm w-100"
                       th:text="#{busqueda.ver.equipos}">Ver todos los equipos</a>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
