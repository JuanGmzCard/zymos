<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${branding.name} + ' - BPM Residuos'">Zymos - BPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { padding:1.75rem 0 1rem; }
        .page-header h1 { font-size:1.5rem; font-weight:700; color:#1e293b; margin:0; }
        .page-header .subtitle { color:#94a3b8; font-size:.875rem; margin:0; }
        .table-card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; }
        .table-card .tc-header { padding:.75rem 1rem; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; justify-content:space-between; }
        .table-card thead th { background:#f8fafc !important; color:#64748b !important; font-size:.7rem; font-weight:600; text-transform:uppercase; }
        .table-card tbody td { padding:.65rem 1rem; border-bottom:1px solid #f1f5f9; color:#334155; font-size:.85rem; }
        .table-card tbody tr:hover td { background:#f8fafc; }
        html.dark-mode .table-card { background:var(--dm-card); border-color:var(--dm-border-light); }
        html.dark-mode .table-card .tc-header { border-color:var(--dm-border-light); }
        html.dark-mode .table-card thead th { background:var(--dm-card) !important; color:var(--dm-text-muted) !important; }
        html.dark-mode .table-card tbody td { color:var(--dm-text); border-color:var(--dm-border-faint); }
        html.dark-mode .table-card tbody tr:hover td { background:var(--dm-hover); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">
    <div class="page-header">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-1" style="font-size:.8rem;">
                        <li class="breadcrumb-item"><a th:href="@{/bpm}">BPM</a></li>
                        <li class="breadcrumb-item active">Evacuación de Residuos</li>
                    </ol>
                </nav>
                <h1>Evacuación de Residuos</h1>
                <p class="subtitle">Control de disposición de residuos</p>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/bpm/residuos/pdf}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-file-earmark-pdf me-1"></i>PDF (mes actual)
                </a>
                <a th:href="@{/bpm/residuos/nuevo}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo Registro
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid px-4 pb-4">
    <div class="table-card">
        <div class="tc-header">
            <span style="font-size:.8rem; font-weight:600; color:#475569;">
                <i class="bi bi-trash3 me-1"></i>Registros
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(registros)}">0</span>
            </span>
        </div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora Salida</th>
                        <th>Tipo Residuo</th>
                        <th class="text-center">Recipientes Limpios</th>
                        <th>Responsable</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(registros)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>No hay registros
                        </td>
                    </tr>
                    <tr th:each="r : ${registros}">
                        <td th:text="${r.fecha != null} ? ${#temporals.format(r.fecha,'dd/MM/yyyy')} : '—'">—</td>
                        <td th:text="${r.horaSalida != null} ? ${#temporals.format(r.horaSalida,'HH:mm')} : '—'">—</td>
                        <td th:text="${r.tipoResiduo != null} ? ${r.tipoResiduo.displayName} : '—'">—</td>
                        <td class="text-center">
                            <i th:class="${r.recipientesLimpios} ? 'bi bi-check-circle-fill text-success' : 'bi bi-x-circle-fill text-danger'"></i>
                        </td>
                        <td th:text="${r.responsable != null and !r.responsable.isBlank()} ? ${r.responsable} : '—'">—</td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/bpm/residuos/editar/{id}(id=${r.id})}"
                                   class="btn btn-outline-secondary btn-sm py-0 px-2">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/bpm/residuos/eliminar/{id}(id=${r.id})}"
                                      method="post" style="display:inline"
                                      onsubmit="return confirm('¿Eliminar este registro?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm py-0 px-2">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
