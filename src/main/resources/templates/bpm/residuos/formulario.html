<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${branding.name} + ' - BPM Residuos'">Zymos - BPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { padding:1.75rem 0 1rem; }
        .page-header h1 { font-size:1.5rem; font-weight:700; color:#1e293b; margin:0; }
        .page-header .subtitle { color:#94a3b8; font-size:.875rem; margin:0; }
        .form-card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:1.5rem; }
        html.dark-mode .form-card { background:var(--dm-card); border-color:var(--dm-border-light); }
        html.dark-mode .page-header h1 { color:var(--dm-text); }
        html.dark-mode .page-header .subtitle { color:var(--dm-text-muted); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">
    <div class="page-header">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1" style="font-size:.8rem;">
                <li class="breadcrumb-item"><a th:href="@{/bpm}">BPM</a></li>
                <li class="breadcrumb-item"><a th:href="@{/bpm/residuos}">Evacuación de Residuos</a></li>
                <li class="breadcrumb-item active" th:text="${registro.id != null} ? 'Editar' : 'Nuevo'">Nuevo</li>
            </ol>
        </nav>
        <h1 th:text="${registro.id != null} ? 'Editar Registro de Residuos' : 'Nuevo Registro de Residuos'">Nuevo</h1>
        <p class="subtitle">Control de evacuación y disposición de residuos</p>
    </div>
</div>

<div class="container-fluid px-4 pb-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="form-card">
                <form th:action="@{/bpm/residuos/guardar}" method="post" th:object="${registro}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Fecha <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fecha}"
                                   th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{fecha}"></div>
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Hora de Salida</label>
                            <input type="time" class="form-control" th:field="*{horaSalida}">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Tipo de Residuo <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{tipoResiduo}"
                                    th:classappend="${#fields.hasErrors('tipoResiduo')} ? 'is-invalid' : ''">
                                <option value="">— Seleccionar —</option>
                                <option th:each="tr : ${tiposResiduo}"
                                        th:value="${tr.name()}"
                                        th:text="${tr.displayName}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{tipoResiduo}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Responsable</label>
                            <input type="text" class="form-control" th:field="*{responsable}"
                                   placeholder="Nombre del responsable">
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Recipientes Limpios</label>
                            <div class="d-flex gap-3 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{recipientesLimpios}"
                                           th:value="true" id="rcSi">
                                    <label class="form-check-label" for="rcSi">Sí</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{recipientesLimpios}"
                                           th:value="false" id="rcNo">
                                    <label class="form-check-label" for="rcNo">No</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end pt-2">
                        <a th:href="@{/bpm/residuos}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-check2 me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
