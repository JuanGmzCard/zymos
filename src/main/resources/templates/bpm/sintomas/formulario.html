<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${branding.name} + ' - BPM Síntomas'">Zymos - BPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { padding: 1.75rem 0 1rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin: 0; }
        .page-header .subtitle { color: #94a3b8; font-size: .875rem; margin: 0; }
        .form-card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:1.5rem; }
        .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:.75rem; }
        .check-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:.75rem 1rem; display:flex; align-items:center; gap:.5rem; cursor:pointer; transition:background .15s; }
        .check-item:hover { background:#f1f5f9; }
        .check-item input[type=checkbox]:checked ~ span { font-weight:600; }
        html.dark-mode .form-card { background:var(--dm-card); border-color:var(--dm-border-light); }
        html.dark-mode .check-item { background:var(--dm-input); border-color:var(--dm-border-light); color:var(--dm-text); }
        html.dark-mode .check-item:hover { background:var(--dm-hover); }
        html.dark-mode .page-header h1 { color:var(--dm-text); }
        html.dark-mode .page-header .subtitle { color:var(--dm-text-muted); }
        .firma-canvas-wrap { border:1px solid #dee2e6; border-radius:6px; background:#fff; position:relative; height:120px; }
        .firma-canvas { width:100%; height:120px; touch-action:none; display:block; cursor:crosshair; }
        .firma-placeholder { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; font-size:.82rem; color:#94a3b8; }
        html.dark-mode .firma-canvas-wrap { border-color:var(--dm-border-light); background:var(--dm-input); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">
    <div class="page-header">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1" style="font-size:.8rem;">
                <li class="breadcrumb-item"><a th:href="@{/bpm}">BPM</a></li>
                <li class="breadcrumb-item"><a th:href="@{/bpm/sintomas}">Control de Salud</a></li>
                <li class="breadcrumb-item active" th:text="${registro.id != null} ? 'Editar' : 'Nuevo'">Nuevo</li>
            </ol>
        </nav>
        <h1 th:text="${registro.id != null} ? 'Editar Registro de Síntomas' : 'Nuevo Registro de Síntomas'">Nuevo</h1>
        <p class="subtitle">Estado de salud del manipulador de alimentos</p>
    </div>
</div>

<div class="container-fluid px-4 pb-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="form-card">
                <form th:action="@{/bpm/sintomas/guardar}" method="post" th:object="${registro}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Nombre del Manipulador <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{nombreManipulador}"
                                    th:classappend="${#fields.hasErrors('nombreManipulador')} ? 'is-invalid' : ''">
                                <option value="">— Seleccionar —</option>
                                <option th:each="u : ${usuarios}"
                                        th:value="${u.username}"
                                        th:text="${u.username + ' — ' + u.rol.displayName + (!u.activo ? ' (inactivo)' : '')}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{nombreManipulador}"></div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Fecha <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fecha}"
                                   th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{fecha}"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold mb-2">Síntomas Presentes</label>
                        <div class="check-grid">
                            <label class="check-item">
                                <input type="checkbox" th:field="*{diarrea}">
                                <span><i class="bi bi-activity me-1 text-danger"></i>Diarrea</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" th:field="*{vomito}">
                                <span><i class="bi bi-activity me-1 text-danger"></i>Vómito</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" th:field="*{fiebre}">
                                <span><i class="bi bi-thermometer-high me-1 text-danger"></i>Fiebre</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" th:field="*{infeccionRespiratoria}">
                                <span><i class="bi bi-lungs me-1 text-danger"></i>Inf. Respiratoria</span>
                            </label>
                            <label class="check-item">
                                <input type="checkbox" th:field="*{lesionPiel}">
                                <span><i class="bi bi-bandaid me-1 text-danger"></i>Lesión Piel</span>
                            </label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Observaciones</label>
                        <textarea class="form-control" th:field="*{observaciones}" rows="3"
                                  placeholder="Detalles adicionales o notas relevantes"></textarea>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-12 col-md-6">
                            <div class="firma-wrap">
                                <label class="form-label fw-semibold">Firma del Manipulador</label>
                                <div class="firma-canvas-wrap">
                                    <canvas class="firma-canvas" data-input="firma-manipulador"></canvas>
                                    <span class="firma-placeholder">Firme aquí</span>
                                </div>
                                <button type="button" class="firma-clear btn btn-sm btn-outline-secondary mt-1">
                                    <i class="bi bi-eraser me-1"></i>Limpiar
                                </button>
                                <input type="hidden" id="firma-manipulador" name="firmaManipulador"
                                       th:value="${registro.firmaManipulador}">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="firma-wrap">
                                <label class="form-label fw-semibold">Firma del Responsable</label>
                                <div class="firma-canvas-wrap">
                                    <canvas class="firma-canvas" data-input="firma-responsable"></canvas>
                                    <span class="firma-placeholder">Firme aquí</span>
                                </div>
                                <button type="button" class="firma-clear btn btn-sm btn-outline-secondary mt-1">
                                    <i class="bi bi-eraser me-1"></i>Limpiar
                                </button>
                                <input type="hidden" id="firma-responsable" name="firmaResponsable"
                                       th:value="${registro.firmaResponsable}">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end pt-2">
                        <a th:href="@{/bpm/sintomas}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-check2 me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script th:src="@{/js/bpm-firma.js}"></script>
</body>
</html>
