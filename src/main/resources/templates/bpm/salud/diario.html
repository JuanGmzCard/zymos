<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${branding.name} + ' - Control de Salud'">Zymos - Control de Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f1f5f9; }
        .salud-wrap { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 3rem; }
        .salud-card { width: 100%; max-width: 580px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 2rem 2rem 1.75rem; box-shadow: 0 4px 24px rgba(0,0,0,.07); }
        .salud-header { text-align: center; margin-bottom: 1.75rem; }
        .salud-icon { font-size: 2.75rem; color: #0ea5e9; line-height: 1; }
        .salud-title { font-size: 1.35rem; font-weight: 700; color: #1e293b; margin: .6rem 0 .2rem; }
        .salud-sub { font-size: .85rem; color: #94a3b8; margin: 0; }
        .user-badge { display: inline-flex; align-items: center; gap: .5rem; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: .5rem 1.1rem; font-size: .9rem; color: #0369a1; font-weight: 600; }
        .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: .6rem; }
        .check-item { background: #fafafa; border: 1px solid #e2e8f0; border-radius: 8px; padding: .7rem .9rem; display: flex; align-items: center; gap: .5rem; cursor: pointer; transition: background .15s; user-select: none; }
        .check-item:hover { background: #f1f5f9; }
        .check-item input[type=checkbox] { accent-color: #dc2626; width: 16px; height: 16px; flex-shrink: 0; }
        .check-item input:checked + span { font-weight: 600; color: #dc2626; }
        html.dark-mode body { background: var(--dm-bg); }
        html.dark-mode .salud-card { background: var(--dm-card); border-color: var(--dm-border-light); }
        html.dark-mode .salud-title { color: var(--dm-text); }
        html.dark-mode .salud-sub { color: var(--dm-text-muted); }
        html.dark-mode .user-badge { background: var(--dm-verde-bg); border-color: var(--dm-verde-border); color: var(--dm-text); }
        html.dark-mode .check-item { background: var(--dm-input); border-color: var(--dm-border-light); color: var(--dm-text); }
        html.dark-mode .check-item:hover { background: var(--dm-hover); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="salud-wrap">
    <div class="salud-card">
        <div class="salud-header">
            <div class="salud-icon"><i class="bi bi-heart-pulse-fill"></i></div>
            <h1 class="salud-title">Control de Estado de Salud</h1>
            <p class="salud-sub">
                Registro diario obligatorio —
                <strong th:text="${#temporals.format(hoy, 'dd/MM/yyyy')}"></strong>
            </p>
        </div>

        <!-- Ya completado hoy -->
        <div th:if="${yaCompletado}">
            <div class="text-center mb-3">
                <div class="user-badge mb-3">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${registro.nombreManipulador}"></span>
                </div>
            </div>
            <div class="alert alert-info d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-check-circle-fill fs-5"></i>
                <span>Ya completaste tu registro de salud hoy.</span>
            </div>

            <!-- Con síntomas sin autorizar -->
            <div th:if="${registro.tieneSintomas() and !registro.autorizadoPorAdmin}">
                <div class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                    <span>Has reportado síntomas. Comunícate con tu jefe inmediato.</span>
                </div>
                <a th:href="@{/bpm/salud/bloqueado}" class="btn btn-danger w-100">
                    <i class="bi bi-shield-x me-1"></i>Ver estado de acceso
                </a>
            </div>

            <!-- Sin síntomas o autorizado -->
            <div th:unless="${registro.tieneSintomas() and !registro.autorizadoPorAdmin}">
                <a th:href="@{/dashboard}" class="btn btn-primary w-100 btn-lg">
                    <i class="bi bi-speedometer2 me-1"></i>Ir al Dashboard
                </a>
            </div>
        </div>

        <!-- Formulario diario -->
        <div th:unless="${yaCompletado}">
            <div class="text-center mb-4">
                <div class="user-badge">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${registro.nombreManipulador}"></span>
                </div>
            </div>

            <form th:action="@{/bpm/salud/diario}" method="post" th:object="${registro}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="nombreManipulador" th:value="${registro.nombreManipulador}">
                <input type="hidden" name="fecha" th:value="${#temporals.format(hoy, 'yyyy-MM-dd')}">

                <p class="fw-semibold mb-2 text-secondary" style="font-size:.9rem;">
                    ¿Presentas alguno de estos síntomas hoy?
                </p>
                <div class="check-grid mb-4">
                    <label class="check-item">
                        <input type="checkbox" th:field="*{diarrea}">
                        <span><i class="bi bi-activity me-1 text-danger"></i>Diarrea</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" th:field="*{vomito}">
                        <span><i class="bi bi-activity me-1 text-danger"></i>Vómito</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" th:field="*{fiebre}">
                        <span><i class="bi bi-thermometer-high me-1 text-danger"></i>Fiebre</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" th:field="*{infeccionRespiratoria}">
                        <span><i class="bi bi-lungs me-1 text-danger"></i>Inf. Respiratoria</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" th:field="*{lesionPiel}">
                        <span><i class="bi bi-bandaid me-1 text-danger"></i>Lesión Piel</span>
                    </label>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold" style="font-size:.9rem;">Observaciones <span class="text-muted fw-normal">(opcional)</span></label>
                    <textarea class="form-control" th:field="*{observaciones}" rows="2"
                              placeholder="Notas sobre tu estado de salud"></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="bi bi-check2-circle me-1"></i>Registrar y continuar
                </button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
