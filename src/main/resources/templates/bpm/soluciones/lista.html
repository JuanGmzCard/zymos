<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${branding.name} + ' - ' + #{bpm.sol.title}">Zymos - BPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { padding:1.75rem 0 1rem; }
        .page-header h1 { font-size:1.5rem; font-weight:700; color:#1e293b; margin:0; }
        .page-header .subtitle { color:#94a3b8; font-size:.875rem; margin:0; }
        .table-card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; }
        .table-card .tc-header { padding:.75rem 1rem; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; justify-content:space-between; }
        .table-card thead th { background:#f8fafc !important; color:#64748b !important; font-size:.7rem; font-weight:600; text-transform:uppercase; }
        .table-card tbody td { padding:.65rem 1rem; border-bottom:1px solid #f1f5f9; color:#334155; font-size:.85rem; }
        .table-card tbody tr:hover td { background:#f8fafc; }
        html.dark-mode .table-card { background:var(--dm-card); border-color:var(--dm-border-light); }
        html.dark-mode .table-card .tc-header { border-color:var(--dm-border-light); }
        html.dark-mode .table-card thead th { background:var(--dm-card) !important; color:var(--dm-text-muted) !important; }
        html.dark-mode .table-card tbody td { color:var(--dm-text); border-color:var(--dm-border-faint); }
        html.dark-mode .table-card tbody tr:hover td { background:var(--dm-hover); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">
    <div class="page-header">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-1" style="font-size:.8rem;">
                        <li class="breadcrumb-item"><a th:href="@{/bpm}" th:text="#{nav.bpm}">BPM</a></li>
                        <li class="breadcrumb-item active" th:text="#{bpm.sol.title}">Soluciones Desinfectantes</li>
                    </ol>
                </nav>
                <h1 th:text="#{bpm.sol.title}">Soluciones Desinfectantes</h1>
                <p class="subtitle" th:text="#{bpm.sol.subtitle}">Registro de preparación de agentes de limpieza</p>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/bpm/soluciones/pdf}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-file-earmark-pdf me-1"></i><span th:text="#{bpm.btn.pdf.mes}">PDF (mes actual)</span>
                </a>
                <a th:href="@{/bpm/soluciones/nuevo}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i><span th:text="#{bpm.btn.nuevo.registro}">Nuevo Registro</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid px-4 pb-4">
    <div class="table-card">
        <div class="tc-header">
            <span style="font-size:.8rem; font-weight:600; color:#475569;">
                <i class="bi bi-droplet-half me-1"></i><span th:text="#{bpm.label.registros}">Registros</span>
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(registros)}">0</span>
            </span>
        </div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead>
                    <tr>
                        <th th:text="#{label.fecha}">Fecha</th>
                        <th th:text="#{bpm.sol.col.hora}">Hora</th>
                        <th th:text="#{bpm.sol.col.producto}">Producto</th>
                        <th th:text="#{bpm.sol.col.cant.agua}">Cant. Agua</th>
                        <th th:text="#{bpm.sol.col.cant.prod}">Cant. Producto</th>
                        <th th:text="#{bpm.sol.col.conc}">Conc. Final (%)</th>
                        <th th:text="#{bpm.pdf.col.responsable}">Responsable</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(registros)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i><span th:text="#{bpm.label.sin.registros}">No hay registros</span>
                        </td>
                    </tr>
                    <tr th:each="r : ${registros}">
                        <td th:text="${r.fecha != null} ? ${#temporals.format(r.fecha,'dd/MM/yyyy')} : '—'">—</td>
                        <td th:text="${r.hora != null} ? ${#temporals.format(r.hora,'HH:mm')} : '—'">—</td>
                        <td th:text="${r.producto}">—</td>
                        <td th:text="${r.cantidadAgua != null} ? ${r.cantidadAgua.stripTrailingZeros().toPlainString()} + ' ' + ${r.unidadAgua} : '—'">—</td>
                        <td th:text="${r.cantidadProducto != null} ? ${r.cantidadProducto.stripTrailingZeros().toPlainString()} + ' ' + ${r.unidadProducto} : '—'">—</td>
                        <td th:text="${r.concentracionFinal != null} ? ${r.concentracionFinal.stripTrailingZeros().toPlainString()} + ' %' : '—'">—</td>
                        <td th:text="${r.responsable}">—</td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/bpm/soluciones/{id}/pdf(id=${r.id})}"
                                   class="btn btn-outline-secondary btn-sm py-0 px-2" th:title="#{action.download.pdf}">
                                    <i class="bi bi-file-earmark-pdf"></i>
                                </a>
                                <a th:href="@{/bpm/soluciones/editar/{id}(id=${r.id})}"
                                   class="btn btn-outline-secondary btn-sm py-0 px-2">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/bpm/soluciones/eliminar/{id}(id=${r.id})}"
                                      method="post" style="display:inline"
                                      th:attr="data-confirm=#{action.delete} + ' ?'">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm py-0 px-2">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
