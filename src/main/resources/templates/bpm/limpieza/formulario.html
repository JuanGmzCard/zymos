<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${branding.name} + ' - BPM Limpieza'">Zymos - BPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { padding:1.75rem 0 1rem; }
        .page-header h1 { font-size:1.5rem; font-weight:700; color:#1e293b; margin:0; }
        .page-header .subtitle { color:#94a3b8; font-size:.875rem; margin:0; }
        .form-card { background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:1.5rem; }
        html.dark-mode .form-card { background:var(--dm-card); border-color:var(--dm-border-light); }
        html.dark-mode .page-header h1 { color:var(--dm-text); }
        html.dark-mode .page-header .subtitle { color:var(--dm-text-muted); }
        .firma-canvas-wrap { border:1px solid #dee2e6; border-radius:6px; background:#fff; position:relative; height:120px; }
        .firma-canvas { width:100%; height:120px; touch-action:none; display:block; cursor:crosshair; }
        .firma-placeholder { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; font-size:.82rem; color:#94a3b8; }
        html.dark-mode .firma-canvas-wrap { border-color:var(--dm-border-light); background:var(--dm-input); }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4">
    <div class="page-header">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1" style="font-size:.8rem;">
                <li class="breadcrumb-item"><a th:href="@{/bpm}">BPM</a></li>
                <li class="breadcrumb-item"><a th:href="@{/bpm/limpieza}">Limpieza y Desinfección</a></li>
                <li class="breadcrumb-item active" th:text="${registro.id != null} ? 'Editar' : 'Nuevo'">Nuevo</li>
            </ol>
        </nav>
        <h1 th:text="${registro.id != null} ? 'Editar Registro de Limpieza' : 'Nuevo Registro de Limpieza'">Nuevo</h1>
        <p class="subtitle">Limpieza y desinfección de áreas y utensilios</p>
    </div>
</div>

<div class="container-fluid px-4 pb-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9">
            <div class="form-card">
                <form th:action="@{/bpm/limpieza/guardar}" method="post" th:object="${registro}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-3">
                            <label class="form-label fw-semibold">Fecha <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fecha}"
                                   th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{fecha}"></div>
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label fw-semibold">Día de la semana</label>
                            <select class="form-select" th:field="*{dia}">
                                <option value="">— Seleccionar —</option>
                                <option value="Lunes">Lunes</option>
                                <option value="Martes">Martes</option>
                                <option value="Miércoles">Miércoles</option>
                                <option value="Jueves">Jueves</option>
                                <option value="Viernes">Viernes</option>
                                <option value="Sábado">Sábado</option>
                                <option value="Domingo">Domingo</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Área / Utensilio <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{areaUtensilio}"
                                   th:classappend="${#fields.hasErrors('areaUtensilio')} ? 'is-invalid' : ''"
                                   placeholder="Ej: Sala de fermentación, Tanques, Paletas...">
                            <div class="invalid-feedback" th:errors="*{areaUtensilio}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Detergente Usado</label>
                            <input type="text" class="form-control" th:field="*{detergenteUsado}"
                                   placeholder="Nombre del detergente">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Sanitizador Usado</label>
                            <input type="text" class="form-control" th:field="*{sanitizadorUsado}"
                                   placeholder="Nombre del sanitizador">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Concentración</label>
                            <input type="text" class="form-control" th:field="*{concentracion}"
                                   placeholder="Ej: 200 ppm, 2%">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Responsable</label>
                            <select class="form-select" th:field="*{responsable}">
                                <option value="">— Seleccionar —</option>
                                <option th:each="u : ${usuarios}"
                                        th:value="${u.username}"
                                        th:text="${u.username + ' — ' + u.rol.displayName + (!u.activo ? ' (inactivo)' : '')}"></option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Visto Bueno</label>
                            <div class="d-flex gap-3 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{vistoBueno}"
                                           th:value="true" id="vbSi">
                                    <label class="form-check-label" for="vbSi">Aprobado</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{vistoBueno}"
                                           th:value="false" id="vbNo">
                                    <label class="form-check-label" for="vbNo">Pendiente</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="firma-wrap">
                            <label class="form-label fw-semibold">Firma del Responsable</label>
                            <div class="firma-canvas-wrap">
                                <canvas class="firma-canvas" data-input="firma-responsable-limp"></canvas>
                                <span class="firma-placeholder">Firme aquí</span>
                            </div>
                            <button type="button" class="firma-clear btn btn-sm btn-outline-secondary mt-1">
                                <i class="bi bi-eraser me-1"></i>Limpiar
                            </button>
                            <input type="hidden" id="firma-responsable-limp" name="firma"
                                   th:value="${registro.firma}">
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end pt-2">
                        <a th:href="@{/bpm/limpieza}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-check2 me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script th:src="@{/js/bpm-firma.js}"></script>
</body>
</html>
