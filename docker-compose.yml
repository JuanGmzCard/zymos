services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       trazabilidad_cervezas
      POSTGRES_USER:     ${DB_USERNAME:?DB_USERNAME must be set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d trazabilidad_cervezas"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Puerto 5432 NO expuesto — solo accesible desde la red interna de Docker.
    # Para acceso local de desarrollo usar: docker exec -it <container> psql ...

  app:
    build: .
    restart: unless-stopped
    env_file: .env           # pasa todas las vars del .env, incluidos FLYWAY_*, SMTP_*, APP_BASE_URL, fuentes
    ports:
      - "8080:8080"
    environment:
      # Las vars de 'environment' sobreescriben las de env_file donde hay conflicto
      SPRING_PROFILES_ACTIVE: prod
      DB_URL:             jdbc:postgresql://db:5432/trazabilidad_cervezas   # sobreescribe el localhost del .env
      DB_USERNAME:        ${DB_USERNAME:?DB_USERNAME must be set}
      DB_PASSWORD:        ${DB_PASSWORD:?DB_PASSWORD must be set}
      # FLYWAY_USERNAME / FLYWAY_PASSWORD vienen de env_file.
      # Si no están definidos en .env, la var queda ausente del contenedor y
      # application-prod.properties hace el fallback a DB_USERNAME/DB_PASSWORD.
      ADMIN_USERNAME:     ${ADMIN_USERNAME:?ADMIN_USERNAME must be set}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      # Usuarios adicionales por rol (opcional)
      INVENTARIO_USERNAME: ${INVENTARIO_USERNAME:-}
      INVENTARIO_PASSWORD: ${INVENTARIO_PASSWORD:-}
      FACTURACION_USERNAME: ${FACTURACION_USERNAME:-}
      FACTURACION_PASSWORD: ${FACTURACION_PASSWORD:-}
      EQUIPOS_USERNAME:    ${EQUIPOS_USERNAME:-}
      EQUIPOS_PASSWORD:    ${EQUIPOS_PASSWORD:-}
      # ── JWT ──────────────────────────────────────────────────────
      JWT_SECRET:              ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_TTL_HOURS:           ${JWT_TTL_HOURS:-24}
      # ── Multi-tenant ─────────────────────────────────────────────
      DEFAULT_SUBDOMAIN:       ${DEFAULT_SUBDOMAIN:-default}
      # ── Branding del cliente ─────────────────────────────────────
      APP_BRAND_NAME:          ${APP_BRAND_NAME:-Alera}
      APP_BRAND_TAGLINE:       ${APP_BRAND_TAGLINE:-Sistema de Trazabilidad Cervecera}
      APP_BRAND_LOGO_URL:      ${APP_BRAND_LOGO_URL:-}
      APP_BRAND_COLOR_NAVBAR:  ${APP_BRAND_COLOR_NAVBAR:-#242E0D}
      APP_BRAND_COLOR_PRIMARY: ${APP_BRAND_COLOR_PRIMARY:-#364318}
      APP_BRAND_COLOR_ACCENT:  ${APP_BRAND_COLOR_ACCENT:-#C9A028}
      APP_BRAND_COLOR_ACCENT_HOVER: ${APP_BRAND_COLOR_ACCENT_HOVER:-#E0B840}
      APP_BRAND_COLOR_CREAM:   ${APP_BRAND_COLOR_CREAM:-#F5EDD0}
      APP_BRAND_COLOR_BODY_BG: ${APP_BRAND_COLOR_BODY_BG:-#F0EDE2}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
