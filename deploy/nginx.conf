# =============================================================================
# nginx.conf — Reverse proxy para Zymos en producción
# =============================================================================
# Requisitos:
#   - nginx >= 1.18
#   - Certificado SSL (Let's Encrypt recomendado):
#       certbot --nginx -d tudominio.com -d *.tudominio.com
#
# Uso:
#   cp deploy/nginx.conf /etc/nginx/sites-available/zymos
#   ln -s /etc/nginx/sites-available/zymos /etc/nginx/sites-enabled/zymos
#   nginx -t && systemctl reload nginx
#
# Multi-tenant: nginx pasa el header Host intacto → la app resuelve el tenant
# por subdominio (cliente.tudominio.com → tenant "cliente").
# =============================================================================

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com *.tudominio.com;

    # Certbot challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tudominio.com *.tudominio.com;

    # ── SSL (generado por certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tudominio.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # ── Límites de request ────────────────────────────────────────────────────
    client_max_body_size 20M;   # para importación de Excel (migracion)
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── Assets estáticos — cache agresiva ─────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy pass a Spring Boot ──────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket (para futuros usos)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # Buffering — desactivar para SSE/streaming si se agrega en el futuro
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
    }

    # ── Actuator — solo desde red interna ─────────────────────────────────────
    location /actuator/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/zymos_access.log;
    error_log  /var/log/nginx/zymos_error.log warn;
}
