version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns: ["org.springframework.boot:*", "org.springframework:*"]
      testcontainers:
        patterns: ["org.testcontainers:*"]
      security:
        patterns: ["io.jsonwebtoken:*", "org.springframework.security:*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
